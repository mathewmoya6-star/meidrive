<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Login | MEI DRIVE AFRICA</title>

    <meta name="theme-color" content="#041B3D" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2300FF88'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='%23041B3D'%3E🚗%3C/text%3E%3C/svg%3E">

    <!-- Fonts & Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --primary:#00FF88;
            --dark:#041B3D;
            --dark2:#0A234F;
            --white:#ffffff;
            --gray:#B7C4D6;
            --danger:#ff4d4f;
            --success:#22c55e;
            --transition:all .3s ease;
        }

        body{
            font-family:'Segoe UI',sans-serif;
            min-height:100vh;
            overflow-x:hidden;
            background:
            linear-gradient(rgba(4,27,61,.88),rgba(10,35,79,.92)),
            url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1400&auto=format&fit=crop')
            center/cover no-repeat;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            position:relative;
        }

        /* Floating Glow */
        .glow{
            position:absolute;
            width:400px;
            height:400px;
            border-radius:50%;
            background:rgba(0,255,136,.15);
            filter:blur(100px);
            z-index:0;
            animation:float 8s ease-in-out infinite;
        }

        .glow.one{
            top:-100px;
            left:-100px;
        }

        .glow.two{
            bottom:-120px;
            right:-120px;
            animation-delay:2s;
        }

        @keyframes float{
            0%,100%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-20px);
            }
        }

        .login-card{
            width:100%;
            max-width:430px;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.12);
            border-radius:28px;
            padding:40px;
            position:relative;
            z-index:2;
            box-shadow:0 20px 60px rgba(0,0,0,.4);
            animation:fadeIn .8s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(25px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo{
            width:80px;
            height:80px;
            margin:auto;
            border-radius:24px;
            background:linear-gradient(135deg,var(--primary),#00cc6f);
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:38px;
            color:var(--dark);
            margin-bottom:20px;
            font-weight:bold;
            box-shadow:0 10px 30px rgba(0,255,136,.35);
        }

        h1{
            text-align:center;
            color:var(--white);
            font-size:2rem;
            margin-bottom:10px;
            font-weight:800;
        }

        .subtitle{
            text-align:center;
            color:var(--gray);
            margin-bottom:35px;
            font-size:.95rem;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            color:var(--white);
            margin-bottom:8px;
            font-size:.9rem;
            font-weight:600;
        }

        .input-box{
            position:relative;
        }

        .input-box i{
            position:absolute;
            top:50%;
            left:15px;
            transform:translateY(-50%);
            color:var(--gray);
        }

        .input-box input{
            width:100%;
            padding:15px 15px 15px 45px;
            border:none;
            outline:none;
            border-radius:14px;
            background:rgba(255,255,255,.12);
            color:white;
            font-size:15px;
            border:1px solid rgba(255,255,255,.08);
            transition:var(--transition);
        }

        .input-box input::placeholder{
            color:#d0d7e2;
        }

        .input-box input:focus{
            border-color:var(--primary);
            box-shadow:0 0 0 4px rgba(0,255,136,.12);
        }

        .password-toggle{
            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            color:var(--gray);
            transition:var(--transition);
        }

        .password-toggle:hover{
            color:var(--primary);
        }

        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,var(--primary),#00d977);
            color:var(--dark);
            font-weight:800;
            font-size:16px;
            cursor:pointer;
            transition:var(--transition);
            margin-top:10px;
        }

        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 12px 30px rgba(0,255,136,.3);
        }

        .login-btn:disabled{
            opacity:0.6;
            cursor:not-allowed;
            transform:none;
        }

        .message{
            display:none;
            margin-top:15px;
            padding:12px;
            border-radius:12px;
            font-size:.9rem;
            text-align:center;
        }

        .error{
            background:rgba(255,77,79,.12);
            color:#ff9b9c;
            border:1px solid rgba(255,77,79,.2);
        }

        .success{
            background:rgba(34,197,94,.12);
            color:#7dffac;
            border:1px solid rgba(34,197,94,.2);
        }

        .spinner{
            display:none;
            width:24px;
            height:24px;
            border:3px solid rgba(255,255,255,.25);
            border-top-color:var(--primary);
            border-radius:50%;
            margin:18px auto 0;
            animation:spin .8s linear infinite;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        .bottom-links{
            text-align:center;
            margin-top:28px;
            color:var(--gray);
            font-size:.92rem;
        }

        .bottom-links a{
            color:var(--primary);
            text-decoration:none;
            font-weight:700;
        }

        .home-link{
            display:inline-block;
            margin-top:18px;
            color:#d9e2ef;
            text-decoration:none;
            font-size:.88rem;
            transition:var(--transition);
        }

        .home-link:hover{
            color:var(--primary);
        }

        @media(max-width:480px){

            body{
                padding:15px;
            }

            .login-card{
                padding:30px 22px;
            }

            h1{
                font-size:1.7rem;
            }
        }
    </style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="login-card">

    <div class="logo">🚗</div>

    <h1>Welcome Back</h1>

    <p class="subtitle">
        Login to continue learning with MEI DRIVE AFRICA
    </p>

    <div id="error" class="message error"></div>
    <div id="success" class="message success"></div>

    <form id="loginForm">

        <div class="input-group">

            <label>Email Address</label>

            <div class="input-box">
                <i class="fas fa-envelope"></i>

                <input
                type="email"
                id="email"
                placeholder="Enter your email"
                autocomplete="email"
                required>
            </div>

        </div>

        <div class="input-group">

            <label>Password</label>

            <div class="input-box">
                <i class="fas fa-lock"></i>

                <input
                type="password"
                id="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required>

                <i class="fas fa-eye password-toggle" id="togglePassword"></i>
            </div>

        </div>

        <div class="bottom-links" style="margin-top:-5px; margin-bottom:15px;">
            <a href="/forgot-password.html">Forgot Password?</a>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
            Login
        </button>

    </form>

    <div id="spinner" class="spinner"></div>

    <div class="bottom-links">
        Don't have an account?
        <a href="/register.html">Create Account</a>

        <br>

        <a href="/" class="home-link">
            <i class="fas fa-arrow-left"></i>
            Back to Home
        </a>
    </div>

</div>

<script>

    // ============================================
    // SUPABASE CONFIGURATION - FIXED WITH REAL KEY
    // ============================================
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';

    const { createClient } = window.supabase;
    
    // Use supabaseClient to avoid naming conflicts
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ============================================
    // DOM ELEMENTS
    // ============================================
    const form = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const errorDiv = document.getElementById('error');
    const successDiv = document.getElementById('success');
    let isSubmitting = false;

    // ============================================
    // HELPER FUNCTIONS
    // ============================================
    function showError(message) {
        errorDiv.innerText = message;
        errorDiv.style.display = 'block';
        successDiv.style.display = 'none';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 5000);
    }

    function showSuccess(message) {
        successDiv.innerText = message;
        successDiv.style.display = 'block';
        errorDiv.style.display = 'none';
    }

    function setLoading(state) {
        spinner.style.display = state ? 'block' : 'none';
        loginBtn.disabled = state;
        loginBtn.innerText = state ? 'Logging in...' : 'Login';
    }

    // Password visibility toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    
    togglePassword.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        togglePassword.classList.toggle('fa-eye');
        togglePassword.classList.toggle('fa-eye-slash');
    });

    // ============================================
    // LOGIN HANDLER
    // ============================================
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Prevent double submission
        if (isSubmitting || loginBtn.disabled) return;
        
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            showError('Please fill all fields');
            return;
        }

        isSubmitting = true;
        setLoading(true);

        // Set timeout for network issues
        const timeoutPromise = new Promise((_, reject) => {
            setTimeout(() => reject(new Error('Request timeout')), 15000);
        });

        try {
            const loginPromise = supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            const { data, error } = await Promise.race([loginPromise, timeoutPromise]);

            setLoading(false);
            isSubmitting = false;

            if (error) {
                if (error.message.includes('Invalid login credentials')) {
                    showError('Invalid email or password. Please try again.');
                } else if (error.message.includes('Email not confirmed')) {
                    showError('Please verify your email before logging in. Check your inbox.');
                } else {
                    showError(error.message);
                }
                return;
            }

            // Check if email is verified
            if (!data.user.email_confirmed_at) {
                showError('Please verify your email address before logging in. Check your inbox for the confirmation link.');
                await supabaseClient.auth.signOut();
                return;
            }

            // Login successful
            // Store minimal user info (not for security, just for convenience)
            localStorage.setItem('user_id', data.user.id);
            localStorage.setItem('user_email', data.user.email);
            localStorage.setItem('last_login', new Date().toISOString());

            showSuccess('Login successful! Redirecting to dashboard...');

            setTimeout(() => {
                window.location.href = '/dashboard.html';
            }, 1500);

        } catch (err) {
            console.error('Login error:', err);
            setLoading(false);
            isSubmitting = false;
            
            if (err.message === 'Request timeout') {
                showError('Request timed out. Please check your internet connection and try again.');
            } else {
                showError('Network error. Please check your connection and try again.');
            }
        }
    });

    // ============================================
    // SESSION CHECK - PROTECT LOGIN PAGE
    // ============================================
    async function checkSession() {
        try {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            if (error) {
                console.error('Session check error:', error);
                return;
            }
            
            if (session) {
                // User is already logged in, redirect to dashboard
                window.location.href = '/dashboard.html';
            }
        } catch (err) {
            console.error('Session check exception:', err);
        }
    }

    // ============================================
    // AUTH STATE LISTENER (for debugging)
    // ============================================
    supabaseClient.auth.onAuthStateChange((event, session) => {
        console.log('Auth Event:', event, session?.user?.email);
        
        if (event === 'SIGNED_OUT') {
            localStorage.clear();
        }
    });

    // Check session on page load
    checkSession();

</script>

</body>
</html>

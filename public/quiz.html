<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bank - MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Inter', system-ui, sans-serif; background: #0A192F; color: #fff; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0D2137; }
        ::-webkit-scrollbar-thumb { background: #00FF88; border-radius: 4px; }
        .navbar {
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(12px);
            padding: 16px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }
        .logo { font-size: 26px; font-weight: 800; }
        .logo span { color: #00FF88; }
        .back-btn {
            background: rgba(0, 255, 136, 0.1);
            color: #00FF88;
            border: 1px solid #00FF88;
            padding: 10px 28px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }
        .back-btn:hover { background: #00FF88; color: #0A192F; }
        .auth-buttons { display: flex; gap: 12px; }
        .btn-login, .btn-register {
            padding: 8px 24px;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-login { background: transparent; border: 1.5px solid #00FF88; color: #00FF88; }
        .btn-login:hover { background: rgba(0, 255, 136, 0.1); }
        .btn-register { background: #00FF88; color: #0A192F; }
        .btn-register:hover { background: #00cc6a; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-email { color: #00FF88; font-size: 14px; }
        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-logout:hover { background: rgba(255, 255, 255, 0.2); }
        .container { max-width: 900px; margin: 100px auto 60px; padding: 0 20px; }
        .quiz-header { text-align: center; margin-bottom: 40px; }
        .quiz-header h1 { font-size: 42px; margin-bottom: 12px; }
        .quiz-header h1 span { color: #00FF88; }
        .quiz-header p { opacity: 0.7; }
        .stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .stat-card { background: rgba(13, 33, 55, 0.8); padding: 15px 30px; border-radius: 12px; text-align: center; border: 1px solid rgba(0, 255, 136, 0.2); }
        .stat-number { font-size: 32px; font-weight: 800; color: #00FF88; }
        .stat-label { font-size: 13px; opacity: 0.7; }
        .category-filter { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; justify-content: center; }
        .filter-btn { background: rgba(13, 33, 55, 0.8); border: 1px solid rgba(0, 255, 136, 0.2); padding: 10px 22px; border-radius: 8px; color: white; cursor: pointer; transition: all 0.3s; font-weight: 500; }
        .filter-btn.active, .filter-btn:hover { background: #00FF88; color: #0A192F; border-color: #00FF88; }
        .quiz-item { background: rgba(13, 33, 55, 0.6); border-radius: 16px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(0, 255, 136, 0.1); }
        .quiz-question { font-size: 18px; font-weight: 600; margin-bottom: 20px; line-height: 1.5; }
        .quiz-options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .quiz-option { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(10, 25, 47, 0.6); border-radius: 10px; cursor: pointer; transition: all 0.3s; }
        .quiz-option:hover { background: rgba(0, 255, 136, 0.1); }
        .quiz-option input { cursor: pointer; }
        .check-btn { background: #00FF88; color: #0A192F; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .feedback { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; }
        .feedback.correct { background: rgba(0, 255, 136, 0.15); border: 1px solid #00FF88; color: #00FF88; display: block; }
        .feedback.wrong { background: rgba(244, 67, 54, 0.15); border: 1px solid #f44336; color: #f44336; display: block; }
        .loading { text-align: center; padding: 60px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(0,255,136,0.2); border-top-color: #00FF88; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0D2137;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }
        .modal-content h2 { margin-bottom: 20px; text-align: center; color: #00FF88; }
        .modal-content input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(10, 25, 47, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        .modal-content input:focus { outline: none; border-color: #00FF88; }
        .modal-content button {
            width: 100%;
            padding: 14px;
            background: #00FF88;
            color: #0A192F;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .modal-switch { text-align: center; color: rgba(255, 255, 255, 0.6); cursor: pointer; }
        .modal-switch span { color: #00FF88; }
        .close-modal { position: absolute; top: 20px; right: 30px; font-size: 30px; cursor: pointer; color: white; }
        .error-msg { color: #ff4444; text-align: center; margin-bottom: 15px; font-size: 14px; }
        .success-msg { color: #00FF88; text-align: center; margin-bottom: 15px; font-size: 14px; }
        @media (max-width: 768px) {
            .container { margin-top: 140px; }
            .quiz-header h1 { font-size: 28px; }
            .stats { flex-direction: column; align-items: center; }
            .stat-card { width: 100%; }
            .navbar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MEI DRIVE <span>AFRICA</span></div>
        <div id="authContainer" class="auth-buttons"></div>
        <a href="index.html" class="back-btn">← Back</a>
    </nav>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <div id="modalError" class="error-msg"></div>
            <div id="modalSuccess" class="success-msg"></div>
            <input type="email" id="modalEmail" placeholder="Email address">
            <input type="password" id="modalPassword" placeholder="Password">
            <button id="modalSubmitBtn">Login</button>
            <div class="modal-switch" id="modalSwitch">Don't have an account? <span>Register</span></div>
        </div>
    </div>

    <div class="container">
        <div class="quiz-header"><h1>📝 <span>Quiz Bank</span></h1><p>Test your knowledge with real exam-style questions</p></div>
        <div id="quizContainer"><div class="loading"><div class="spinner"></div>Loading questions...</div></div>
    </div>

    <script>
        (function() {
            if (!window.__MEI_SUPABASE__) {
                const SUPABASE_URL = 'https://qpqkmmkrzxlhcpccefjn.supabase.co';
                const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s';
                window.__MEI_SUPABASE__ = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
            const supabase = window.__MEI_SUPABASE__;
            
            const STATE = { user: null, authModalOpen: false, authMode: 'login', authError: null, authSuccess: null, allQuestions: [], categories: ['All'], currentCategory: 'All', loading: true };
            
            function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m); }
            
            function renderUI() {
                const authContainer = document.getElementById('authContainer');
                if (STATE.user) authContainer.innerHTML = `<div class="user-info"><span class="user-email">${escapeHtml(STATE.user.email)}</span><button class="btn-logout" onclick="window.actions.logout()">Logout</button></div>`;
                else authContainer.innerHTML = `<button class="btn-login" onclick="window.actions.openModal('login')">Login</button><button class="btn-register" onclick="window.actions.openModal('register')">Register</button>`;
                
                const modal = document.getElementById('authModal');
                if (STATE.authModalOpen) {
                    modal.classList.add('active');
                    document.getElementById('modalTitle').textContent = STATE.authMode === 'login' ? 'Login' : 'Register';
                    document.getElementById('modalSubmitBtn').textContent = STATE.authMode === 'login' ? 'Login' : 'Register';
                    document.getElementById('modalSwitch').innerHTML = STATE.authMode === 'login' ? 'Don\'t have an account? <span>Register</span>' : 'Already have an account? <span>Login</span>';
                    document.getElementById('modalError').textContent = STATE.authError || '';
                    document.getElementById('modalSuccess').textContent = STATE.authSuccess || '';
                } else modal.classList.remove('active');
                
                const container = document.getElementById('quizContainer');
                if (STATE.loading) { container.innerHTML = '<div class="loading"><div class="spinner"></div>Loading questions...</div>'; return; }
                
                const filtered = STATE.currentCategory === 'All' ? STATE.allQuestions : STATE.allQuestions.filter(q => q.category === STATE.currentCategory);
                container.innerHTML = `
                    <div class="stats"><div class="stat-card"><div class="stat-number">${STATE.allQuestions.length}</div><div class="stat-label">Total Questions</div></div><div class="stat-card"><div class="stat-number">${STATE.categories.length - 1}</div><div class="stat-label">Categories</div></div><div class="stat-card"><div class="stat-number">${filtered.length}</div><div class="stat-label">Showing</div></div></div>
                    <div class="category-filter">${STATE.categories.map(cat => `<button class="filter-btn ${cat === STATE.currentCategory ? 'active' : ''}" onclick="window.actions.setCategory('${cat.replace(/'/g, "\\'")}')">${escapeHtml(cat)}</button>`).join('')}</div>
                    ${filtered.map((q, idx) => `<div class="quiz-item" id="quiz-${q.id}"><div class="quiz-question">${idx + 1}. ${escapeHtml(q.question)}</div><div class="quiz-options"><label class="quiz-option"><input type="radio" name="q${q.id}" value="1"> A. ${escapeHtml(q.option_a || '')}</label><label class="quiz-option"><input type="radio" name="q${q.id}" value="2"> B. ${escapeHtml(q.option_b || '')}</label><label class="quiz-option"><input type="radio" name="q${q.id}" value="3"> C. ${escapeHtml(q.option_c || '')}</label><label class="quiz-option"><input type="radio" name="q${q.id}" value="4"> D. ${escapeHtml(q.option_d || '')}</label></div><button class="check-btn" onclick="window.actions.checkAnswer(${q.id}, ${q.correct_answer}, '${escapeHtml(q.explanation || '').replace(/'/g, "\\'")}')">Check Answer</button><div class="feedback" id="feedback-${q.id}"></div></div>`).join('')}
                `;
            }
            
            const actions = {
                async login(email, password) {
                    STATE.authError = null; STATE.authSuccess = null; renderUI();
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) STATE.authError = error.message;
                    else { STATE.user = data.user; STATE.authSuccess = 'Login successful!'; STATE.authModalOpen = false; setTimeout(() => { STATE.authSuccess = null; renderUI(); }, 2000); }
                    renderUI();
                },
                async register(email, password) {
                    STATE.authError = null; STATE.authSuccess = null; renderUI();
                    const { error } = await supabase.auth.signUp({ email, password });
                    if (error) STATE.authError = error.message;
                    else { STATE.authSuccess = 'Registration successful! You can now login.'; setTimeout(() => { STATE.authMode = 'login'; STATE.authSuccess = null; renderUI(); }, 2000); }
                    renderUI();
                },
                async logout() { await supabase.auth.signOut(); STATE.user = null; renderUI(); window.location.href = 'index.html'; },
                openModal(mode) { STATE.authMode = mode; STATE.authModalOpen = true; STATE.authError = null; STATE.authSuccess = null; document.getElementById('modalEmail').value = ''; document.getElementById('modalPassword').value = ''; renderUI(); },
                closeModal() { STATE.authModalOpen = false; renderUI(); },
                async handleAuthSubmit() {
                    const email = document.getElementById('modalEmail').value, password = document.getElementById('modalPassword').value;
                    if (!email || !password) { STATE.authError = 'Please enter both email and password'; renderUI(); return; }
                    if (password.length < 6) { STATE.authError = 'Password must be at least 6 characters'; renderUI(); return; }
                    if (STATE.authMode === 'login') await actions.login(email, password);
                    else await actions.register(email, password);
                },
                setCategory(category) { STATE.currentCategory = category; renderUI(); },
                checkAnswer(id, correct, explanation) {
                    const selected = document.querySelector(`input[name="q${id}"]:checked`);
                    const feedback = document.getElementById(`feedback-${id}`);
                    if (!selected) { feedback.innerHTML = "⚠️ Please select an answer"; feedback.className = "feedback wrong"; return; }
                    const letters = ['A', 'B', 'C', 'D'];
                    if (parseInt(selected.value) === correct) { feedback.innerHTML = `✅ Correct! ${explanation || 'Great job!'}`; feedback.className = "feedback correct"; }
                    else { feedback.innerHTML = `❌ Incorrect. The correct answer is ${letters[correct - 1]}. ${explanation || 'Review and try again!'}`; feedback.className = "feedback wrong"; }
                },
                async loadQuestions() {
                    STATE.loading = true; renderUI();
                    try {
                        const { data } = await supabase.from('quiz_questions').select('*');
                        STATE.allQuestions = data || [];
                        const uniqueCats = [...new Set(STATE.allQuestions.map(q => q.category))];
                        STATE.categories = ['All', ...uniqueCats];
                    } catch(e) { console.error(e); }
                    finally { STATE.loading = false; renderUI(); }
                },
                async syncAuth() { const { data: { session } } = await supabase.auth.getSession(); STATE.user = session?.user || null; renderUI(); }
            };
            
            window.actions = actions;
            document.getElementById('modalSubmitBtn').onclick = () => actions.handleAuthSubmit();
            document.getElementById('modalSwitch').onclick = () => { STATE.authMode = STATE.authMode === 'login' ? 'register' : 'login'; renderUI(); };
            document.querySelector('.close-modal').onclick = () => actions.closeModal();
            window.onclick = (event) => { if (event.target === document.getElementById('authModal')) actions.closeModal(); };
            
            async function init() { await actions.syncAuth(); await actions.loadQuestions(); }
            init();
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Dashboard | MEI DRIVE AFRICA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #FFFFFF;
            --soft-gray: #B7C4D6;
            --error: #ff4444;
            --warning: #ff9800;
            --success: #00FF88;
            --transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
            overflow-x: hidden;
        }
        
        .loading-spinner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .loading-spinner.active {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--dark-navy);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
            background: var(--dark-navy);
            padding: 14px 24px;
            border-radius: 12px;
            transform: translateX(400px);
            transition: transform 0.3s;
            border-left: 4px solid var(--neon-green);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 10001;
        }
        
        .toast.error {
            border-left-color: var(--error);
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .navbar {
            background: var(--dark-navy);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0,255,136,0.15);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--neon-green);
            cursor: pointer;
        }
        
        .logo span {
            color: var(--white);
        }
        
        .user-greeting {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            background: var(--neon-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--dark-navy);
            font-weight: bold;
        }
        
        .logout-btn {
            background: rgba(255,68,68,0.2);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .logout-btn:hover {
            background: var(--error);
            color: var(--white);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .welcome-section {
            background: linear-gradient(135deg, var(--dark-navy), var(--secondary-dark));
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,255,136,0.2);
        }
        
        .welcome-section h1 {
            color: var(--neon-green);
            margin-bottom: 0.5rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .stat-card {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--neon-green);
        }
        
        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        
        .tab {
            background: none;
            border: none;
            color: var(--soft-gray);
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            position: relative;
        }
        
        .tab.active {
            color: var(--neon-green);
        }
        
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -0.5rem;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--neon-green);
        }
        
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }
        
        .course-card {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid rgba(0,255,136,0.15);
            transition: var(--transition);
            position: relative;
        }
        
        .course-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-green);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .course-icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
        
        .course-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 0.75rem;
        }
        
        .badge-free {
            background: var(--warning);
            color: var(--dark-navy);
        }
        
        .badge-premium {
            background: var(--neon-green);
            color: var(--dark-navy);
        }
        
        .badge-enrolled {
            background: var(--success);
            color: var(--dark-navy);
        }
        
        .course-title {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .course-description {
            color: var(--soft-gray);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        
        .course-progress {
            margin: 1rem 0;
        }
        
        .progress-bar-bg {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        
        .progress-bar-fill {
            background: var(--neon-green);
            height: 100%;
            transition: width 0.3s;
        }
        
        .progress-text {
            font-size: 0.75rem;
            color: var(--soft-gray);
            margin-top: 0.5rem;
            text-align: center;
        }
        
        .btn-enroll, .btn-continue {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        
        .btn-enroll {
            background: var(--neon-green);
            color: var(--dark-navy);
        }
        
        .btn-enroll:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,255,136,0.3);
        }
        
        .btn-enroll:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-continue {
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
        }
        
        .btn-continue:hover {
            background: var(--neon-green);
            color: var(--dark-navy);
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem;
            background: var(--dark-navy);
            border-radius: 20px;
            grid-column: 1 / -1;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: var(--soft-gray);
            margin-bottom: 1rem;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            .courses-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .tabs {
                flex-direction: row;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div id="loadingSpinner" class="loading-spinner">
    <div class="spinner"></div>
</div>
<div id="toast" class="toast"></div>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="location.href='/'">MEI DRIVE <span>AFRICA</span></div>
        <div class="user-greeting">
            <div class="user-avatar" id="userAvatar">👤</div>
            <span id="userName">Loading...</span>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="welcome-section">
        <h1>Welcome back, <span id="welcomeName">Learner</span>! 🎉</h1>
        <p>Continue your driving journey. Track progress and enroll in new courses.</p>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalCoursesCount">0</div>
                <div>Available Courses</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="enrolledCount">0</div>
                <div>Enrolled Courses</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">0</div>
                <div>Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="overallProgress">0%</div>
                <div>Overall Progress</div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" data-tab="all">📚 All Courses</button>
        <button class="tab" data-tab="enrolled">✅ My Courses</button>
    </div>

    <div id="coursesContainer" class="courses-grid">
        <div class="empty-state">
            <i class="fas fa-spinner fa-pulse"></i>
            <h3>Loading courses...</h3>
        </div>
    </div>
</div>

<script>
    // ============================================
    // SUPABASE CONFIGURATION
    // ============================================
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ============================================
    // COURSE FILE MAPPING
    // ============================================
    const COURSE_FILE_MAPPING = {
        "boda": "boda-course.html",
        "defensive": "defensive-driving-course.html",
        "e-safety": "e-safety-library.html",
        "electric": "ev-course-dynamic.html",
        "learner": "learner-hub.html",
        "professional": "professional-driver-course.html",
        "quiz": "quiz-bank.html",
        "school": "school-transport-course.html"
    };
    
    function getCourseFileName(courseName) {
        const lowerName = courseName.toLowerCase();
        for (const [key, filename] of Object.entries(COURSE_FILE_MAPPING)) {
            if (lowerName.includes(key)) {
                return filename;
            }
        }
        return `course.html?id=${encodeURIComponent(courseName)}`;
    }
    
    // ============================================
    // FALLBACK COURSES (in case database fails)
    // ============================================
    const FALLBACK_COURSES = [
        { id: 1, name: 'Learner Hub - Complete Driver Training', description: 'NTSA-approved curriculum from basics to road readiness. Covers traffic rules, vehicle controls, defensive driving, and complete exam preparation.', price: 0, type: 'free', icon: '📚', total_units: 21 },
        { id: 2, name: 'Boda Boda Professional Course', description: 'Professional motorcycle taxi training including safety, customer service, road regulations, and defensive riding techniques.', price: 0, type: 'free', icon: '🏍️', total_units: 15 },
        { id: 3, name: 'Defensive Driving Course', description: 'Master advanced driving techniques, hazard perception, emergency maneuvers, and accident avoidance strategies.', price: 1999, type: 'premium', icon: '🛡️', total_units: 12 },
        { id: 4, name: 'Professional Driver Course', description: 'Comprehensive training for PSV, logistics, and commercial drivers including customer care and regulations.', price: 4999, type: 'premium', icon: '🚛', total_units: 20 },
        { id: 5, name: 'Electric Vehicle Course', description: 'Master EV technology, charging systems, battery maintenance, and safety procedures for electric vehicles.', price: 2999, type: 'premium', icon: '⚡', total_units: 10 },
        { id: 6, name: 'School Transport Safety', description: 'Specialized certification for school bus drivers including child safety protocols, emergency procedures, and regulations.', price: 1999, type: 'premium', icon: '🚸', total_units: 8 },
        { id: 7, name: 'E-Safety Library', description: 'Digital safety for drivers - online records management, apps, cybersecurity awareness, and digital compliance.', price: 0, type: 'free', icon: '💻', total_units: 6 },
        { id: 8, name: 'Quiz Bank - Exam Preparation', description: '1000+ NTSA practice questions to prepare for your driving theory test with detailed explanations.', price: 0, type: 'free', icon: '📝', total_units: 10 }
    ];
    
    // ============================================
    // STATE
    // ============================================
    let currentUser = null;
    let allCourses = [];
    let userEnrollments = new Map();
    let currentTab = 'all';
    let enrollInProgress = new Set();
    
    // ============================================
    // HELPER FUNCTIONS
    // ============================================
    function showToast(message, isError = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    function setLoading(loading) {
        document.getElementById('loadingSpinner').classList.toggle('active', loading);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    // ============================================
    // AUTHENTICATION
    // ============================================
    async function checkAuth() {
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = '/login.html';
                return false;
            }
            currentUser = session.user;
            
            // Get user profile
            let displayName = currentUser.email.split('@')[0];
            try {
                const { data: profile } = await supabase
                    .from('profiles')
                    .select('full_name')
                    .eq('id', currentUser.id)
                    .maybeSingle();
                if (profile?.full_name) displayName = profile.full_name;
            } catch (err) {
                console.log('Profile fetch error:', err);
            }
            
            document.getElementById('userName').textContent = displayName;
            document.getElementById('welcomeName').textContent = displayName.split(' ')[0];
            document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();
            
            return true;
        } catch (error) {
            console.error('Auth error:', error);
            showToast('Authentication error. Please login again.', true);
            window.location.href = '/login.html';
            return false;
        }
    }
    
    // ============================================
    // FETCH COURSES
    // ============================================
    async function fetchCourses() {
        setLoading(true);
        try {
            console.log('Fetching courses from Supabase...');
            const { data, error } = await supabase
                .from('courses')
                .select('*')
                .order('id', { ascending: true });
            
            if (error || !data || data.length === 0) {
                console.log('Using fallback courses');
                allCourses = FALLBACK_COURSES;
                showToast('Using demo courses. Database connection issue.', true);
            } else {
                console.log(`✅ Loaded ${data.length} courses from database`);
                allCourses = data;
            }
            
            document.getElementById('totalCoursesCount').textContent = allCourses.length;
            renderCourses();
            return allCourses;
        } catch (error) {
            console.error('Error fetching courses:', error);
            allCourses = FALLBACK_COURSES;
            renderCourses();
            return allCourses;
        } finally {
            setLoading(false);
        }
    }
    
    // ============================================
    // FETCH USER ENROLLMENTS
    // ============================================
    async function fetchUserEnrollments() {
        if (!currentUser) return;
        
        try {
            const { data, error } = await supabase
                .from('enrollments')
                .select('course_id, status, progress')
                .eq('user_id', currentUser.id);
            
            if (error) {
                if (error.code !== '42P01') {
                    console.error('Enrollments error:', error);
                }
                return;
            }
            
            if (data && data.length > 0) {
                data.forEach(enrollment => {
                    userEnrollments.set(enrollment.course_id, {
                        enrolled: true,
                        status: enrollment.status,
                        progress: enrollment.progress || 0
                    });
                });
            }
            
            console.log(`User has ${userEnrollments.size} enrolled courses`);
            updateStats();
            renderCourses();
        } catch (error) {
            console.error('Error fetching enrollments:', error);
        }
    }
    
    // ============================================
    // ENROLL IN COURSE
    // ============================================
    async function enrollInCourse(courseId, courseName) {
        if (!currentUser) {
            showToast('Please login first', true);
            window.location.href = '/login.html';
            return;
        }
        
        if (userEnrollments.has(courseId)) {
            showToast('You are already enrolled in this course!');
            return;
        }
        
        if (enrollInProgress.has(courseId)) {
            showToast('Enrollment in progress...');
            return;
        }
        
        setLoading(true);
        enrollInProgress.add(courseId);
        
        try {
            const { error } = await supabase
                .from('enrollments')
                .insert([{
                    user_id: currentUser.id,
                    course_id: courseId,
                    status: 'active',
                    progress: 0,
                    enrolled_at: new Date().toISOString()
                }]);
            
            if (error) throw error;
            
            userEnrollments.set(courseId, {
                enrolled: true,
                status: 'active',
                progress: 0
            });
            
            updateStats();
            renderCourses();
            showToast(`✅ Successfully enrolled in ${courseName}! 🎉`);
            
        } catch (error) {
            console.error('Enrollment error:', error);
            if (error.code === '23505') {
                showToast('You are already enrolled!', true);
                // Refresh enrollments
                await fetchUserEnrollments();
            } else {
                showToast('Failed to enroll. Please try again.', true);
            }
        } finally {
            enrollInProgress.delete(courseId);
            setLoading(false);
        }
    }
    
    // ============================================
    // ACCESS COURSE
    // ============================================
    function accessCourse(course) {
        localStorage.setItem('currentCourse', JSON.stringify({
            id: course.id,
            name: course.name,
            description: course.description,
            type: course.type,
            price: course.price,
            icon: course.icon || '🚗'
        }));
        
        const courseFile = getCourseFileName(course.name);
        window.location.href = `/${courseFile}`;
    }
    
    // ============================================
    // UPDATE STATISTICS
    // ============================================
    function updateStats() {
        const enrolledCount = userEnrollments.size;
        const completedCount = Array.from(userEnrollments.values()).filter(e => e.progress === 100).length;
        const totalProgress = Array.from(userEnrollments.values()).reduce((sum, e) => sum + (e.progress || 0), 0);
        const avgProgress = enrolledCount > 0 ? Math.round(totalProgress / enrolledCount) : 0;
        
        document.getElementById('enrolledCount').textContent = enrolledCount;
        document.getElementById('completedCount').textContent = completedCount;
        document.getElementById('overallProgress').textContent = `${avgProgress}%`;
    }
    
    // ============================================
    // RENDER COURSES
    // ============================================
    function renderCourses() {
        const container = document.getElementById('coursesContainer');
        
        if (!allCourses || allCourses.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-database"></i>
                    <h3>No Courses Available</h3>
                    <p>Please check back later for new courses.</p>
                    <button onclick="fetchCourses()" style="margin-top:1rem; background:#00FF88; color:#041B3D; border:none; padding:10px 20px; border-radius:30px; cursor:pointer;">Retry</button>
                </div>
            `;
            return;
        }
        
        let filteredCourses = [];
        if (currentTab === 'enrolled') {
            filteredCourses = allCourses.filter(course => userEnrollments.has(course.id));
            if (filteredCourses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <h3>No enrolled courses yet</h3>
                        <p>Browse "All Courses" and click "Enroll Now" to get started!</p>
                    </div>
                `;
                return;
            }
        } else {
            filteredCourses = allCourses;
        }
        
        container.innerHTML = filteredCourses.map(course => {
            const isEnrolled = userEnrollments.has(course.id);
            const enrollment = userEnrollments.get(course.id);
            const progress = enrollment?.progress || 0;
            const isFree = course.type === 'free' || course.price === 0;
            const icon = course.icon || '🚗';
            const price = course.price || 0;
            
            let badge = '';
            if (isEnrolled) {
                badge = '<span class="course-badge badge-enrolled">✅ ENROLLED</span>';
            } else if (isFree) {
                badge = '<span class="course-badge badge-free">🎓 FREE</span>';
            } else {
                badge = '<span class="course-badge badge-premium">💰 PREMIUM</span>';
            }
            
            return `
                <div class="course-card">
                    <div class="course-icon">${escapeHtml(icon)}</div>
                    ${badge}
                    <h3 class="course-title">${escapeHtml(course.name)}</h3>
                    <p class="course-description">${escapeHtml((course.description || 'Professional driver training course').substring(0, 120))}${(course.description || '').length > 120 ? '...' : ''}</p>
                    ${!isEnrolled ? `
                        <div style="margin: 0.5rem 0; font-weight: bold; color: ${isFree ? 'var(--neon-green)' : 'var(--warning)'}; font-size: 1.1rem;">
                            ${isFree ? 'FREE' : `KES ${price.toLocaleString()}`}
                        </div>
                    ` : `
                        <div class="course-progress">
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: ${progress}%"></div>
                            </div>
                            <div class="progress-text">${progress}% Complete</div>
                        </div>
                    `}
                    ${isEnrolled ? 
                        `<button class="btn-continue" onclick="accessCourse(${JSON.stringify(course).replace(/"/g, '&quot;')})">
                            ${progress === 100 ? '📋 Review Course' : '▶️ Continue Learning'}
                        </button>` :
                        `<button class="btn-enroll" onclick="enrollInCourse(${course.id}, '${course.name.replace(/'/g, "\\'")}')" ${enrollInProgress.has(course.id) ? 'disabled' : ''}>
                            ${enrollInProgress.has(course.id) ? '⏳ Enrolling...' : (isFree ? '🎓 Enroll Now - FREE' : '💰 Enroll Now')}
                        </button>`
                    }
                </div>
            `;
        }).join('');
    }
    
    // ============================================
    // INITIALIZATION
    // ============================================
    async function init() {
        if (!await checkAuth()) return;
        
        await fetchCourses();
        await fetchUserEnrollments();
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                renderCourses();
            });
        });
    }
    
    // Logout handler
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        setLoading(true);
        await supabase.auth.signOut();
        window.location.href = '/';
    });
    
    // Make functions global for onclick handlers
    window.enrollInCourse = enrollInCourse;
    window.accessCourse = accessCourse;
    window.fetchCourses = fetchCourses;
    
    // Start the app
    init();
</script>
</body>
</html>

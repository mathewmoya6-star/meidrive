<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Learner Dashboard | MEI Drive Africa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #041B3D;
            color: #fff;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: #0A234F;
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar h2 {
            color: #00FF88;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #B7C4D6;
            padding: 12px;
            text-decoration: none;
            margin-top: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .sidebar a:hover, .sidebar a.active {
            background: #00FF88;
            color: #041B3D;
        }

        .logout-btn {
            margin-top: 30px;
            background: #ff4d4f;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logout-btn:hover {
            background: #ff7875;
            transform: translateY(-2px);
        }

        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            background: #00FF88;
            color: #041B3D;
            border: none;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            z-index: 101;
            font-size: 1.2rem;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        .main {
            margin-left: 280px;
            padding: 20px;
            transition: margin-left 0.3s ease;
        }

        .card {
            background: #0A234F;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #041B3D;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            border-color: #00FF88;
            transform: translateY(-3px);
        }

        .stat-card i {
            font-size: 2rem;
            color: #00FF88;
            margin-bottom: 10px;
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #00FF88;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #B7C4D6;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .course-card {
            background: #041B3D;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 136, 0.15);
            transition: all 0.3s ease;
        }

        .course-card:hover {
            transform: translateY(-3px);
            border-color: #00FF88;
        }

        .course-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .course-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .badge-free { background: #ff9800; color: #041B3D; }
        .badge-premium { background: #00FF88; color: #041B3D; }
        .badge-enrolled { background: #00C851; color: #fff; }

        .course-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .course-description {
            color: #B7C4D6;
            font-size: 0.85rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .course-progress {
            margin: 15px 0;
        }
        .progress-bar-bg {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: #00FF88;
            height: 100%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.75rem;
            color: #B7C4D6;
            margin-top: 5px;
            text-align: center;
        }

        .btn-enroll, .btn-continue {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .btn-enroll {
            background: #00FF88;
            color: #041B3D;
        }
        .btn-enroll:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,136,0.3); }
        .btn-continue {
            background: transparent;
            border: 2px solid #00FF88;
            color: #00FF88;
        }
        .btn-continue:hover { background: #00FF88; color: #041B3D; }

        .btn-primary {
            background: #00FF88;
            color: #041B3D;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1a3a5f;
        }
        th {
            color: #00FF88;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #B7C4D6;
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 136, 0.3);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0A234F;
            border-left: 4px solid #00FF88;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast.error { border-left-color: #ff4d4f; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .price.free { color: #00FF88; }
        .price.premium { color: #ff9800; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main { margin-left: 0; padding: 60px 15px 20px 15px; }
            .mobile-menu-btn { display: block; }
            .overlay.active { display: block; }
            .stats-grid { grid-template-columns: 1fr; }
            .courses-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
    <h2><i class="fas fa-car"></i> MEI LEARNER</h2>
    <a href="javascript:void(0)" data-section="dashboard" onclick="showSection('dashboard')"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="javascript:void(0)" data-section="courses" onclick="showSection('courses')"><i class="fas fa-book"></i> My Courses</a>
    <a href="javascript:void(0)" data-section="progress" onclick="showSection('progress')"><i class="fas fa-chart-line"></i> My Progress</a>
    <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<div class="main">
    <!-- DASHBOARD SECTION -->
    <div id="dashboardSection">
        <h2><i class="fas fa-tachometer-alt"></i> Dashboard Overview</h2>
        <div class="stats-grid">
            <div class="stat-card" onclick="showSection('courses')">
                <i class="fas fa-book"></i>
                <h3 id="totalCourses">0</h3>
                <p>Available Courses</p>
            </div>
            <div class="stat-card" onclick="showSection('courses')">
                <i class="fas fa-check-circle"></i>
                <h3 id="enrolledCount">0</h3>
                <p>Enrolled Courses</p>
            </div>
            <div class="stat-card" onclick="showSection('progress')">
                <i class="fas fa-trophy"></i>
                <h3 id="completedCount">0</h3>
                <p>Completed</p>
            </div>
            <div class="stat-card" onclick="showSection('progress')">
                <i class="fas fa-chart-line"></i>
                <h3 id="overallProgress">0%</h3>
                <p>Overall Progress</p>
            </div>
        </div>

        <div class="card">
            <h3><i class="fas fa-star"></i> Recommended For You</h3>
            <div id="recommendedCourses" class="courses-grid"></div>
        </div>
    </div>

    <!-- MY COURSES SECTION -->
    <div id="coursesSection" style="display:none">
        <div class="card">
            <h2><i class="fas fa-book"></i> My Courses</h2>
            <button class="btn-primary" onclick="loadEnrolledCourses()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <div id="enrolledCoursesContainer" class="courses-grid"></div>
        </div>

        <div class="card">
            <h3><i class="fas fa-store"></i> Available Courses</h3>
            <div id="availableCoursesContainer" class="courses-grid"></div>
        </div>
    </div>

    <!-- PROGRESS SECTION -->
    <div id="progressSection" style="display:none">
        <div class="card">
            <h2><i class="fas fa-chart-line"></i> My Learning Progress</h2>
            <div id="progressTable" class="table-wrapper"></div>
        </div>
    </div>
</div>

<script>
    // COMPLETE COURSES DATA - FULLY HARDCODED, NO DATABASE NEEDED
    const COURSES = [
        { 
            id: 1, 
            name: 'Learner Hub - Complete Driver Training', 
            description: 'NTSA-approved curriculum from basics to road readiness. Covers traffic rules, vehicle controls, defensive driving, and complete exam preparation. Perfect for first-time drivers.', 
            price: 0, 
            type: 'free', 
            icon: '📚', 
            file: 'learner-hub.html', 
            totalUnits: 21,
            units: ['Introduction to Driving', 'Traffic Rules & Regulations', 'Vehicle Controls', 'Road Signs', 'Defensive Driving', 'Parking Techniques', 'Highway Driving', 'Night Driving', 'Emergency Procedures', 'Final Assessment']
        },
        { 
            id: 2, 
            name: 'Boda Boda Professional Course', 
            description: 'Professional motorcycle taxi training including safety, customer service, road regulations, and defensive riding techniques. NTSA certified curriculum for commercial boda boda operators.', 
            price: 0, 
            type: 'free', 
            icon: '🏍️', 
            file: 'boda-course.html', 
            totalUnits: 15,
            units: ['Motorcycle Basics', 'Safety Gear', 'Traffic Rules for Boda', 'Passenger Safety', 'Customer Service', 'Route Planning', 'Emergency Handling', 'Maintenance Basics']
        },
        { 
            id: 3, 
            name: 'Defensive Driving Course', 
            description: 'Master advanced driving techniques, hazard perception, emergency maneuvers, and accident avoidance strategies. Essential for all experienced drivers.', 
            price: 1999, 
            type: 'premium', 
            icon: '🛡️', 
            file: 'defensive-driving-course.html', 
            totalUnits: 12,
            units: ['Hazard Perception', 'Space Management', 'Emergency Braking', 'Skid Control', 'Night Driving', 'Weather Driving', 'Distraction Management', 'Final Test']
        },
        { 
            id: 4, 
            name: 'Professional Driver Course', 
            description: 'Comprehensive training for PSV, logistics, and commercial drivers including customer care, vehicle inspection, and transport regulations.', 
            price: 4999, 
            type: 'premium', 
            icon: '🚛', 
            file: 'professional-driver-course.html', 
            totalUnits: 20,
            units: ['Commercial Regulations', 'Vehicle Inspection', 'Logistics Planning', 'Customer Care', 'Route Management', 'Safety Protocols']
        },
        { 
            id: 5, 
            name: 'Electric Vehicle Course', 
            description: 'Master EV technology, charging systems, battery maintenance, and safety procedures for electric vehicles. Future-proof your driving career.', 
            price: 2999, 
            type: 'premium', 
            icon: '⚡', 
            file: 'ev-course-dynamic.html', 
            totalUnits: 10,
            units: ['EV Technology', 'Battery Systems', 'Charging Infrastructure', 'Range Management', 'Maintenance', 'Safety Procedures']
        },
        { 
            id: 6, 
            name: 'School Transport Safety', 
            description: 'Specialized certification for school bus drivers including child safety protocols, emergency procedures, and student management.', 
            price: 1999, 
            type: 'premium', 
            icon: '🚸', 
            file: 'school-transport-course.html', 
            totalUnits: 8,
            units: ['Child Safety', 'Loading Procedures', 'Emergency Protocols', 'Route Planning', 'Parent Communication', 'First Aid']
        },
        { 
            id: 7, 
            name: 'E-Safety Library', 
            description: 'Digital safety for drivers - online records management, apps, cybersecurity awareness, and digital compliance for modern driving.', 
            price: 0, 
            type: 'free', 
            icon: '💻', 
            file: 'e-safety-library.html', 
            totalUnits: 6,
            units: ['Digital Records', 'Mobile Apps', 'Cybersecurity', 'Online Compliance', 'Data Privacy']
        },
        { 
            id: 8, 
            name: 'Quiz Bank - Exam Preparation', 
            description: '1000+ NTSA practice questions to prepare for your driving theory test with detailed explanations and mock exams.', 
            price: 0, 
            type: 'free', 
            icon: '📝', 
            file: 'quiz-bank.html', 
            totalUnits: 10,
            units: ['Traffic Rules Quiz', 'Road Signs Quiz', 'Emergency Procedures', 'Mock Test 1', 'Mock Test 2']
        }
    ];

    // Local storage keys
    const STORAGE_KEY = 'mei_enrollments';
    const USER_KEY = 'mei_current_user';

    let currentUser = null;
    let userEnrollments = new Map();

    // Load from localStorage
    function loadUserData() {
        const savedUser = localStorage.getItem(USER_KEY);
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
        } else {
            // Demo user for testing - remove in production
            currentUser = { id: 'demo-user', email: 'learner@meidrive.com', name: 'Demo Learner' };
            localStorage.setItem(USER_KEY, JSON.stringify(currentUser));
        }

        const savedEnrollments = localStorage.getItem(`${STORAGE_KEY}_${currentUser.id}`);
        if (savedEnrollments) {
            const enrollments = JSON.parse(savedEnrollments);
            userEnrollments.clear();
            enrollments.forEach(e => {
                userEnrollments.set(e.courseId, { enrolled: true, progress: e.progress || 0 });
            });
        }
    }

    // Save enrollments to localStorage
    function saveEnrollments() {
        const enrollmentsArray = Array.from(userEnrollments.entries()).map(([courseId, data]) => ({
            courseId: courseId,
            progress: data.progress
        }));
        localStorage.setItem(`${STORAGE_KEY}_${currentUser.id}`, JSON.stringify(enrollmentsArray));
    }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function enrollInCourse(courseId, courseName) {
        if (userEnrollments.has(courseId)) {
            showToast('You are already enrolled in this course!');
            return;
        }
        
        userEnrollments.set(courseId, { enrolled: true, progress: 0 });
        saveEnrollments();
        updateStats();
        renderAllCourseSections();
        showToast(`✅ Successfully enrolled in ${courseName}!`);
    }

    function updateProgress(courseId, progress) {
        if (userEnrollments.has(courseId)) {
            const enrollment = userEnrollments.get(courseId);
            enrollment.progress = Math.min(100, progress);
            userEnrollments.set(courseId, enrollment);
            saveEnrollments();
            updateStats();
            renderAllCourseSections();
        }
    }

    function openCourse(course) {
        localStorage.setItem('currentCourse', JSON.stringify(course));
        // For demo, just show alert - replace with actual navigation
        alert(`Opening course: ${course.name}\n\nCourse content would load here.\nFile: ${course.file}\nTotal units: ${course.totalUnits}\n\nIn production, this would navigate to the course page.`);
        showToast(`Opening ${course.name}...`);
    }

    function updateStats() {
        const totalCourses = COURSES.length;
        const enrolledCount = userEnrollments.size;
        const completedCount = Array.from(userEnrollments.values()).filter(e => e.progress === 100).length;
        const totalProgress = Array.from(userEnrollments.values()).reduce((sum, e) => sum + e.progress, 0);
        const avgProgress = enrolledCount > 0 ? Math.round(totalProgress / enrolledCount) : 0;
        
        document.getElementById('totalCourses').textContent = totalCourses;
        document.getElementById('enrolledCount').textContent = enrolledCount;
        document.getElementById('completedCount').textContent = completedCount;
        document.getElementById('overallProgress').textContent = `${avgProgress}%`;
    }

    function renderRecommendedCourses() {
        const container = document.getElementById('recommendedCourses');
        const recommended = COURSES.slice(0, 3);
        
        container.innerHTML = recommended.map(course => {
            const isEnrolled = userEnrollments.has(course.id);
            const isFree = course.type === 'free' || course.price === 0;
            
            return `
                <div class="course-card">
                    <div class="course-icon">${course.icon}</div>
                    <span class="course-badge ${isFree ? 'badge-free' : 'badge-premium'}">${isFree ? 'FREE' : 'PREMIUM'}</span>
                    <h3 class="course-title">${escapeHtml(course.name)}</h3>
                    <p class="course-description">${escapeHtml(course.description.substring(0, 100))}...</p>
                    ${isEnrolled ? 
                        `<button class="btn-continue" onclick="openCourse(${JSON.stringify(course).replace(/"/g, '&quot;')})">▶️ Continue Learning</button>` :
                        `<div class="price ${isFree ? 'free' : 'premium'}">${isFree ? 'FREE' : `KES ${course.price.toLocaleString()}`}</div>
                        <button class="btn-enroll" onclick="enrollInCourse(${course.id}, '${escapeHtml(course.name)}')">🎓 Enroll Now</button>`
                    }
                </div>
            `;
        }).join('');
    }

    function renderEnrolledCourses() {
        const container = document.getElementById('enrolledCoursesContainer');
        const enrolledCourses = COURSES.filter(c => userEnrollments.has(c.id));
        
        if (enrolledCourses.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-book-open"></i><h3>No enrolled courses yet</h3><p>Browse available courses below and enroll to get started!</p></div>`;
            return;
        }
        
        container.innerHTML = enrolledCourses.map(course => {
            const enrollment = userEnrollments.get(course.id);
            const progress = enrollment?.progress || 0;
            
            return `
                <div class="course-card">
                    <div class="course-icon">${course.icon}</div>
                    <span class="course-badge badge-enrolled">✅ ENROLLED</span>
                    <h3 class="course-title">${escapeHtml(course.name)}</h3>
                    <p class="course-description">${escapeHtml(course.description.substring(0, 100))}...</p>
                    <div class="course-progress">
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${progress}%"></div></div>
                        <div class="progress-text">${progress}% Complete</div>
                    </div>
                    <button class="btn-continue" onclick="openCourse(${JSON.stringify(course).replace(/"/g, '&quot;')})">
                        ${progress === 100 ? '📋 Review Course' : '▶️ Continue Learning'}
                    </button>
                </div>
            `;
        }).join('');
    }

    function renderAvailableCourses() {
        const container = document.getElementById('availableCoursesContainer');
        const availableCourses = COURSES.filter(c => !userEnrollments.has(c.id));
        
        if (availableCourses.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-check-circle"></i><h3>You're enrolled in all courses!</h3><p>Great job! Keep learning and complete your courses.</p></div>`;
            return;
        }
        
        container.innerHTML = availableCourses.map(course => {
            const isFree = course.type === 'free' || course.price === 0;
            
            return `
                <div class="course-card">
                    <div class="course-icon">${course.icon}</div>
                    <span class="course-badge ${isFree ? 'badge-free' : 'badge-premium'}">${isFree ? 'FREE' : 'PREMIUM'}</span>
                    <h3 class="course-title">${escapeHtml(course.name)}</h3>
                    <p class="course-description">${escapeHtml(course.description.substring(0, 100))}...</p>
                    <div class="price ${isFree ? 'free' : 'premium'}">${isFree ? 'FREE' : `KES ${course.price.toLocaleString()}`}</div>
                    <button class="btn-enroll" onclick="enrollInCourse(${course.id}, '${escapeHtml(course.name)}')">🎓 Enroll Now</button>
                </div>
            `;
        }).join('');
    }

    function renderProgressTable() {
        const container = document.getElementById('progressTable');
        const enrolledCourses = COURSES.filter(c => userEnrollments.has(c.id));
        
        if (enrolledCourses.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-chart-line"></i><h3>No progress data yet</h3><p>Enroll in a course to start tracking your progress!</p></div>`;
            return;
        }
        
        let html = `<table><thead><tr><th>Course</th><th>Progress</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
        enrolledCourses.forEach(course => {
            const enrollment = userEnrollments.get(course.id);
            const progress = enrollment?.progress || 0;
            const status = progress === 100 ? '✅ Completed' : '🔄 In Progress';
            
            html += `<tr>
                <td>${escapeHtml(course.name)}</td>
                <td>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <div class="progress-bar-bg" style="width: 150px;"><div class="progress-bar-fill" style="width: ${progress}%"></div></div>
                        <span>${progress}%</span>
                    </div>
                </td>
                <td>${status}</td>
                <td><button class="btn-continue" style="padding: 6px 12px; font-size: 0.8rem;" onclick="openCourse(${JSON.stringify(course).replace(/"/g, '&quot;')})">Continue</button></td>
            </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function renderAllCourseSections() {
        renderEnrolledCourses();
        renderAvailableCourses();
        renderRecommendedCourses();
        renderProgressTable();
        updateStats();
    }

    function loadEnrolledCourses() {
        renderAllCourseSections();
        showToast('Courses refreshed!');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function showSection(section) {
        document.getElementById('dashboardSection').style.display = section === 'dashboard' ? 'block' : 'none';
        document.getElementById('coursesSection').style.display = section === 'courses' ? 'block' : 'none';
        document.getElementById('progressSection').style.display = section === 'progress' ? 'block' : 'none';
        
        document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
        const activeLink = document.querySelector(`.sidebar a[data-section="${section}"]`);
        if (activeLink) activeLink.classList.add('active');
        
        if (section === 'progress') {
            renderProgressTable();
        }
    }

    function handleLogout() {
        if (confirm('Are you sure you want to logout?')) {
            // Clear demo user data
            localStorage.removeItem(USER_KEY);
            localStorage.removeItem(`${STORAGE_KEY}_demo-user`);
            showToast('Logged out successfully!');
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        }
    }

    function openMobileMenu() {
        document.getElementById('sidebar').classList.add('active');
        document.getElementById('overlay').classList.add('active');
    }

    function closeMobileMenu() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }

    // Initialize
    loadUserData();
    updateStats();
    renderRecommendedCourses();
    
    // Event listeners
    document.getElementById('mobileMenuBtn').addEventListener('click', openMobileMenu);
    document.getElementById('overlay').addEventListener('click', closeMobileMenu);
    
    // Make functions global
    window.showSection = showSection;
    window.handleLogout = handleLogout;
    window.enrollInCourse = enrollInCourse;
    window.openCourse = openCourse;
    window.loadEnrolledCourses = loadEnrolledCourses;
    window.updateProgress = updateProgress;
</script>
</body>
</html>

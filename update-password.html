<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0e27; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .update-card { background: #1a1f3a; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(0,255,136,0.2); }
        .update-card h1 { color: #00ff88; margin-bottom: 10px; }
        .update-card input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #00ff88; background: #0a0e27; color: white; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: #00ff88; color: #0a0e27; }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; }
        .success { background: rgba(0,255,136,0.2); color: #00ff88; }
        .error { background: rgba(255,68,68,0.2); color: #ff8888; }
    </style>
</head>
<body>
    <div class="update-card">
        <h1>Create New Password</h1>
        <p style="margin-bottom: 20px; color: #a0a0c0;">Enter your new password below</p>
        <input type="password" id="password" placeholder="New password">
        <input type="password" id="confirmPassword" placeholder="Confirm password">
        <button class="btn btn-primary" onclick="updatePassword()">Update Password</button>
        <div id="message"></div>
    </div>
    <script>
        async function updatePassword() { const password = document.getElementById('password').value; const confirm = document.getElementById('confirmPassword').value; if (!password) { showMessage('Please enter a password', 'error'); return; } if (password !== confirm) { showMessage('Passwords do not match', 'error'); return; } if (password.length < 6) { showMessage('Password must be at least 6 characters', 'error'); return; } const result = await window.MEIDrive.updatePassword(password); if (result.success) { showMessage('✅ Password updated! Redirecting...', 'success'); setTimeout(() => window.location.href = 'index.html', 3000); } else showMessage('❌ ' + result.error, 'error'); }
        function showMessage(msg, type) { const div = document.getElementById('message'); div.innerHTML = `<div class="message ${type}">${msg}</div>`; }
    </script>
</body>
</html>

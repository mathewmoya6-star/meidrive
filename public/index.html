<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | Driver Training</title>
    <meta name="description" content="NTSA-approved driver training platform. Practice daily, revise smarter, pass with confidence.">
    <meta name="theme-color" content="#0a192f">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0a192f; 
            color: #ffffff; 
            line-height: 1.5;
            overflow-x: hidden;
        }
        :root { 
            --primary: #00ff88; 
            --dark-card: #0d2137; 
            --border: rgba(0,255,136,0.25); 
            --text-muted: #a0b3d9; 
        }
        
        .navbar { 
            position: fixed; 
            top: 0; 
            left: 0;
            right: 0;
            width: 100%; 
            background: rgba(10,25,47,0.98); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid var(--border); 
            z-index: 1000; 
            padding: 0.8rem 2rem; 
        }
        .nav-container { 
            max-width: 1400px; 
            margin: 0 auto; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: 1rem; 
        }
        .logo { 
            font-size: 1.3rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #00ff88, #00cc66); 
            -webkit-background-clip: text; 
            background-clip: text; 
            color: transparent; 
            cursor: pointer; 
        }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links button { 
            background: transparent; 
            border: none; 
            color: #a0b3d9; 
            padding: 8px 14px; 
            border-radius: 50px; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .nav-links button:hover { background: rgba(0,255,136,0.1); color: var(--primary); }
        .btn { 
            padding: 12px 28px; 
            border-radius: 50px; 
            font-weight: 700; 
            cursor: pointer; 
            border: none; 
            transition: 0.2s; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
        }
        .btn-primary { background: linear-gradient(135deg, #00ff88, #00cc66); color: #0a192f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,255,136,0.3); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: rgba(0,255,136,0.1); }
        .btn-sm { padding: 6px 12px; font-size: 0.75rem; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.8rem; margin: 2rem 0; }
        .card { 
            background: #0d2137; 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 1.5rem; 
            transition: 0.2s; 
            cursor: pointer; 
        }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        
        .hero { 
            text-align: center; 
            padding: 120px 20px 60px; 
            background: linear-gradient(135deg, rgba(10,25,47,0.95), rgba(13,33,55,0.85)), url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?w=1600'); 
            background-size: cover; 
            margin-bottom: 2rem; 
        }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero h1 span { color: var(--primary); }
        .hero p { color: var(--text-muted); max-width: 600px; margin: 0 auto; }
        
        .stats-bar { 
            background: #0d2137; 
            padding: 2rem; 
            display: flex; 
            justify-content: space-around; 
            flex-wrap: wrap; 
            gap: 2rem; 
            text-align: center; 
            border-bottom: 1px solid var(--border); 
        }
        .stat-item h3 { font-size: 2rem; color: var(--primary); }
        .section-title { text-align: center; font-size: 2rem; margin: 2rem 0; }
        .section-title span { color: var(--primary); }
        
        .course-price { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin: 0.5rem 0; }
        .progress-bar { background: #1e2a3a; border-radius: 10px; height: 6px; margin: 12px 0; }
        .progress-fill { background: var(--primary); height: 6px; border-radius: 10px; width: 0%; }
        
        .quiz-question { font-size: 1.2rem; margin-bottom: 1.5rem; font-weight: 500; }
        .quiz-option { 
            background: #112240; 
            padding: 12px 16px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            border: 1px solid var(--border); 
            transition: 0.2s; 
        }
        .quiz-option:hover { border-color: var(--primary); background: rgba(0,255,136,0.1); }
        .quiz-option.correct { background: rgba(0,255,136,0.2); border-color: #00ff88; }
        .quiz-option.wrong { background: rgba(255,71,87,0.2); border-color: #ff4757; }
        .quiz-feedback { margin-top: 1rem; padding: 12px; border-radius: 12px; }
        
        .lesson-nav { 
            display: flex; 
            justify-content: space-between; 
            margin-top: 2rem; 
            gap: 1rem; 
            flex-wrap: wrap; 
        }
        .lesson-content { 
            line-height: 1.8; 
            font-size: 1rem; 
            min-height: 300px;
        }
        .lesson-content h1 { font-size: 1.8rem; margin: 1rem 0 0.5rem; color: var(--primary); }
        .lesson-content h2 { font-size: 1.5rem; margin: 1rem 0 0.5rem; color: var(--primary); }
        .lesson-content h3 { font-size: 1.3rem; margin: 0.8rem 0 0.5rem; color: var(--primary); }
        .lesson-content p { margin: 0.5rem 0; }
        .lesson-content ul, .lesson-content ol { margin: 0.5rem 0 0.5rem 1.5rem; }
        .lesson-content li { margin: 0.25rem 0; }
        .lesson-content strong { color: var(--primary); }
        
        .loading-spinner { 
            width: 40px; 
            height: 40px; 
            border: 3px solid #1e2a3a; 
            border-top-color: var(--primary); 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 40px auto; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1100; }
        .toast { 
            background: #0d2137; 
            border-left: 4px solid var(--primary); 
            padding: 12px 20px; 
            border-radius: 12px; 
            margin-top: 8px; 
            animation: slideIn 0.3s ease; 
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); margin-top: 2rem; }
        
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.96); 
            backdrop-filter: blur(12px); 
            z-index: 2000; 
            justify-content: center; 
            align-items: center; 
        }
        .modal.active { display: flex; }
        .modal-content { 
            background: #0d2137; 
            border: 1px solid var(--primary); 
            border-radius: 24px; 
            width: 90%; 
            max-width: 450px; 
            padding: 2rem; 
        }
        .modal-content input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: #0f1a2c; 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            color: white; 
        }
        
        .user-badge { 
            background: rgba(0,255,136,0.15); 
            border-radius: 40px; 
            padding: 6px 16px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
        }
        .mobile-menu { display: none; font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        
        @media (max-width: 768px) { 
            .hero h1 { font-size: 2rem; } 
            .nav-links { display: none; width: 100%; flex-direction: column; padding: 1rem 0; } 
            .nav-links.show { display: flex; } 
            .mobile-menu { display: block; } 
            .grid { grid-template-columns: 1fr; }
        }
        
        button:disabled, .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<div id="app">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="navigateTo('home')">MEI DRIVE AFRICA</div>
            <div class="mobile-menu" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></div>
            <div class="nav-links" id="navLinks">
                <button onclick="navigateTo('home')">🏠 Home</button>
                <button onclick="navigateTo('courses')">📚 Courses</button>
                <button onclick="navigateTo('quiz')">📝 Quiz</button>
                <div id="authButtons"></div>
            </div>
        </div>
    </nav>
    <main id="page-content"><div class="loading-spinner"></div></main>
    <footer>© 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training</footer>
</div>
<div id="toast-container"></div>

<script>
    const SUPABASE_URL = 'https://qpqkmmkrzxlhcpccefjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s';
    
    let supabase;
    let currentUser = null;
    let currentPage = 'home';
    let courses = [];
    let lessons = [];
    let questions = [];
    let userProgress = {};
    
    // Lesson navigation state
    let currentCourseId = null;
    let currentLessonIndex = 0;
    let currentCourseLessons = [];
    
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function toggleMobileMenu() { document.getElementById('navLinks')?.classList.toggle('show'); }
    
    // Convert markdown-style content to HTML
    function formatContent(content) {
        if (!content) return '<p>Content coming soon...</p>';
        
        let html = content;
        
        // Convert headers
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        
        // Convert bold
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        
        // Convert lists
        html = html.replace(/^- (.*$)/gm, '<li>$1</li>');
        html = html.replace(/<li>.*?<\/li>/gs, match => `<ul>${match}</ul>`);
        
        // Convert paragraphs
        html = html.replace(/^(?!<[hl]|<ul|<li)(.*$)/gm, '<p>$1</p>');
        
        // Clean up empty paragraphs
        html = html.replace(/<p>\s*<\/p>/g, '');
        
        return html;
    }
    
    async function loadCourses() {
        const { data, error } = await supabase.from('courses').select('*');
        if (!error) courses = data || [];
        console.log('Courses:', courses.length);
    }
    
    async function loadLessons() {
        const { data, error } = await supabase.from('lessons').select('*');
        if (!error) lessons = data || [];
        console.log('Lessons:', lessons.length);
    }
    
    async function loadQuestions() {
        const { data, error } = await supabase.from('questions').select('*');
        if (!error) questions = data || [];
        console.log('Questions:', questions.length);
    }
    
    async function loadUserProgress() {
        if (!currentUser) return;
        const { data, error } = await supabase.from('user_progress').select('lesson_id, progress_percentage').eq('user_id', currentUser.id);
        if (!error && data) {
            userProgress = {};
            data.forEach(p => { userProgress[p.lesson_id] = p.progress_percentage; });
        }
    }
    
    async function updateProgress(lessonId, progress) {
        if (!currentUser) { showToast('Please login to track progress', 'warning'); return false; }
        const { error } = await supabase.from('user_progress').upsert({
            user_id: currentUser.id,
            lesson_id: lessonId,
            progress_percentage: progress,
            last_accessed_at: new Date()
        });
        if (!error) {
            userProgress[lessonId] = progress;
            showToast(progress === 100 ? '🎉 Lesson completed!' : 'Progress saved', 'success');
            return true;
        }
        return false;
    }
    
    async function init() {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: { session } } = await supabase.auth.getSession();
        currentUser = session?.user || null;
        updateAuthUI();
        await Promise.all([loadCourses(), loadLessons(), loadQuestions()]);
        await loadUserProgress();
        renderPage();
    }
    
    function updateAuthUI() {
        const container = document.getElementById('authButtons');
        if (!container) return;
        if (currentUser) {
            container.innerHTML = `<div class="user-badge"><i class="fas fa-user"></i> ${currentUser.email.split('@')[0]}</div><button onclick="logout()" style="margin-left:8px;">Logout</button>`;
        } else {
            container.innerHTML = `<button onclick="showLoginModal()">Login</button><button onclick="showSignupModal()">Sign Up</button>`;
        }
    }
    
    async function logout() { await supabase.auth.signOut(); currentUser = null; updateAuthUI(); renderPage(); showToast('Logged out', 'info'); }
    
    function showLoginModal() {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="max-width:450px; margin:100px auto;">
                <div class="card"><h2>🔐 Login</h2>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button class="btn btn-primary" style="width:100%" onclick="performLogin()">Login</button>
                <p style="margin-top:1rem;">No account? <span style="color:var(--primary);cursor:pointer;" onclick="showSignupModal()">Sign up</span></p>
                <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="renderPage()">Cancel</button></div></div>`;
    }
    
    function showSignupModal() {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="max-width:450px; margin:100px auto;">
                <div class="card"><h2>📝 Sign Up</h2>
                <input type="text" id="signupName" placeholder="Full Name">
                <input type="email" id="signupEmail" placeholder="Email">
                <input type="password" id="signupPassword" placeholder="Password (min 6)">
                <button class="btn btn-primary" style="width:100%" onclick="performSignup()">Create Account</button>
                <p style="margin-top:1rem;">Have an account? <span style="color:var(--primary);cursor:pointer;" onclick="showLoginModal()">Login</span></p>
                <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="renderPage()">Cancel</button></div></div>`;
    }
    
    async function performLogin() {
        const email = document.getElementById('loginEmail')?.value;
        const password = document.getElementById('loginPassword')?.value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) showToast(error.message, 'error');
        else { showToast('Logged in!', 'success'); await init(); }
    }
    
    async function performSignup() {
        const email = document.getElementById('signupEmail')?.value;
        const password = document.getElementById('signupPassword')?.value;
        const fullName = document.getElementById('signupName')?.value;
        const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
        if (error) showToast(error.message, 'error');
        else { showToast('Account created! Please verify email.', 'success'); renderPage(); }
    }
    
    // ==================== PAGE RENDERING ====================
    function renderHome() {
        document.getElementById('page-content').innerHTML = `
            <div class="hero"><h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1>
            <p>NTSA-approved courses for Learner, EV, Boda Boda, PSV, and more.</p>
            <button class="btn btn-primary" onclick="navigateTo('courses')">🚀 Explore Courses</button></div>
            <div class="stats-bar"><div class="stat-item"><h3>${courses.length}</h3><p>Courses</p></div><div class="stat-item"><h3>${lessons.length}</h3><p>Lessons</p></div><div class="stat-item"><h3>${questions.length}</h3><p>Questions</p></div></div>
            <div class="container"><h2 class="section-title">Our <span>Courses</span></h2><div class="grid" id="homeGrid"></div></div>`;
        
        const grid = document.getElementById('homeGrid');
        if (grid && courses.length) {
            grid.innerHTML = courses.slice(0, 3).map(c => `<div class="card" onclick="viewCourse(${c.id})"><i class="fas ${c.icon || 'fa-book'}" style="font-size:2rem; color:var(--primary);"></i><h3>${escapeHtml(c.name)}</h3><p>${escapeHtml(c.description || '')}</p><div class="course-price">${c.price === 0 ? 'FREE' : `KES ${c.price.toLocaleString()}`}</div><button class="btn btn-primary">View Course</button></div>`).join('');
        }
    }
    
    function renderCourses() {
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><h1 class="section-title">All <span>Courses</span></h1><div class="grid" id="coursesGrid"></div></div>`;
        const grid = document.getElementById('coursesGrid');
        if (grid && courses.length) {
            grid.innerHTML = courses.map(c => `<div class="card" onclick="viewCourse(${c.id})"><i class="fas ${c.icon || 'fa-book'}" style="font-size:2rem; color:var(--primary);"></i><h3>${escapeHtml(c.name)}</h3><p>${escapeHtml(c.description || '')}</p><div class="course-price">${c.price === 0 ? 'FREE' : `KES ${c.price.toLocaleString()}`}</div><button class="btn btn-primary">View Course</button></div>`).join('');
        }
    }
    
    function viewCourse(courseId) {
        const course = courses.find(c => c.id === courseId);
        const courseLessons = lessons.filter(l => l.course_id === courseId).sort((a,b) => a.order - b.order);
        const completedCount = courseLessons.filter(l => userProgress[l.id] === 100).length;
        const progressPercent = courseLessons.length ? Math.round((completedCount / courseLessons.length) * 100) : 0;
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top:100px;">
                <div style="background:linear-gradient(135deg,rgba(0,255,136,0.1),#0d2137); border-radius:20px; padding:2rem; margin-bottom:2rem;">
                    <h1>${escapeHtml(course.name)}</h1>
                    <p>${escapeHtml(course.description || '')}</p>
                    <div class="course-price">${course.price === 0 ? 'FREE' : `KES ${course.price.toLocaleString()}`}</div>
                    ${progressPercent > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width:${progressPercent}%"></div><p style="margin-top:5px;">${progressPercent}% Complete</p></div>` : ''}
                </div>
                <div class="card"><h3>📖 Course Modules (${courseLessons.length} lessons)</h3>
                ${courseLessons.length ? `<div class="grid">${courseLessons.map((l, idx) => `<div class="card" onclick="startLesson(${courseId}, ${l.id}, ${idx})"><h4>${idx+1}. ${escapeHtml(l.title)}</h4>${userProgress[l.id] === 100 ? '<span style="color:#00ff88; font-size:0.8rem;">✓ Completed</span>' : ''}<div class="progress-bar"><div class="progress-fill" style="width:${userProgress[l.id] || 0}%"></div></div><button class="btn btn-outline btn-sm">Continue</button></div>`).join('')}</div>` : '<p>No lessons available yet. Content coming soon.</p>'}
                <button class="btn btn-outline" style="margin-top:1rem;" onclick="navigateTo('courses')">← Back to Courses</button></div>
            </div>`;
    }
    
    function startLesson(courseId, lessonId, lessonIndex) {
        currentCourseId = courseId;
        currentLessonIndex = lessonIndex;
        currentCourseLessons = lessons.filter(l => l.course_id === courseId).sort((a,b) => a.order - b.order);
        renderLessonPage();
    }
    
    function renderLessonPage() {
        const lesson = currentCourseLessons[currentLessonIndex];
        if (!lesson) return;
        
        const progress = userProgress[lesson.id] || 0;
        const totalLessons = currentCourseLessons.length;
        const isLast = currentLessonIndex === totalLessons - 1;
        const isFirst = currentLessonIndex === 0;
        
        // Format the content with proper HTML
        const formattedContent = formatContent(lesson.content || 'Content coming soon...');
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top:100px; max-width:900px;">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:1rem;">
                        <h2>${escapeHtml(lesson.title)}</h2>
                        <span style="background:var(--primary); color:#0a192f; padding:4px 12px; border-radius:50px;">Lesson ${currentLessonIndex+1} of ${totalLessons}</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                    <div class="lesson-content">${formattedContent}</div>
                    <div class="lesson-nav">
                        <button class="btn btn-outline" onclick="previousLesson()" ${isFirst ? 'disabled' : ''}>◀ Previous</button>
                        <button class="btn btn-primary" onclick="markAndContinue()">✓ Mark Complete & Continue</button>
                        <button class="btn btn-outline" onclick="nextLesson()" ${isLast ? 'disabled' : ''}>Next ▶</button>
                    </div>
                    <button class="btn btn-outline" style="margin-top:1rem;" onclick="viewCourse(${currentCourseId})">← Back to Course</button>
                </div>
            </div>`;
    }
    
    async function markAndContinue() {
        const lesson = currentCourseLessons[currentLessonIndex];
        if (!lesson) return;
        
        await updateProgress(lesson.id, 100);
        
        if (currentLessonIndex < currentCourseLessons.length - 1) {
            currentLessonIndex++;
            renderLessonPage();
            showToast('Lesson completed! Moving to next lesson...', 'success');
        } else {
            showToast('🎉 Congratulations! You have completed all lessons in this course!', 'success');
            viewCourse(currentCourseId);
        }
    }
    
    function nextLesson() {
        if (currentLessonIndex < currentCourseLessons.length - 1) {
            currentLessonIndex++;
            renderLessonPage();
        }
    }
    
    function previousLesson() {
        if (currentLessonIndex > 0) {
            currentLessonIndex--;
            renderLessonPage();
        }
    }
    
    // Make functions global for onclick handlers
    window.previousLesson = previousLesson;
    window.nextLesson = nextLesson;
    window.markAndContinue = markAndContinue;
    window.startLesson = startLesson;
    
    function renderQuiz() {
        if (!questions.length) {
            document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><div class="card"><h2>📝 No Questions Available</h2><p>Quiz questions will appear here once added to the database.</p></div></div>`;
            return;
        }
        
        let currentIndex = 0;
        let score = 0;
        let userAnswers = [];
        
        function renderQuestion() {
            if (currentIndex >= questions.length) {
                const percent = Math.round((score / questions.length) * 100);
                document.getElementById('quizContainer').innerHTML = `
                    <div style="text-align:center; padding:2rem;">
                        <h3>🎉 Quiz Complete!</h3>
                        <p>Your score: ${score} / ${questions.length} (${percent}%)</p>
                        <button class="btn btn-primary" onclick="navigateTo('home')">Done</button>
                        <button class="btn btn-outline" onclick="renderQuiz()">Restart Quiz</button>
                    </div>`;
                return;
            }
            const q = questions[currentIndex];
            const options = [q.option_a, q.option_b, q.option_c, q.option_d];
            const correctLetter = q.correct_option;
            
            document.getElementById('quizContainer').innerHTML = `
                <div class="quiz-question"><strong>Question ${currentIndex+1} of ${questions.length}</strong><br>${escapeHtml(q.question_text)}</div>
                <div class="quiz-options" id="quizOptions">
                    ${options.map((opt, idx) => `<div class="quiz-option" data-idx="${idx}" onclick="submitQuizAnswer(${currentIndex}, ${idx}, '${correctLetter}')">${String.fromCharCode(65+idx)}. ${escapeHtml(opt)}</div>`).join('')}
                </div>
                <div id="quizFeedback" class="quiz-feedback"></div>`;
        }
        
        window.submitQuizAnswer = (qIdx, selectedIdx, correctLetter) => {
            if (userAnswers[qIdx] !== undefined) return;
            userAnswers[qIdx] = selectedIdx;
            
            const correctIndex = correctLetter === 'a' ? 0 : correctLetter === 'b' ? 1 : correctLetter === 'c' ? 2 : 3;
            const isCorrect = selectedIdx === correctIndex;
            if (isCorrect) score++;
            
            const q = questions[qIdx];
            const fb = document.getElementById('quizFeedback');
            fb.innerHTML = `<span style="color:${isCorrect ? '#00ff88' : '#ff4757'}">${isCorrect ? '✓ Correct!' : `✗ Incorrect. Correct answer: ${correctLetter.toUpperCase()}. ${q.explanation || ''}`}</span><button class="btn btn-primary" style="margin-top:1rem;" onclick="nextQuizQuestion()">Next →</button>`;
            
            document.querySelectorAll('.quiz-option').forEach(opt => {
                opt.style.pointerEvents = 'none';
                const idx = parseInt(opt.dataset.idx);
                if (idx === correctIndex) opt.classList.add('correct');
                if (idx === selectedIdx && !isCorrect) opt.classList.add('wrong');
            });
        };
        
        window.nextQuizQuestion = () => { currentIndex++; renderQuestion(); };
        
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><div class="card"><h2>📝 NTSA Practice Exam</h2><div id="quizContainer"></div></div></div>`;
        renderQuestion();
    }
    
    async function renderPage() {
        const container = document.getElementById('page-content');
        container.innerHTML = '<div class="loading-spinner"></div>';
        await Promise.all([loadCourses(), loadLessons(), loadQuestions()]);
        await loadUserProgress();
        
        if (currentPage === 'home') renderHome();
        else if (currentPage === 'courses') renderCourses();
        else if (currentPage === 'quiz') renderQuiz();
        else renderHome();
        
        if (window.innerWidth <= 768) document.getElementById('navLinks')?.classList.remove('show');
        window.scrollTo({ top: 0 });
    }
    
    function navigateTo(page) { 
        currentPage = page; 
        renderPage(); 
    }
    
    window.navigateTo = navigateTo;
    window.viewCourse = viewCourse;
    
    init();
</script>
</body>
</html>

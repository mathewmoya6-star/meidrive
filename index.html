<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | NTSA Driver Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a192f; color: #ffffff; line-height: 1.5; }
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc66;
            --gradient-green: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            --dark-card: #0d2137;
            --border: rgba(0, 255, 136, 0.25);
            --text-muted: #a0b3d9;
        }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 25, 47, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0.8rem 2rem;
        }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: var(--gradient-green);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i { color: var(--primary); font-size: 1.5rem; }
        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links button, .nav-links a {
            background: transparent;
            border: none;
            color: #a0b3d9;
            padding: 8px 14px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: 0.2s;
        }
        .nav-links button:hover, .nav-links a:hover {
            background: rgba(0, 255, 136, 0.1);
            color: var(--primary);
        }
        .btn-primary-nav {
            background: var(--gradient-green);
            color: #0a192f !important;
            font-weight: 700;
        }
        .user-badge {
            background: rgba(0, 255, 136, 0.15);
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        .mobile-menu {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary);
        }
        @media (max-width: 768px) {
            .navbar { padding: 0.8rem 1rem; }
            .nav-links { display: none; width: 100%; flex-direction: column; padding: 1rem 0; }
            .nav-links.show { display: flex; }
            .mobile-menu { display: block; }
        }
        .hero {
            min-height: 85vh;
            background: linear-gradient(135deg, rgba(10,25,47,0.95), rgba(13,33,55,0.85)), url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?auto=format&fit=crop&w=2070&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 100px 2rem 4rem;
        }
        .hero-content { max-width: 1400px; margin: 0 auto; }
        .hero h1 { font-size: 3.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 1.5rem; }
        .hero h1 span { color: var(--primary); }
        .hero p { font-size: 1.1rem; color: var(--text-muted); max-width: 600px; margin-bottom: 2rem; }
        .btn {
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary { background: var(--gradient-green); color: #0a192f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,255,136,0.3); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .stats-bar {
            background: #0d2137;
            border-bottom: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 2rem;
            text-align: center;
        }
        .stat-item h3 { font-size: 2rem; color: var(--primary); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .section { padding: 4rem 0; }
        .section-title { text-align: center; font-size: 2.2rem; margin-bottom: 2.5rem; }
        .section-title span { color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.8rem; }
        .card {
            background: #0d2137;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: 0.3s;
            cursor: pointer;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .module-price { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 0.8rem 0; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(12px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0d2137;
            border: 1px solid var(--primary);
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            padding: 2rem;
        }
        .modal-content input {
            background: #0f1a2c;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 12px;
            color: white;
            width: 100%;
            margin: 8px 0;
        }
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 2100;
        }
        .toast {
            background: #0d2137;
            border-left: 4px solid var(--primary);
            padding: 12px 20px;
            border-radius: 12px;
            margin-top: 8px;
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        .toast-close { cursor: pointer; background: none; border: none; color: var(--text-muted); }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e2a3a;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; }
        footer a { color: var(--primary); text-decoration: none; }
        @media (max-width: 768px) { .hero h1 { font-size: 2rem; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div id="app">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="app.navigate('home')"><i class="fas fa-car"></i> MEI DRIVE AFRICA</div>
            <div class="mobile-menu" onclick="app.toggleMobileMenu()"><i class="fas fa-bars"></i></div>
            <div class="nav-links" id="navLinks">
                <button onclick="app.navigate('home')">🏠 Home</button>
                <button onclick="app.navigate('courses')">📚 Courses</button>
                <button onclick="app.navigate('quiz')">📝 Quiz</button>
                <button onclick="app.navigate('library')">📖 Safety Library</button>
                <button id="dashboardNavBtn" onclick="app.navigate('dashboard')" style="display:none;">📊 Dashboard</button>
                <div id="authButtons"></div>
            </div>
        </div>
    </nav>
    <main id="page-content"><div class="container" style="padding:120px 20px;"><div class="loading-spinner"></div></div></main>
    <footer>© 2026 MEI DRIVE AFRICA | NTSA Approved | <a href="#" onclick="app.showLegal('privacy')">Privacy</a> | <a href="#" onclick="app.showLegal('terms')">Terms</a></footer>
</div>
<div id="toast-container" class="toast-container"></div>

<script>
    // ==================== CONFIGURATION ====================
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    let supabase = null;
    let currentUser = null;
    let isAdmin = false;
    let currentRoute = 'home';
    let routeParams = {};
    
    const coursesData = [
        { id: 1, name: "Learner Hub", type: "learner", price: 0, description: "Complete NTSA-approved driver training", icon: "fa-id-card" },
        { id: 2, name: "EV Drivers & Riders", type: "ev", price: 0, description: "Electric vehicle safety training", icon: "fa-charging-station" },
        { id: 3, name: "Boda Boda Safety", type: "boda", price: 0, description: "Motorcycle safety & defensive riding", icon: "fa-motorcycle" },
        { id: 4, name: "PSV Professional", type: "psv", price: 2999, description: "Commercial driver certification", icon: "fa-bus" },
        { id: 5, name: "School Bus/Van Driver", type: "schoolbus", price: 1999, description: "School transport safety training", icon: "fa-chalkboard-user" },
        { id: 6, name: "Advanced Driver Academy", type: "advanced", price: 4999, description: "Professional driver excellence", icon: "fa-award" }
    ];
    
    // ==================== HELPER FUNCTIONS ====================
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${msg} <button class="toast-close" onclick="this.parentElement.remove()">×</button>`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    // ==================== SUPABASE INITIALIZATION ====================
    async function initSupabase() {
        // Wait for Supabase script to load
        if (!window.supabase) {
            showToast("Loading Supabase... Please wait or refresh.", "warning");
            await new Promise(resolve => setTimeout(resolve, 1000));
            if (!window.supabase) {
                showToast("Failed to load Supabase library. Check your internet connection.", "error");
                return false;
            }
        }
        
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Test connection
        try {
            const { data, error } = await supabase.from('user_profiles').select('id').limit(1);
            if (error && error.message.includes('relation') === false) {
                console.warn("Connection test warning:", error);
            }
        } catch(e) { console.warn("Supabase test:", e); }
        
        // Get current session
        const { data: { session } } = await supabase.auth.getSession();
        if (session) await handleUserLogin(session.user);
        updateAuthUI();
        renderCurrentRoute();
        
        // Listen for auth changes
        supabase.auth.onAuthStateChange(async (event, session) => {
            console.log("Auth event:", event);
            if (event === 'SIGNED_IN' && session) await handleUserLogin(session.user);
            else if (event === 'SIGNED_OUT') handleUserLogout();
            updateAuthUI();
            renderCurrentRoute();
        });
        
        return true;
    }
    
    async function handleUserLogin(user) {
        currentUser = user;
        console.log("User logged in:", user.email);
        
        // Ensure profile exists
        try {
            const { data: existing, error: fetchError } = await supabase
                .from('user_profiles')
                .select('id')
                .eq('id', user.id)
                .maybeSingle();
                
            if (fetchError && !fetchError.message.includes('not found')) {
                console.warn("Profile fetch error:", fetchError);
            }
            
            if (!existing) {
                const { error: insertError } = await supabase
                    .from('user_profiles')
                    .insert({ id: user.id, email: user.email, full_name: user.user_metadata?.full_name || '', is_admin: false });
                if (insertError) console.warn("Profile insert error:", insertError);
                else console.log("Profile created for", user.email);
            }
        } catch(e) { console.warn("Profile handling error:", e); }
        
        // Check admin status (if RPC exists)
        try {
            const { data, error } = await supabase.rpc('is_admin_user');
            if (!error) isAdmin = !!data;
            else console.warn("Admin RPC error (might not exist):", error);
        } catch(e) { console.warn("Admin check failed:", e); }
    }
    
    function handleUserLogout() {
        currentUser = null;
        isAdmin = false;
        console.log("User logged out");
    }
    
    // ==================== AUTH FUNCTIONS (exposed globally) ====================
    window.signIn = async function(email, password) {
        if (!supabase) { showToast("System not ready. Please refresh.", "error"); return false; }
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            showToast(error.message, 'error');
            return false;
        }
        showToast('Logged in successfully!', 'success');
        return true;
    };
    
    window.signUp = async function(email, password, fullName) {
        if (!supabase) { showToast("System not ready. Please refresh.", "error"); return false; }
        const { error } = await supabase.auth.signUp({ 
            email, 
            password, 
            options: { data: { full_name: fullName } } 
        });
        if (error) {
            showToast(error.message, 'error');
            return false;
        }
        showToast('Account created! Please check your email to verify.', 'success');
        return true;
    };
    
    window.signOut = async function() {
        await supabase.auth.signOut();
        showToast('Logged out', 'info');
        navigate('home');
    };
    
    // Modal handlers (global)
    window.closeModal = function() {
        const modal = document.getElementById('authModal');
        if (modal) modal.remove();
    };
    
    window.handleLoginSubmit = async function() {
        const email = document.getElementById('loginEmail')?.value;
        const password = document.getElementById('loginPassword')?.value;
        if (!email || !password) {
            showToast("Please enter email and password", "warning");
            return;
        }
        const success = await window.signIn(email, password);
        if (success) window.closeModal();
    };
    
    window.handleSignupSubmit = async function() {
        const name = document.getElementById('signupName')?.value;
        const email = document.getElementById('signupEmail')?.value;
        const password = document.getElementById('signupPassword')?.value;
        if (!name || !email || !password) {
            showToast("Please fill all fields", "warning");
            return;
        }
        const success = await window.signUp(email, password, name);
        if (success) window.closeModal();
    };
    
    function showLoginModal() {
        // Remove existing modal if any
        const existing = document.getElementById('authModal');
        if (existing) existing.remove();
        
        const modalHtml = `
            <div class="modal active" id="authModal">
                <div class="modal-content">
                    <h2>Sign In</h2>
                    <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
                    <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
                    <button class="btn" onclick="handleLoginSubmit()">Login</button>
                    <button class="btn-outline btn" onclick="closeModal()">Cancel</button>
                    <p style="margin-top: 12px; font-size: 12px;">Don't have an account? <a href="#" onclick="showSignupModal(); return false;">Sign up</a></p>
                </div>
            </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    
    function showSignupModal() {
        const existing = document.getElementById('authModal');
        if (existing) existing.remove();
        
        const modalHtml = `
            <div class="modal active" id="authModal">
                <div class="modal-content">
                    <h2>Sign Up</h2>
                    <input type="text" id="signupName" placeholder="Full Name" autocomplete="name">
                    <input type="email" id="signupEmail" placeholder="Email" autocomplete="email">
                    <input type="password" id="signupPassword" placeholder="Password" autocomplete="new-password">
                    <button class="btn" onclick="handleSignupSubmit()">Sign Up</button>
                    <button class="btn-outline btn" onclick="closeModal()">Cancel</button>
                    <p style="margin-top: 12px; font-size: 12px;">Already have an account? <a href="#" onclick="showLoginModal(); return false;">Login</a></p>
                </div>
            </div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    
    function updateAuthUI() {
        const container = document.getElementById('authButtons');
        const dashboardBtn = document.getElementById('dashboardNavBtn');
        if (!container) return;
        
        if (currentUser) {
            container.innerHTML = `
                <div class="user-badge"><i class="fas fa-user"></i> ${escapeHtml(currentUser.email?.split('@')[0])}</div>
                <button onclick="signOut()">Logout</button>
                ${isAdmin ? '<button class="btn-primary-nav" onclick="navigate(\'admin\')">Admin</button>' : ''}
            `;
            if (dashboardBtn) dashboardBtn.style.display = 'inline-block';
        } else {
            container.innerHTML = `
                <button onclick="showLoginModal()">Login</button>
                <button class="btn-primary-nav" onclick="showSignupModal()">Sign Up</button>
            `;
            if (dashboardBtn) dashboardBtn.style.display = 'none';
        }
    }
    
    // ==================== PAGE RENDERING (simplified for demo) ====================
    async function renderHome() {
        const html = `
            <section class="hero">
                <div class="hero-content">
                    <h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1>
                    <p>For Learners and Experienced Drivers — Refresh Your Skills with MEI DRIVE AFRICA. NTSA-approved courses.</p>
                    <div>
                        <button class="btn btn-primary" onclick="navigate('courses')"><i class="fas fa-road"></i> Explore Courses</button>
                        <button class="btn btn-outline" onclick="showLoginModal()"><i class="fas fa-user-graduate"></i> Get Started</button>
                    </div>
                </div>
            </section>
            <div class="stats-bar">
                <div class="stat-item"><h3>10K+</h3><p>Students</p></div>
                <div class="stat-item"><h3>6</h3><p>Courses</p></div>
                <div class="stat-item"><h3>98%</h3><p>Pass Rate</p></div>
            </div>
            <div class="container section">
                <h2 class="section-title">Our <span>Courses</span></h2>
                <div class="grid" id="homeCoursesGrid"></div>
            </div>
        `;
        document.getElementById('page-content').innerHTML = html;
        document.getElementById('homeCoursesGrid').innerHTML = coursesData.map(c => `
            <div class="card" onclick="navigateToCourse('${c.type}')">
                <i class="fas ${c.icon}" style="font-size:2rem; color:var(--primary);"></i>
                <h3>${escapeHtml(c.name)}</h3>
                <p>${escapeHtml(c.description)}</p>
                <div class="module-price">${c.price === 0 ? 'FREE' : `KES ${c.price.toLocaleString()}`}</div>
            </div>
        `).join('');
    }
    
    async function renderCourses() {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top:100px;">
                <h1 class="section-title">Our <span>Courses</span></h1>
                <div class="grid" id="coursesGrid"></div>
            </div>
        `;
        document.getElementById('coursesGrid').innerHTML = coursesData.map(c => `
            <div class="card" onclick="navigateToCourse('${c.type}')">
                <i class="fas ${c.icon}" style="font-size:2rem; color:var(--primary);"></i>
                <h3>${escapeHtml(c.name)}</h3>
                <p>${escapeHtml(c.description)}</p>
                <div class="module-price">${c.price === 0 ? 'FREE' : `KES ${c.price.toLocaleString()}`}</div>
            </div>
        `).join('');
    }
    
    async function renderCourseDetail() {
        const type = routeParams.courseType;
        const course = coursesData.find(c => c.type === type);
        if (!course) { navigate('courses'); return; }
        
        let isEnrolled = false;
        if (currentUser) {
            try {
                const { data } = await supabase
                    .from('enrollments')
                    .select('id')
                    .eq('user_id', currentUser.id)
                    .eq('course_id', course.id)
                    .eq('payment_status', 'verified')
                    .maybeSingle();
                isEnrolled = !!data;
            } catch(e) { console.warn(e); }
        }
        
        const actionButton = isEnrolled 
            ? '<button class="btn btn-primary" onclick="showToast(\'Learning content coming soon\',\'info\')">Start Learning</button>'
            : `<button class="btn btn-primary" onclick="enrollNow(${course.id}, ${course.price})">Enroll Now</button>`;
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top:100px;">
                <div class="card">
                    <h2>${escapeHtml(course.name)}</h2>
                    <p>${escapeHtml(course.description)}</p>
                    <div class="module-price">${course.price === 0 ? 'FREE' : `KES ${course.price.toLocaleString()}`}</div>
                    ${actionButton}
                    <button class="btn btn-outline" onclick="navigate('courses')">Back</button>
                </div>
            </div>
        `;
    }
    
    async function enrollNow(courseId, price) {
        if (!currentUser) { showToast('Please login first', 'warning'); showLoginModal(); return; }
        if (price === 0) {
            await supabase.from('enrollments').upsert({ user_id: currentUser.id, course_id: courseId, payment_status: 'verified' });
            showToast('Enrolled successfully!', 'success');
            renderCurrentRoute(); // refresh
        } else {
            showToast(`Processing payment KES ${price}...`, 'info');
            setTimeout(async () => {
                await supabase.from('enrollments').upsert({ user_id: currentUser.id, course_id: courseId, payment_status: 'verified', amount_paid: price });
                showToast('Payment verified! Course unlocked.', 'success');
                renderCurrentRoute();
            }, 1000);
        }
    }
    
    async function renderCurrentRoute() {
        if (currentRoute === 'home') await renderHome();
        else if (currentRoute === 'courses') await renderCourses();
        else if (currentRoute === 'course-detail') await renderCourseDetail();
        else document.getElementById('page-content').innerHTML = '<div class="container" style="padding-top:100px;"><div class="card"><h2>Coming Soon</h2></div></div>';
    }
    
    // Navigation
    function navigate(route, params = {}) { currentRoute = route; routeParams = params; renderCurrentRoute(); }
    function navigateToCourse(type) { navigate('course-detail', { courseType: type }); }
    function toggleMobileMenu() { document.getElementById('navLinks')?.classList.toggle('show'); }
    function showLegal(page) { alert(`${page} policy – coming soon`); }
    
    // Expose global app object
    window.app = {
        navigate, navigateToCourse, showLegal, toggleMobileMenu,
        showLoginModal, showSignupModal, closeModal, enrollNow
    };
    
    // Start
    initSupabase();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Detail - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #fff;
            --soft-gray: #B7C4D6;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
        }
        .navbar {
            background: var(--dark-navy);
            padding: 1rem 2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 100px 2rem 2rem;
        }
        .course-header {
            background: var(--dark-navy);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .unit-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        .unit-card {
            background: var(--dark-navy);
            border-radius: 12px;
            padding: 1rem;
            border: 1px solid rgba(0,255,136,0.12);
            cursor: pointer;
            transition: all 0.3s;
        }
        .unit-card:hover {
            transform: translateY(-2px);
            border-color: var(--neon-green);
        }
        .unit-number {
            color: var(--neon-green);
            font-size: 0.8rem;
        }
        .unit-title {
            margin-top: 0.5rem;
        }
        .btn-back {
            background: transparent;
            border: 1px solid var(--neon-green);
            color: var(--white);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 1rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--dark-navy);
            border-top-color: var(--neon-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .unit-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar"><div style="max-width:1200px;margin:auto;"><div style="font-size:1.5rem;color:var(--neon-green);">MEI DRIVE AFRICA</div></div></nav>
    <div class="container" id="container"><div class="loading"><div class="spinner"></div><p>Loading course...</p></div></div>
    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('id') || 1;
        
        async function loadCourse() {
            const container = document.getElementById('container');
            
            // Load course details
            const { data: course } = await supabase.from('courses').select('*').eq('id', courseId).single();
            
            // Load units
            const { data: units } = await supabase
                .from('course_units')
                .select('*')
                .eq('course_id', courseId)
                .order('unit_number');
            
            if (!course) {
                container.innerHTML = '<div class="loading">Course not found</div>';
                return;
            }
            
            container.innerHTML = `
                <button class="btn-back" onclick="history.back()">← Back to Courses</button>
                <div class="course-header">
                    <div style="font-size:3rem;">🚗</div>
                    <h1>${course.title}</h1>
                    <p>${course.description}</p>
                    <p><strong>Duration:</strong> ${course.duration} | <strong>Level:</strong> ${course.level}</p>
                </div>
                <h2>Course Units (${units?.length || 0} units)</h2>
                <div class="unit-list">
                    ${units?.map(unit => `
                        <div class="unit-card" onclick="viewUnit(${unit.unit_number})">
                            <div class="unit-number">Unit ${unit.unit_number}</div>
                            <div class="unit-title">${unit.title}</div>
                        </div>
                    `).join('') || '<p>No units available</p>'}
                </div>
            `;
        }
        
        function viewUnit(unitNumber) {
            window.location.href = `/unit.html?course_id=${courseId}&unit=${unitNumber}`;
        }
        
        loadCourse();
    </script>
</body>
</html>

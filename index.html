 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MEI DRIVE AFRICA</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Segoe UI,sans-serif;
            background:#0a0e27;
            color:white;
        }

        .navbar{
            background:#1a1f3a;
            padding:15px 25px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            border-bottom:1px solid #00ff8830;
        }

        .logo{
            font-size:1.5rem;
            font-weight:bold;
            color:#00ff88;
        }

        .btn{
            padding:10px 18px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .btn-primary{
            background:#00ff88;
            color:#0a0e27;
        }

        .btn-outline{
            background:transparent;
            color:#00ff88;
            border:1px solid #00ff88;
        }

        .btn-danger{
            background:#ff4444;
            color:white;
        }

        .hero{
            padding:80px 20px;
            text-align:center;
        }

        .hero h1{
            font-size:3rem;
            margin-bottom:20px;
        }

        .hero span{
            color:#00ff88;
        }

        .container{
            max-width:1200px;
            margin:auto;
            padding:20px;
        }

        .courses-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
            gap:20px;
        }

        .course-card{
            background:#1a1f3a;
            padding:20px;
            border-radius:16px;
            border:1px solid #00ff8820;
        }

        .course-card h3{
            margin:10px 0;
        }

        .badge{
            display:inline-block;
            padding:5px 12px;
            border-radius:20px;
            font-size:0.7rem;
            margin-bottom:10px;
            font-weight:bold;
        }

        .badge-free{
            background:#ff9800;
            color:black;
        }

        .badge-premium{
            background:#00ff88;
            color:black;
        }

        .dashboard{
            display:none;
        }

        .main-content{
            padding:30px;
        }

        .stats-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
            gap:20px;
            margin:25px 0;
        }

        .stat-card{
            background:#1a1f3a;
            padding:20px;
            border-radius:12px;
            text-align:center;
        }

        .stat-number{
            font-size:2rem;
            color:#00ff88;
            font-weight:bold;
        }

        .progress-bar{
            height:8px;
            background:#333;
            border-radius:10px;
            overflow:hidden;
            margin:10px 0;
        }

        .progress-fill{
            height:100%;
            background:#00ff88;
        }

        .modal{
            display:none;
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.85);
            justify-content:center;
            align-items:center;
            z-index:1000;
        }

        .modal.active{
            display:flex;
        }

        .modal-content{
            width:90%;
            max-width:400px;
            background:#1a1f3a;
            padding:30px;
            border-radius:16px;
        }

        .modal-content input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #00ff88;
            background:#0a0e27;
            color:white;
        }

        .footer{
            text-align:center;
            padding:30px;
            color:#999;
        }

        @media(max-width:768px){
            .hero h1{
                font-size:2rem;
            }
        }
    </style>
</head>
<body>

<!-- AUTH MODAL -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Login</h2>

        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPassword" placeholder="Password">

        <button id="authBtn" class="btn btn-primary" style="width:100%;">
            Login
        </button>

        <p style="margin-top:15px;">
            <span id="switchText">Don't have an account?</span>
            <a href="#" id="toggleAuth" style="color:#00ff88;">Register</a>
        </p>

        <button onclick="closeAuthModal()" class="btn btn-outline" style="width:100%;margin-top:10px;">
            Cancel
        </button>
    </div>
</div>

<!-- LANDING -->
<div id="landingPage">

    <nav class="navbar">
        <div class="logo">MEI DRIVE AFRICA</div>

        <div>
            <button class="btn btn-outline" onclick="showAuthModal('login')">
                Login
            </button>

            <button class="btn btn-primary" onclick="showAuthModal('register')">
                Register
            </button>
        </div>
    </nav>

    <section class="hero">
        <h1>
            Drive Safe.<br>
            <span>Learn With Confidence.</span>
        </h1>

        <p>NTSA Approved Driver Training</p>
    </section>

    <section class="container">
        <h2 style="margin-bottom:25px;">Our Courses</h2>

        <div id="coursesList" class="courses-grid">
            Loading courses...
        </div>
    </section>

    <footer class="footer">
        © 2026 MEI DRIVE AFRICA
    </footer>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

    <nav class="navbar">
        <div class="logo">MEI DRIVE AFRICA</div>

        <button id="logoutBtn" class="btn btn-danger">
            Logout
        </button>
    </nav>

    <div class="main-content">

        <h2>
            Welcome,
            <span id="welcomeName">Student</span>
        </h2>

        <div class="stats-grid">

            <div class="stat-card">
                <div id="statTotal" class="stat-number">0</div>
                <p>Total Courses</p>
            </div>

            <div class="stat-card">
                <div id="statEnrolled" class="stat-number">0</div>
                <p>Enrolled</p>
            </div>

            <div class="stat-card">
                <div id="statCompleted" class="stat-number">0</div>
                <p>Completed</p>
            </div>

        </div>

        <h3 style="margin-bottom:20px;">My Courses</h3>

        <div id="myCoursesList" class="courses-grid"></div>

    </div>

</div>

<script>

/* =========================
   SUPABASE CONFIG
========================= */

const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

/* =========================
   GLOBALS
========================= */

let currentUser = null;
let allCourses = [];
let userEnrollments = new Map();
let authMode = 'login';

/* =========================
   HELPERS
========================= */

function toast(msg){
    alert(msg);
}

function escapeHtml(str){
    if(!str) return '';

    return str.replace(/[&<>]/g, m => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;'
    }[m]));
}

/* =========================
   AUTH MODAL
========================= */

function showAuthModal(mode){

    authMode = mode;

    document.getElementById('authModal')
        .classList.add('active');

    document.getElementById('modalTitle')
        .textContent = mode === 'login'
        ? 'Login'
        : 'Register';

    document.getElementById('authBtn')
        .textContent = mode === 'login'
        ? 'Login'
        : 'Register';

}

function closeAuthModal(){

    document.getElementById('authModal')
        .classList.remove('active');

}

/* =========================
   LOAD COURSES
========================= */

async function loadCourses(){

    console.log('Loading courses...');

    const { data, error } = await supabase
        .from('courses')
        .select('*')
        .order('id');

    if(error){

        console.error(error);

        document.getElementById('coursesList')
            .innerHTML = 'Failed to load courses';

        return;
    }

    allCourses = data || [];

    console.log('Courses:', allCourses);

    document.getElementById('statTotal')
        .textContent = allCourses.length;

    renderPublicCourses();
}

/* =========================
   LOAD ENROLLMENTS
========================= */

async function loadEnrollments(){

    if(!currentUser) return;

    const { data, error } = await supabase
        .from('enrollments')
        .select('*')
        .eq('user_id', currentUser.id);

    if(error){

        console.error('Enrollment error:', error);

        return;
    }

    console.log('Enrollments:', data);

    userEnrollments.clear();

    data.forEach(e => {

        userEnrollments.set(
            Number(e.course_id),
            {
                progress:Number(e.progress) || 0
            }
        );

    });

    renderMyCourses();

    updateStats();
}

/* =========================
   ENROLL COURSE
========================= */

async function enrollCourse(courseId){

    if(!currentUser){

        showAuthModal('login');

        return;
    }

    const { error } = await supabase
        .from('enrollments')
        .insert([
            {
                user_id:currentUser.id,
                course_id:Number(courseId),
                progress:0,
                status:'active'
            }
        ]);

    if(error){

        console.error(error);

        toast(error.message);

        return;
    }

    toast('Enrolled successfully');

    await loadEnrollments();
}

/* =========================
   UPDATE STATS
========================= */

function updateStats(){

    const enrolled = userEnrollments.size;

    const completed =
        Array.from(userEnrollments.values())
        .filter(e => e.progress === 100)
        .length;

    document.getElementById('statEnrolled')
        .textContent = enrolled;

    document.getElementById('statCompleted')
        .textContent = completed;

}

/* =========================
   PUBLIC COURSES
========================= */

function renderPublicCourses(){

    const container =
        document.getElementById('coursesList');

    if(!allCourses.length){

        container.innerHTML =
            'No courses available';

        return;
    }

    container.innerHTML =
        allCourses.map(course => `

        <div class="course-card">

            <span class="badge ${
                course.type === 'free'
                ? 'badge-free'
                : 'badge-premium'
            }">

                ${
                    course.type === 'free'
                    ? 'FREE'
                    : 'PREMIUM'
                }

            </span>

            <h3>${escapeHtml(course.name)}</h3>

            <p>
                ${escapeHtml(course.description || '')}
            </p>

            <button
                class="btn btn-primary"
                onclick="enrollCourse(${course.id})"
            >
                Enroll
            </button>

        </div>

    `).join('');

}

/* =========================
   MY COURSES
========================= */

function renderMyCourses(){

    const container =
        document.getElementById('myCoursesList');

    const enrolledCourses =
        allCourses.filter(course =>
            userEnrollments.has(Number(course.id))
        );

    console.log(
        'Rendering enrolled courses:',
        enrolledCourses
    );

    if(!enrolledCourses.length){

        container.innerHTML =
            '<p>No enrolled courses</p>';

        return;
    }

    container.innerHTML =
        enrolledCourses.map(course => {

        const progress =
            userEnrollments.get(Number(course.id))
            ?.progress || 0;

        return `

        <div class="course-card">

            <h3>${escapeHtml(course.name)}</h3>

            <div class="progress-bar">
                <div
                    class="progress-fill"
                    style="width:${progress}%"
                ></div>
            </div>

            <p>${progress}% Complete</p>

        </div>

        `;

    }).join('');

}

/* =========================
   SHOW DASHBOARD
========================= */

function showDashboard(){

    document.getElementById('landingPage')
        .style.display = 'none';

    document.getElementById('dashboard')
        .style.display = 'block';

    if(currentUser){

        const name =
            currentUser.email.split('@')[0];

        document.getElementById('welcomeName')
            .textContent = name;

    }

}

/* =========================
   SHOW LANDING
========================= */

function showLanding(){

    document.getElementById('landingPage')
        .style.display = 'block';

    document.getElementById('dashboard')
        .style.display = 'none';

}

/* =========================
   AUTH BUTTON
========================= */

document.getElementById('authBtn')
.onclick = async () => {

    const email =
        document.getElementById('authEmail').value;

    const password =
        document.getElementById('authPassword').value;

    if(!email || !password){

        toast('Enter email and password');

        return;
    }

    try{

        if(authMode === 'login'){

            const { error } =
                await supabase.auth
                .signInWithPassword({
                    email,
                    password
                });

            if(error) throw error;

        }else{

            const { error } =
                await supabase.auth.signUp({
                    email,
                    password
                });

            if(error) throw error;

            toast('Account created');

        }

        closeAuthModal();

    }catch(err){

        console.error(err);

        toast(err.message);

    }

};

/* =========================
   TOGGLE AUTH MODE
========================= */

document.getElementById('toggleAuth')
.onclick = (e) => {

    e.preventDefault();

    showAuthModal(
        authMode === 'login'
        ? 'register'
        : 'login'
    );

};

/* =========================
   LOGOUT
========================= */

document.getElementById('logoutBtn')
.onclick = async () => {

    await supabase.auth.signOut();

};

/* =========================
   AUTH STATE
========================= */

supabase.auth.onAuthStateChange(
    async(event, session) => {

    console.log(event);

    if(event === 'SIGNED_IN'){

        currentUser = session.user;

        await loadEnrollments();

        showDashboard();

    }

    if(event === 'SIGNED_OUT'){

        currentUser = null;

        userEnrollments.clear();

        showLanding();

    }

});

/* =========================
   INIT
========================= */

async function init(){

    try{

        const {
            data:{session}
        } = await supabase.auth.getSession();

        currentUser = session?.user || null;

        await loadCourses();

        if(currentUser){

            await loadEnrollments();

            showDashboard();

        }

    }catch(err){

        console.error(err);

    }

}

init();

</script>

</body>
</html>

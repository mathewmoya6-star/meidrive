<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit - MEI Drive Africa</title>
    
    <!-- Cache Prevention -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Load Supabase library and singleton -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            color: #ffffff;
        }
        .navbar {
            background: #1a1f3a;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00ff88;
            cursor: pointer;
            text-decoration: none;
        }
        .logo span { color: white; }
        .back-btn {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #00ff88;
            color: #0a0e27;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .unit-header {
            background: linear-gradient(135deg, #1a1f3a, #0a0e27);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .unit-number {
            color: #00ff88;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .unit-header h1 {
            font-size: 2rem;
            margin-bottom: 15px;
        }
        .unit-meta {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            color: #a0a0c0;
            font-size: 0.9rem;
            flex-wrap: wrap;
        }
        .unit-content {
            background: #1a1f3a;
            border-radius: 16px;
            padding: 40px;
            border: 1px solid rgba(0, 255, 136, 0.1);
        }
        .unit-content h1, .unit-content h2, .unit-content h3 {
            color: #00ff88;
            margin: 20px 0 10px 0;
        }
        .unit-content h1:first-child, .unit-content h2:first-child, .unit-content h3:first-child {
            margin-top: 0;
        }
        .unit-content p {
            color: #a0a0c0;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .unit-content ul, .unit-content ol {
            margin: 15px 0;
            padding-left: 25px;
            color: #a0a0c0;
        }
        .unit-content li {
            margin: 8px 0;
        }
        .unit-content pre {
            background: #0a0e27;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }
        .nav-btn {
            padding: 12px 24px;
            background: #00ff88;
            color: #0a0e27;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            transition: all 0.3s;
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }
        .nav-btn.secondary {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        .nav-btn.secondary:hover {
            background: #00ff88;
            color: #0a0e27;
        }
        .loading {
            text-align: center;
            padding: 60px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 255, 136, 0.2);
            border-top-color: #00ff88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }
        .error-message button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #00ff88;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            padding: 30px;
            color: #a0a0c0;
            font-size: 0.8rem;
            border-top: 1px solid rgba(0, 255, 136, 0.1);
            margin-top: 40px;
        }
        @media (max-width: 768px) {
            .unit-header h1 { font-size: 1.5rem; }
            .unit-content { padding: 20px; }
            .nav-buttons { flex-direction: column; }
            .unit-meta { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">MEI DRIVE <span>AFRICA</span></a>
            <a href="javascript:history.back()" class="back-btn">← Back to Course</a>
        </div>
    </nav>
    
    <div class="container" id="unitContent">
        <div class="loading">
            <div class="spinner"></div>
            <p>Loading unit content...</p>
        </div>
    </div>
    
    <div class="footer">
        <p>© 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training | Instructor: ILR-7WA1P62</p>
    </div>

    <script>
        // ✅ CORRECT - Use existing Supabase instance (NO createClient!)
        const supabase = window._supabase || window.getSupabase?.() || window.supabase;
        
        if (!supabase) {
            console.error('❌ Supabase not loaded!');
            document.getElementById('unitContent').innerHTML = `
                <div class="error-message">
                    <h3>❌ Database Connection Error</h3>
                    <p>Unable to connect to the database. Please refresh the page.</p>
                    <button onclick="location.reload()">Refresh Page</button>
                </div>
            `;
        } else {
            console.log('✅ Supabase ready in unit.html');
        }
        
        let unitData = null;
        let courseData = null;
        let currentUser = null;
        let isCompleted = false;
        
        function getUnitId() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            return id ? parseInt(id) : 1;
        }
        
        function getCourseId() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('course_id');
            return id ? parseInt(id) : 1;
        }
        
        async function checkUser() {
            const { data: { session } } = await supabase.auth.getSession();
            currentUser = session?.user || null;
            console.log('User:', currentUser?.email || 'Not logged in');
            return currentUser;
        }
        
        async function loadUnit() {
            if (!supabase) return;
            
            const unitId = getUnitId();
            const courseId = getCourseId();
            
            console.log('📖 Loading unit:', unitId, 'for course:', courseId);
            
            try {
                // Load unit data from course_units table
                const { data: unit, error: unitError } = await supabase
                    .from('course_units')
                    .select('*')
                    .eq('id', unitId)
                    .single();
                
                if (unitError) {
                    console.log('Unit not found in DB, using mock data');
                    unitData = getMockUnit(unitId, courseId);
                } else {
                    unitData = unit;
                }
                
                // Load course data
                const { data: course, error: courseError } = await supabase
                    .from('courses')
                    .select('*')
                    .eq('id', courseId)
                    .single();
                
                if (!courseError) {
                    courseData = course;
                } else {
                    courseData = { id: courseId, name: 'Driver Training Course' };
                }
                
                // Check if unit is already completed
                if (currentUser) {
                    const { data: progress } = await supabase
                        .from('user_progress')
                        .select('completed')
                        .eq('user_id', currentUser.id)
                        .eq('course_id', courseId)
                        .eq('unit_id', unitId)
                        .single();
                    
                    isCompleted = progress?.completed || false;
                }
                
                renderPage();
            } catch (error) {
                console.error('Error loading unit:', error);
                document.getElementById('unitContent').innerHTML = `
                    <div class="error-message">
                        <h3>Error Loading Unit</h3>
                        <p>${error.message || 'Unable to load unit content'}</p>
                        <button onclick="location.reload()">Retry</button>
                    </div>
                `;
            }
        }
        
        function getMockUnit(unitId, courseId) {
            const unitNum = unitId;
            const titles = [
                'Introduction to Driving',
                'Safety & Basic Controls',
                'Traffic Rules & Regulations',
                'Defensive Driving Techniques',
                'Emergency Procedures',
                'Parking & Maneuvering',
                'Highway & Expressway Driving',
                'Night & Weather Conditions',
                'Passenger Safety & Transport',
                'Vehicle Maintenance',
                'Final Preparation',
                'Assessment & Certification'
            ];
            
            return {
                id: unitId,
                unit_number: unitNum,
                course_id: courseId,
                title: titles[unitNum - 1] || `Unit ${unitNum}`,
                content: `# ${titles[unitNum - 1] || `Unit ${unitNum}`}\n\n## Learning Objectives\n\n- Understand the core concepts of this unit\n- Apply practical knowledge in real scenarios\n- Demonstrate proficiency in key skills\n\n## Key Topics Covered\n\n### Topic 1: Fundamentals\nThis section covers the basic principles and essential knowledge needed to progress.\n\n### Topic 2: Practical Application\nHands-on exercises and real-world examples to reinforce learning.\n\n### Topic 3: Safety Considerations\nImportant safety guidelines and best practices.\n\n## Summary\n\nCompleting this unit will prepare you for the next stage of your driving journey.\n\n## Quiz\n\nTest your knowledge with the questions at the end of this unit.`,
                duration: '1-2 hours'
            };
        }
        
        async function markComplete() {
            if (!currentUser) {
                alert('Please login to track your progress');
                window.location.href = '/';
                return;
            }
            
            const courseId = getCourseId();
            const unitId = getUnitId();
            
            try {
                if (isCompleted) {
                    // Mark as incomplete
                    await supabase
                        .from('user_progress')
                        .delete()
                        .eq('user_id', currentUser.id)
                        .eq('course_id', courseId)
                        .eq('unit_id', unitId);
                    
                    isCompleted = false;
                    alert('Unit marked as incomplete');
                } else {
                    // Mark as complete
                    await supabase
                        .from('user_progress')
                        .upsert({
                            user_id: currentUser.id,
                            course_id: courseId,
                            unit_id: unitId,
                            completed: true,
                            completed_at: new Date().toISOString()
                        }, {
                            onConflict: 'user_id, course_id, unit_id'
                        });
                    
                    isCompleted = true;
                    alert('✅ Unit marked as complete!');
                }
                
                // Update button text
                const completeBtn = document.getElementById('completeBtn');
                if (completeBtn) {
                    completeBtn.textContent = isCompleted ? '↺ Mark Incomplete' : '✓ Mark as Complete & Continue';
                    completeBtn.style.background = isCompleted ? '#ff4444' : '#00ff88';
                }
                
                // Optionally redirect to next unit
                if (!isCompleted) {
                    const nextUnitId = unitId + 1;
                    const { data: nextUnit } = await supabase
                        .from('course_units')
                        .select('id')
                        .eq('course_id', courseId)
                        .eq('unit_number', nextUnitId)
                        .single();
                    
                    if (nextUnit) {
                        setTimeout(() => {
                            if (confirm('Unit completed! Go to next unit?')) {
                                window.location.href = `unit.html?id=${nextUnit.id}&course_id=${courseId}`;
                            }
                        }, 500);
                    }
                }
            } catch (error) {
                console.error('Error updating progress:', error);
                alert('Error saving progress. Please try again.');
            }
        }
        
        function renderPage() {
            const container = document.getElementById('unitContent');
            
            if (!unitData) {
                container.innerHTML = `<div class="error-message"><h3>Unit not found</h3><p>The requested unit could not be found.</p><a href="/" class="nav-btn secondary" style="display:inline-block; margin-top:20px;">Back to Courses</a></div>`;
                return;
            }
            
            // Parse markdown-style content to HTML
            let contentHtml = unitData.content || `# ${unitData.title}\n\nContent coming soon...`;
            contentHtml = contentHtml
                .replace(/^# (.*$)/gm, '<h1>$1</h1>')
                .replace(/^## (.*$)/gm, '<h2>$1</h2>')
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/\n- (.*)/g, '\n<li>$1</li>')
                .replace(/<li>(.*)<\/li>/g, '<ul><li>$1</li></ul>')
                .replace(/<\/ul><ul>/g, '')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
            
            container.innerHTML = `
                <div class="unit-header">
                    <div class="unit-number">Unit ${unitData.unit_number}</div>
                    <h1>${escapeHtml(unitData.title)}</h1>
                    <div class="unit-meta">
                        <span><i class="fas fa-clock"></i> ${unitData.duration || '1 hour'}</span>
                        <span><i class="fas fa-book"></i> ${escapeHtml(courseData?.name || 'Course')}</span>
                        ${isCompleted ? '<span style="color: #00ff88;"><i class="fas fa-check-circle"></i> Completed</span>' : '<span><i class="fas fa-circle-notch"></i> Not started</span>'}
                    </div>
                </div>
                
                <div class="unit-content">
                    ${contentHtml}
                </div>
                
                <div class="nav-buttons">
                    <a href="javascript:history.back()" class="nav-btn secondary">← Back to Course</a>
                    <button id="completeBtn" class="nav-btn" onclick="markComplete()" style="background: ${isCompleted ? '#ff4444' : '#00ff88'}; color: ${isCompleted ? 'white' : '#0a0e27'};">
                        ${isCompleted ? '↺ Mark Incomplete' : '✓ Mark as Complete & Continue'}
                    </button>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Make functions global for onclick handlers
        window.markComplete = markComplete;
        
        // Initialize the page
        async function init() {
            await checkUser();
            await loadUnit();
        }
        
        init();
    </script>
</body>
</html>

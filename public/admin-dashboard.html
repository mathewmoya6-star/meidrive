<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Admin Dashboard | MEI Drive Africa</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #041B3D;
    color: #fff;
}

/* Sidebar */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 260px;
    height: 100vh;
    background: #0A234F;
    padding: 20px;
    overflow-y: auto;
    z-index: 100;
    transition: transform 0.3s ease;
}

.sidebar h2 {
    color: #00FF88;
    margin-bottom: 20px;
    font-size: 1.5rem;
}

.sidebar a {
    display: block;
    color: #B7C4D6;
    padding: 12px;
    text-decoration: none;
    margin-top: 8px;
    border-radius: 8px;
    transition: all 0.3s ease;
    cursor: pointer;
}

.sidebar a:hover, .sidebar a.active {
    background: #00FF88;
    color: #041B3D;
}

.logout-btn {
    margin-top: 30px;
    background: #ff4d4f;
    color: white;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
}

.logout-btn:hover {
    background: #ff7875;
    transform: translateY(-2px);
}

/* Mobile menu button */
.mobile-menu-btn {
    display: none;
    position: fixed;
    top: 15px;
    left: 15px;
    background: #00FF88;
    color: #041B3D;
    border: none;
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    z-index: 101;
    font-size: 1.2rem;
}

.overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
}

/* Main content */
.main {
    margin-left: 260px;
    padding: 20px;
    transition: margin-left 0.3s ease;
}

/* Cards */
.card {
    background: #0A234F;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
}

.stat {
    background: #041B3D;
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    border: 1px solid #00FF88;
    transition: all 0.3s ease;
}

.stat h3 {
    font-size: 2rem;
    color: #00FF88;
    margin-bottom: 8px;
}

.stat p {
    color: #B7C4D6;
}

/* Tables */
.table-wrapper {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #1a3a5f;
}

th {
    color: #00FF88;
    font-weight: 600;
}

/* Loading states */
.loading {
    text-align: center;
    padding: 40px;
    color: #00FF88;
}

.spinner {
    display: inline-block;
    width: 30px;
    height: 30px;
    border: 3px solid rgba(0,255,136,0.3);
    border-top-color: #00FF88;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.empty-state {
    text-align: center;
    padding: 40px;
    color: #B7C4D6;
}

.empty-state i {
    font-size: 3rem;
    margin-bottom: 10px;
    opacity: 0.5;
}

.error-state {
    text-align: center;
    padding: 40px;
    color: #ff4d4f;
}

.error-state i {
    font-size: 3rem;
    margin-bottom: 10px;
}

/* Buttons */
.btn-primary {
    background: #00FF88;
    color: #041B3D;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s ease;
    margin-bottom: 15px;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,255,136,0.3);
}

.btn-secondary {
    background: #ff4d4f;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    margin-left: 10px;
}

/* Toast notification */
.toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #0A234F;
    border-left: 4px solid #00FF88;
    padding: 15px 20px;
    border-radius: 8px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    z-index: 1000;
    animation: slideIn 0.3s ease;
}

.toast.error {
    border-left-color: #ff4d4f;
}

.toast.success {
    border-left-color: #00FF88;
}

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

/* Mobile responsive */
@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
    }
    
    .sidebar.active {
        transform: translateX(0);
    }
    
    .main {
        margin-left: 0;
        padding: 60px 15px 20px 15px;
    }
    
    .mobile-menu-btn {
        display: block;
    }
    
    .overlay.active {
        display: block;
    }
    
    table, thead, tbody, th, td, tr {
        display: block;
    }
    
    th {
        display: none;
    }
    
    td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 1px solid #1a3a5f;
    }
    
    td::before {
        content: attr(data-label);
        font-weight: bold;
        color: #00FF88;
        width: 40%;
    }
}

@media (max-width: 480px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>

<button class="mobile-menu-btn" id="mobileMenuBtn">
    <i class="fas fa-bars"></i>
</button>
<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h2>🚗 MEI ADMIN</h2>
    
    <a href="javascript:void(0)" data-section="dashboard" onclick="showSection('dashboard')">
        <i class="fas fa-tachometer-alt"></i> Dashboard
    </a>
    <a href="javascript:void(0)" data-section="courses" onclick="showSection('courses')">
        <i class="fas fa-book"></i> Courses
    </a>
    <a href="javascript:void(0)" data-section="users" onclick="showSection('users')">
        <i class="fas fa-users"></i> Users
    </a>
    <a href="javascript:void(0)" data-section="enrollments" onclick="showSection('enrollments')">
        <i class="fas fa-graduation-cap"></i> Enrollments
    </a>
    
    <button class="logout-btn" onclick="handleLogout()">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>
</div>

<!-- MAIN -->
<div class="main">

<!-- DASHBOARD -->
<div id="dashboardSection">
    <h2>Dashboard</h2>
    <div class="grid" id="statsGrid">
        <div class="stat">
            <h3 id="coursesCount">-</h3>
            <p>Courses</p>
        </div>
        <div class="stat">
            <h3 id="usersCount">-</h3>
            <p>Users</p>
        </div>
        <div class="stat">
            <h3 id="enrollmentsCount">-</h3>
            <p>Enrollments</p>
        </div>
    </div>
</div>

<!-- COURSES -->
<div id="coursesSection" style="display:none">
    <div class="card">
        <h2>Courses Management</h2>
        <button class="btn-primary" onclick="loadCourses()">
            <i class="fas fa-sync-alt"></i> Refresh
        </button>
        <div id="coursesTable" class="table-wrapper"></div>
    </div>
</div>

<!-- USERS -->
<div id="usersSection" style="display:none">
    <div class="card">
        <h2>Users Management</h2>
        <div id="usersTable" class="table-wrapper"></div>
    </div>
</div>

<!-- ENROLLMENTS -->
<div id="enrollmentsSection" style="display:none">
    <div class="card">
        <h2>Enrollments</h2>
        <div id="enrollmentsTable" class="table-wrapper"></div>
    </div>
</div>

</div>

<script>
// ============================================
// SUPABASE CONFIGURATION
// ============================================
const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';

// Safe Supabase initialization with error handling
let supabase = null;
try {
    const { createClient } = window.supabase;
    if (!createClient) {
        throw new Error('Supabase not loaded');
    }
    supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('Supabase initialized successfully');
} catch (err) {
    console.error('Failed to initialize Supabase:', err);
    alert('Failed to connect to database. Please refresh the page.');
}

// ============================================
// GLOBAL VARIABLES
// ============================================
let currentUser = null;
let loadingStates = {
    courses: false,
    users: false,
    enrollments: false
};

// ============================================
// TOAST NOTIFICATION
// ============================================
function showToast(message, type = 'info') {
    const existingToast = document.querySelector('.toast');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    
    setTimeout(() => toast.remove(), 4000);
}

// ============================================
// HELPER FUNCTIONS
// ============================================
function escapeHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function showLoading(containerId) {
    const container = document.getElementById(containerId);
    if (container) {
        container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading...</p></div>';
    }
}

function setActiveMenu(section) {
    document.querySelectorAll('.sidebar a').forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('data-section') === section) {
            link.classList.add('active');
        }
    });
}

// ============================================
// ADMIN VERIFICATION (ENHANCED)
// ============================================
async function checkAdmin() {
    if (!supabase) {
        window.location.href = '/admin-login.html';
        return false;
    }
    
    try {
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
        
        if (sessionError || !session) {
            window.location.href = '/admin-login.html';
            return false;
        }
        
        currentUser = session.user;
        
        // Check role from profiles with proper error handling
        const { data: profile, error: profileError } = await supabase
            .from('profiles')
            .select('role')
            .eq('id', currentUser.id)
            .maybeSingle();  // Use maybeSingle() instead of single() to avoid errors
        
        if (profileError) {
            console.error('Profile fetch error:', profileError);
            showToast('Error verifying admin privileges', 'error');
            await supabase.auth.signOut();
            window.location.href = '/login.html';
            return false;
        }
        
        if (!profile || profile.role !== 'admin') {
            showToast('Access denied. Admin privileges required.', 'error');
            await supabase.auth.signOut();
            window.location.href = '/login.html';
            return false;
        }
        
        return true;
        
    } catch (err) {
        console.error('Admin check error:', err);
        window.location.href = '/admin-login.html';
        return false;
    }
}

// ============================================
// LOAD STATS (WITH ERROR HANDLING)
// ============================================
async function loadStats() {
    if (!supabase) return;
    
    try {
        const [coursesResult, usersResult, enrollmentsResult] = await Promise.all([
            supabase.from('courses').select('*', { count: 'exact', head: true }),
            supabase.from('profiles').select('*', { count: 'exact', head: true }),
            supabase.from('enrollments').select('*', { count: 'exact', head: true })
        ]);
        
        if (coursesResult.error) throw coursesResult.error;
        if (usersResult.error) throw usersResult.error;
        if (enrollmentsResult.error) throw enrollmentsResult.error;
        
        document.getElementById('coursesCount').innerText = coursesResult.count || 0;
        document.getElementById('usersCount').innerText = usersResult.count || 0;
        document.getElementById('enrollmentsCount').innerText = enrollmentsResult.count || 0;
        
    } catch (err) {
        console.error('Error loading stats:', err);
        document.getElementById('coursesCount').innerText = 'Error';
        document.getElementById('usersCount').innerText = 'Error';
        document.getElementById('enrollmentsCount').innerText = 'Error';
        showToast('Failed to load statistics', 'error');
    }
}

// ============================================
// LOAD COURSES (WITH PAGINATION)
// ============================================
async function loadCourses(page = 1, limit = 50) {
    if (loadingStates.courses) return;
    loadingStates.courses = true;
    
    showLoading('coursesTable');
    
    try {
        const from = (page - 1) * limit;
        const to = from + limit - 1;
        
        const { data, error, count } = await supabase
            .from('courses')
            .select('*', { count: 'exact' })
            .range(from, to)
            .order('created_at', { ascending: false });
        
        if (error) throw error;
        
        if (!data || data.length === 0) {
            document.getElementById('coursesTable').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-book-open"></i>
                    <p>No courses found</p>
                    <button class="btn-primary" onclick="loadCourses()" style="margin-top: 15px;">Refresh</button>
                </div>`;
            return;
        }
        
        let html = `<table><thead>运转<th>Name</th><th>Type</th><th>Price</th><th>Duration</th><th>Level</th></thead><tbody>`;
        
        data.forEach(course => {
            html += `<tr>
                <td data-label="Name">${escapeHtml(course.name)}</td>
                <td data-label="Type"><span class="badge ${course.type}">${escapeHtml(course.type)}</span></td>
                <td data-label="Price">KES ${course.price?.toLocaleString() || 0}</td>
                <td data-label="Duration">${escapeHtml(course.duration || 'N/A')}</td>
                <td data-label="Level">${escapeHtml(course.level || 'N/A')}</td>
            </tr>`;
        });
        
        html += '</tbody>赶';
        document.getElementById('coursesTable').innerHTML = html;
        
        if (count > limit) {
            const pagination = `<div class="pagination">Total: ${count} courses. Showing ${limit} per page.</div>`;
            document.getElementById('coursesTable').innerHTML += pagination;
        }
        
    } catch (err) {
        console.error('Error loading courses:', err);
        document.getElementById('coursesTable').innerHTML = `
            <div class="error-state">
                <i class="fas fa-exclamation-triangle"></i>
                <p>Error loading courses</p>
                <button class="btn-primary" onclick="loadCourses()" style="margin-top: 15px;">Retry</button>
            </div>`;
        showToast('Failed to load courses', 'error');
    } finally {
        loadingStates.courses = false;
    }
}

// ============================================
// LOAD USERS (WITH PAGINATION)
// ============================================
async function loadUsers(page = 1, limit = 50) {
    if (loadingStates.users) return;
    loadingStates.users = true;
    
    showLoading('usersTable');
    
    try {
        const from = (page - 1) * limit;
        const to = from + limit - 1;
        
        const { data, error, count } = await supabase
            .from('profiles')
            .select('*', { count: 'exact' })
            .range(from, to)
            .order('created_at', { ascending: false });
        
        if (error) throw error;
        
        if (!data || data.length === 0) {
            document.getElementById('usersTable').innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><p>No users found</p></div>';
            return;
        }
        
        let html = `<table><thead>运转<th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Joined</th></thead><tbody>`;
        
        data.forEach(user => {
            html += `<tr>
                <td data-label="Name">${escapeHtml(user.full_name || 'N/A')}</td>
                <td data-label="Email">${escapeHtml(user.email || 'N/A')}</td>
                <td data-label="Phone">${escapeHtml(user.phone || 'N/A')}</td>
                <td data-label="Role"><span class="badge ${user.role}">${escapeHtml(user.role || 'user')}</span></td>
                <td data-label="Joined">${user.created_at ? new Date(user.created_at).toLocaleDateString() : 'N/A'}</td>
            </tr>`;
        });
        
        html += '</tbody>赶';
        document.getElementById('usersTable').innerHTML = html;
        
    } catch (err) {
        console.error('Error loading users:', err);
        document.getElementById('usersTable').innerHTML = '<div class="error-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading users</p></div>';
        showToast('Failed to load users', 'error');
    } finally {
        loadingStates.users = false;
    }
}

// ============================================
// LOAD ENROLLMENTS (SAFE JOINS)
// ============================================
async function loadEnrollments() {
    if (loadingStates.enrollments) return;
    loadingStates.enrollments = true;
    
    showLoading('enrollmentsTable');
    
    try {
        // First get enrollments
        const { data: enrollments, error: enrollmentsError } = await supabase
            .from('enrollments')
            .select('*')
            .order('enrolled_at', { ascending: false })
            .limit(100);
        
        if (enrollmentsError) throw enrollmentsError;
        
        if (!enrollments || enrollments.length === 0) {
            document.getElementById('enrollmentsTable').innerHTML = '<div class="empty-state"><i class="fas fa-graduation-cap"></i><p>No enrollments found</p></div>';
            return;
        }
        
        // Get related data safely
        const userIds = [...new Set(enrollments.map(e => e.user_id).filter(Boolean))];
        const courseIds = [...new Set(enrollments.map(e => e.course_id).filter(Boolean))];
        
        const [profilesResult, coursesResult] = await Promise.all([
            userIds.length ? supabase.from('profiles').select('id, full_name').in('id', userIds) : { data: [] },
            courseIds.length ? supabase.from('courses').select('id, name').in('id', courseIds) : { data: [] }
        ]);
        
        const profiles = profilesResult.data || [];
        const courses = coursesResult.data || [];
        
        const profileMap = Object.fromEntries(profiles.map(p => [p.id, p.full_name]));
        const courseMap = Object.fromEntries(courses.map(c => [c.id, c.name]));
        
        let html = `<table><thead>运转<th>User</th><th>Course</th><th>Status</th><th>Payment</th><th>Enrolled</th></thead><tbody>`;
        
        enrollments.forEach(enrollment => {
            html += `<tr>
                <td data-label="User">${escapeHtml(profileMap[enrollment.user_id] || 'User not found')}</td>
                <td data-label="Course">${escapeHtml(courseMap[enrollment.course_id] || 'Course not found')}</td>
                <td data-label="Status"><span class="badge ${enrollment.status}">${escapeHtml(enrollment.status || 'pending')}</span></td>
                <td data-label="Payment"><span class="badge payment ${enrollment.payment_status}">${escapeHtml(enrollment.payment_status || 'pending')}</span></td>
                <td data-label="Enrolled">${enrollment.enrolled_at ? new Date(enrollment.enrolled_at).toLocaleDateString() : 'N/A'}</td>
            </tr>`;
        });
        
        html += '</tbody>赶';
        document.getElementById('enrollmentsTable').innerHTML = html;
        
    } catch (err) {
        console.error('Error loading enrollments:', err);
        document.getElementById('enrollmentsTable').innerHTML = '<div class="error-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading enrollments</p></div>';
        showToast('Failed to load enrollments', 'error');
    } finally {
        loadingStates.enrollments = false;
    }
}

// ============================================
// SECTION NAVIGATION
// ============================================
async function showSection(section) {
    const sections = ['dashboardSection', 'coursesSection', 'usersSection', 'enrollmentsSection'];
    
    sections.forEach(sec => {
        const element = document.getElementById(sec);
        if (element) element.style.display = 'none';
    });
    
    const targetSection = document.getElementById(`${section}Section`);
    if (targetSection) targetSection.style.display = 'block';
    
    setActiveMenu(section);
    
    // Load data based on section
    if (section === 'dashboard') {
        await loadStats();
    }
    if (section === 'courses') {
        await loadCourses();
    }
    if (section === 'users') {
        await loadUsers();
    }
    if (section === 'enrollments') {
        await loadEnrollments();
    }
    
    // Close mobile sidebar on selection
    if (window.innerWidth <= 768) {
        closeMobileMenu();
    }
}

// ============================================
// LOGOUT
// ============================================
async function handleLogout() {
    try {
        if (supabase) {
            await supabase.auth.signOut();
        }
        window.location.href = '/login.html';
    } catch (err) {
        console.error('Logout error:', err);
        window.location.href = '/login.html';
    }
}

// ============================================
// MOBILE MENU
// ============================================
function openMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    if (sidebar) sidebar.classList.add('active');
    if (overlay) overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeMobileMenu() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    if (sidebar) sidebar.classList.remove('active');
    if (overlay) overlay.classList.remove('active');
    document.body.style.overflow = '';
}

// ============================================
// AUTH STATE LISTENER
// ============================================
if (supabase) {
    supabase.auth.onAuthStateChange((event, session) => {
        console.log('Auth event:', event);
        
        if (event === 'SIGNED_OUT') {
            window.location.href = '/login.html';
        }
        
        if (event === 'TOKEN_REFRESHED') {
            console.log('Token refreshed successfully');
        }
        
        if (event === 'USER_UPDATED') {
            showToast('Session updated', 'success');
        }
    });
}

// ============================================
// INITIALIZATION
// ============================================
async function init() {
    // Wait for Supabase
    if (!supabase) {
        setTimeout(init, 500);
        return;
    }
    
    // Check admin status first
    const isAdmin = await checkAdmin();
    if (!isAdmin) return;
    
    // Load dashboard stats
    await loadStats();
    
    // Setup mobile menu
    const menuBtn = document.getElementById('mobileMenuBtn');
    const overlay = document.getElementById('overlay');
    
    if (menuBtn) menuBtn.addEventListener('click', openMobileMenu);
    if (overlay) overlay.addEventListener('click', closeMobileMenu);
    
    // Set active menu
    setActiveMenu('dashboard');
    
    // Show dashboard by default
    await showSection('dashboard');
    
    console.log('Admin dashboard initialized');
}

// Start the app
init();

// Global functions for onclick
window.showSection = showSection;
window.loadCourses = loadCourses;
window.handleLogout = handleLogout;
</script>

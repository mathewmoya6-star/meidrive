<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let enrolledCourseIds = new Set();
    let allCourses = [];
    let userProgress = {};
    
    function setLoading(loading) {
        const spinner = document.getElementById('loadingSpinner');
        if (spinner) {
            loading ? spinner.classList.add('active') : spinner.classList.remove('active');
        }
    }
    
    async function checkAuth() {
        setLoading(true);
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.replace('/login.html');
                return false;
            }
            currentUser = session.user;
            
            const { data: profile } = await supabase
                .from('profiles')
                .select('full_name')
                .eq('id', currentUser.id)
                .maybeSingle();
            
            const displayName = profile?.full_name?.split(' ')[0] || currentUser.email.split('@')[0];
            
            const nameEl = document.getElementById('userName');
            const welcomeEl = document.getElementById('welcomeMsg');
            if (nameEl) nameEl.textContent = displayName;
            if (welcomeEl) welcomeEl.textContent = `Welcome back, ${displayName}!`;
            
            return true;
        } catch (err) {
            console.error('Auth error:', err);
            window.location.replace('/login.html');
            return false;
        } finally {
            setLoading(false);
        }
    }
    
    async function loadCourses() {
        try {
            const { data: courses, error } = await supabase
                .from('courses')
                .select('*')
                .order('id', { ascending: true });
            
            if (error) throw error;
            
            allCourses = courses || [];
            return allCourses;
        } catch (err) {
            console.error('Error loading courses:', err);
            const grid = document.getElementById('coursesGrid');
            if (grid) {
                grid.innerHTML = `
                    <div style="text-align:center; padding:40px; color:#ff4d4f;">
                        <i class="fas fa-exclamation-circle"></i> Error loading courses. 
                        <button onclick="location.reload()" style="margin-top:10px; padding:8px 16px; background:#00FF88; border:none; border-radius:8px; cursor:pointer;">Retry</button>
                    </div>`;
            }
            return [];
        }
    }
    
    async function loadUserData() {
        try {
            // 1. Get enrolled courses
            const { data: enrollments } = await supabase
                .from('enrollments')
                .select('course_id')
                .eq('user_id', currentUser.id);
            
            if (enrollments) {
                const countEl = document.getElementById('enrolledCount');
                if (countEl) countEl.textContent = enrollments.length;
                enrolledCourseIds = new Set(enrollments.map(e => e.course_id));
            }
            
            // 2. Get user progress records
            const { data: progress } = await supabase
                .from('user_progress')
                .select('course_id, unit_id, completed, score')
                .eq('user_id', currentUser.id);
            
            userProgress = {}; 
            
            if (progress) {
                progress.forEach(p => {
                    if (!userProgress[p.course_id]) {
                        userProgress[p.course_id] = { completedUnits: new Set(), scores: [] };
                    }
                    if (p.completed) userProgress[p.course_id].completedUnits.add(p.unit_id);
                    if (p.score) userProgress[p.course_id].scores.push(p.score);
                });
                
                // Calculate total completed units metric
                let totalCompleted = 0;
                Object.values(userProgress).forEach(course => {
                    totalCompleted += course.completedUnits.size;
                });
                const completedUnitsEl = document.getElementById('completedUnits');
                if (completedUnitsEl) completedUnitsEl.textContent = totalCompleted;
                
                // Calculate total average quiz scores
                let allScores = [];
                Object.values(userProgress).forEach(course => {
                    allScores = allScores.concat(course.scores);
                });
                const avgScore = allScores.length > 0 ? Math.round(allScores.reduce((a,b) => a+b, 0) / allScores.length) : 0;
                const quizScoreEl = document.getElementById('quizScore');
                if (quizScoreEl) quizScoreEl.textContent = `${avgScore}%`;
                
                // Safe sequential progress loader mapping calculations
                let totalProgress = 0;
                let progressCount = 0;
                for (const courseId of enrolledCourseIds) {
                    const course = allCourses.find(c => c.id === courseId);
                    if (course) {
                        const { data: units } = await supabase
                            .from('course_units')
                            .select('id')
                            .eq('course_id', courseId);
                        
                        if (units && units.length > 0) {
                            const completed = userProgress[courseId]?.completedUnits.size || 0;
                            const percent = Math.round((completed / units.length) * 100);
                            totalProgress += percent;
                            progressCount++;
                        }
                    }
                }
                const avgProgress = progressCount > 0 ? Math.round(totalProgress / progressCount) : 0;
                const avgProgressEl = document.getElementById('avgProgress');
                if (avgProgressEl) avgProgressEl.textContent = `${avgProgress}%`;
            }
            
            // 3. Prevent duplicate course renders based on matching titles
            const uniqueCourses = [];
            const seenNames = new Set();
            for (const course of allCourses) {
                if (!seenNames.has(course.name)) {
                    seenNames.add(course.name);
                    uniqueCourses.push(course);
                }
            }
            
            const availableCourses = uniqueCourses.filter(c => !enrolledCourseIds.has(c.id));
            const enrolledCourses = uniqueCourses.filter(c => enrolledCourseIds.has(c.id));
            
            renderAvailableCourses(availableCourses);
            renderEnrolledCourses(enrolledCourses);
            
        } catch (err) {
            console.error('Error handling aggregate dashboard datasets:', err);
        }
    }
    
    function renderAvailableCourses(courses) {
        const container = document.getElementById('coursesGrid');
        if (!container) return;
        
        if (!courses.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">🎉 You are enrolled in all available courses!</div>';
            return;
        }
        
        container.innerHTML = '';
        courses.forEach(course => {
            const isFree = course.type === 'free' || course.price === 0;
            const card = document.createElement('div');
            card.className = 'course-card';
            card.innerHTML = `
                <span class="badge ${isFree ? 'free-badge' : 'premium-badge'}">${isFree ? 'FREE' : 'PREMIUM'}</span>
                <h3><i class="fas fa-car"></i> ${escapeHtml(course.name)}</h3>
                <p>${escapeHtml(course.description) || 'Professional driver training course approved by NTSA.'}</p>
                <div class="price ${isFree ? 'free' : 'premium'}">
                    ${isFree ? 'FREE' : `KES ${course.price?.toLocaleString() || 0}`}
                </div>
                <button class="btn-enroll" onclick="window.enrollInCourse(${course.id})">
                    <i class="fas fa-plus-circle"></i> Enroll Now
                </button>
            `;
            container.appendChild(card);
        });
    }
    
    function renderEnrolledCourses(courses) {
        const container = document.getElementById('enrolledGrid');
        if (!container) return;
        
        if (!courses.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">You haven\'t enrolled in any courses yet. Browse available courses above!</div>';
            return;
        }
        
        container.innerHTML = '';
        courses.forEach(course => {
            const courseProgress = userProgress[course.id];
            const completedCount = courseProgress?.completedUnits.size || 0;
            
            const card = document.createElement('div');
            card.className = 'course-card';
            card.innerHTML = `
                <span class="badge enrolled"><i class="fas fa-check-circle"></i> ENROLLED</span>
                <h3><i class="fas fa-car"></i> ${escapeHtml(course.name)}</h3>
                <p>${escapeHtml(course.description) || 'Continue your learning journey.'}</p>
                <div class="progress-bar-container" style="background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; margin: 10px 0;">
                    <div id="progress_${course.id}" style="background: #00FF88; width: 0%; height: 100%; border-radius: 10px; transition: width 0.3s;"></div>
                </div>
                <button class="btn-start" onclick="window.startCourse(${course.id})">
                    <i class="fas fa-play-circle"></i> Continue Learning
                </button>
            `;
            container.appendChild(card);
            
            // Asynchronously updates the status individual micro-bars
            (async () => {
                const { data: units } = await supabase
                    .from('course_units')
                    .select('id')
                    .eq('course_id', course.id);
                
                const totalUnits = units?.length || 1;
                const percent = Math.round((completedCount / totalUnits) * 100);
                
                const progressElement = document.getElementById(`progress_${course.id}`);
                if (progressElement) progressElement.style.width = `${percent}%`;
            })();
        });
    }
    
    window.enrollInCourse = async function(courseId) {
        setLoading(true);
        try {
            const { data: existing } = await supabase
                .from('enrollments')
                .select('id')
                .eq('user_id', currentUser.id)
                .eq('course_id', courseId)
                .maybeSingle();
            
            if (existing) {
                showToast('You are already enrolled in this course!', 'error');
                return;
            }
            
            const { error } = await supabase
                .from('enrollments')
                .insert([{
                    user_id: currentUser.id,
                    course_id: courseId,
                    status: 'active',
                    enrolled_at: new Date().toISOString()
                }]);
            
            if (error) {
                showToast(error.message || 'Failed to enroll. Please try again.', 'error');
            } else {
                showToast('Successfully enrolled in course!', 'success');
                enrolledCourseIds.add(courseId);
                await loadUserData();
            }
        } catch (err) {
            console.error('Enrollment error details:', err);
            showToast('Failed to enroll. Please try again.', 'error');
        } finally {
            setLoading(false);
        }
    };
    
    window.startCourse = function(courseId) {
        window.location.href = `/course.html?id=${courseId}`;
    };
    
    async function handleLogout() {
        setLoading(true);
        try {
            // Force sign out locally even if connection fails or session is expired
            await supabase.auth.signOut({ scope: 'local' });
        } catch (err) {
            console.error('Supabase explicit signout failed:', err);
        } finally {
            // Always run cleanup steps regardless of database connection status
            localStorage.clear();
            sessionStorage.clear();
            currentUser = null;
            enrolledCourseIds = new Set();
            setLoading(false);
            window.location.replace('/');
        }
    }
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, m => ({ 
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' 
        }[m]));
    }
    
    // EVENT DELEGATION: Catches click on logout button even if UI re-renders dynamically
    document.addEventListener('click', function(e) {
        const logoutBtn = e.target.closest('#logoutButton');
        if (logoutBtn) {
            e.preventDefault();
            handleLogout();
        }
    });
    
    // Proper structural loading lifecycle chain
    async function init() {
        const isAuthenticated = await checkAuth();
        if (!isAuthenticated) return;
        
        await loadCourses();    
        await loadUserData();   
    }
    
    init();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Dashboard | MEI Drive Africa</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #041B3D;
            color: #fff;
            overflow-x: hidden;
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: #0A234F;
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar h2 {
            color: #00FF88;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #B7C4D6;
            padding: 12px;
            text-decoration: none;
            margin-top: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .sidebar a:hover, .sidebar a.active {
            background: #00FF88;
            color: #041B3D;
        }

        .logout-btn {
            margin-top: 30px;
            background: #ff4d4f;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logout-btn:hover {
            background: #ff7875;
            transform: translateY(-2px);
        }

        /* Mobile menu */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            background: #00FF88;
            color: #041B3D;
            border: none;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            z-index: 101;
            font-size: 1.2rem;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        /* Main content */
        .main {
            margin-left: 260px;
            padding: 20px;
            transition: margin-left 0.3s ease;
        }

        /* Cards */
        .card {
            background: #0A234F;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #041B3D;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: #00FF88;
            transform: translateY(-3px);
        }

        .stat-card i {
            font-size: 2rem;
            color: #00FF88;
            margin-bottom: 10px;
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #00FF88;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #B7C4D6;
        }

        /* Tables */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1a3a5f;
        }

        th {
            color: #00FF88;
            font-weight: 600;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .badge.admin {
            background: #00FF88;
            color: #041B3D;
        }

        .badge.user {
            background: #0A234F;
            color: #00FF88;
            border: 1px solid #00FF88;
        }

        .badge.active, .badge.completed {
            background: rgba(0, 200, 81, 0.2);
            color: #00C851;
            border: 1px solid #00C851;
        }

        .badge.pending {
            background: rgba(255, 152, 0, 0.2);
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        /* Buttons */
        .btn-primary {
            background: #00FF88;
            color: #041B3D;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 136, 0.3);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #B7C4D6;
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0A234F;
            border-left: 4px solid #00FF88;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            border-left-color: #ff4d4f;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.active {
                transform: translateX(0);
            }
            .main {
                margin-left: 0;
                padding: 60px 15px 20px 15px;
            }
            .mobile-menu-btn {
                display: block;
            }
            .overlay.active {
                display: block;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            table, thead, tbody, th, td, tr {
                display: block;
            }
            th {
                display: none;
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px;
            }
            td::before {
                content: attr(data-label);
                font-weight: bold;
                color: #00FF88;
                width: 40%;
            }
        }
    </style>
</head>
<body>

<button class="mobile-menu-btn" id="mobileMenuBtn">
    <i class="fas fa-bars"></i>
</button>
<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h2><i class="fas fa-car"></i> MEI ADMIN</h2>
    
    <a href="javascript:void(0)" data-section="dashboard" onclick="showSection('dashboard')">
        <i class="fas fa-tachometer-alt"></i> Dashboard
    </a>
    <a href="javascript:void(0)" data-section="courses" onclick="showSection('courses')">
        <i class="fas fa-book"></i> Courses
    </a>
    <a href="javascript:void(0)" data-section="users" onclick="showSection('users')">
        <i class="fas fa-users"></i> Users
    </a>
    <a href="javascript:void(0)" data-section="enrollments" onclick="showSection('enrollments')">
        <i class="fas fa-graduation-cap"></i> Enrollments
    </a>
    
    <button class="logout-btn" onclick="handleLogout()">
        <i class="fas fa-sign-out-alt"></i> Logout
    </button>
</div>

<!-- MAIN CONTENT -->
<div class="main">

    <!-- DASHBOARD SECTION -->
    <div id="dashboardSection">
        <h2><i class="fas fa-tachometer-alt"></i> Dashboard Overview</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <i class="fas fa-book"></i>
                <h3 id="coursesCount">0</h3>
                <p>Total Courses</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <h3 id="usersCount">0</h3>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-graduation-cap"></i>
                <h3 id="enrollmentsCount">0</h3>
                <p>Total Enrollments</p>
            </div>
            <div class="stat-card">
                <i class="fas fa-chart-line"></i>
                <h3 id="activeCount">0</h3>
                <p>Active Enrollments</p>
            </div>
        </div>
    </div>

    <!-- COURSES SECTION -->
    <div id="coursesSection" style="display:none">
        <div class="card">
            <h2><i class="fas fa-book"></i> Course Management</h2>
            <button class="btn-primary" onclick="loadCourses()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <div id="coursesTable" class="table-wrapper"></div>
        </div>
    </div>

    <!-- USERS SECTION -->
    <div id="usersSection" style="display:none">
        <div class="card">
            <h2><i class="fas fa-users"></i> User Management</h2>
            <div id="usersTable" class="table-wrapper"></div>
        </div>
    </div>

    <!-- ENROLLMENTS SECTION -->
    <div id="enrollmentsSection" style="display:none">
        <div class="card">
            <h2><i class="fas fa-graduation-cap"></i> Enrollment Management</h2>
            <div id="enrollmentsTable" class="table-wrapper"></div>
        </div>
    </div>

</div>

<script>
    // ============================================
    // SUPABASE CONFIGURATION - CORRECT WAY
    // ============================================
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    // Initialize Supabase correctly
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    console.log('Supabase Admin Client initialized');
    
    // ============================================
    // GLOBAL VARIABLES
    // ============================================
    let currentUser = null;
    let currentUserRole = null;
    let loadingStates = {
        courses: false,
        users: false,
        enrollments: false
    };
    
    // ============================================
    // TOAST NOTIFICATION
    // ============================================
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        
        setTimeout(() => toast.remove(), 4000);
    }
    
    // ============================================
    // ESCAPE HTML (XSS Protection)
    // ============================================
    function escapeHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
    
    // ============================================
    // CHECK ADMIN AUTHENTICATION
    // ============================================
    async function checkAdminAuth() {
        try {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            
            if (error || !session) {
                console.log('No session found, redirecting to admin login');
                window.location.href = 'admin-login.html';
                return false;
            }
            
            currentUser = session.user;
            
            // Check user role from profiles
            const { data: profile, error: profileError } = await supabaseClient
                .from('profiles')
                .select('role')
                .eq('id', currentUser.id)
                .maybeSingle();
            
            if (profileError) {
                console.error('Profile fetch error:', profileError);
                showToast('Error verifying admin privileges', 'error');
                await supabaseClient.auth.signOut();
                window.location.href = 'admin-login.html';
                return false;
            }
            
            if (!profile || profile.role !== 'admin') {
                console.error('User is not admin:', profile?.role);
                showToast('Access denied. Admin privileges required.', 'error');
                await supabaseClient.auth.signOut();
                window.location.href = 'login.html';
                return false;
            }
            
            currentUserRole = profile.role;
            console.log('Admin verified:', currentUser.email);
            return true;
            
        } catch (err) {
            console.error('Admin auth error:', err);
            window.location.href = 'admin-login.html';
            return false;
        }
    }
    
    // ============================================
    // LOAD STATS
    // ============================================
    async function loadStats() {
        try {
            const [coursesRes, usersRes, enrollmentsRes] = await Promise.all([
                supabaseClient.from('courses').select('*', { count: 'exact', head: true }),
                supabaseClient.from('profiles').select('*', { count: 'exact', head: true }),
                supabaseClient.from('enrollments').select('*', { count: 'exact', head: true })
            ]);
            
            const activeRes = await supabaseClient
                .from('enrollments')
                .select('*', { count: 'exact', head: true })
                .eq('status', 'active');
            
            document.getElementById('coursesCount').textContent = coursesRes.count || 0;
            document.getElementById('usersCount').textContent = usersRes.count || 0;
            document.getElementById('enrollmentsCount').textContent = enrollmentsRes.count || 0;
            document.getElementById('activeCount').textContent = activeRes.count || 0;
            
        } catch (err) {
            console.error('Error loading stats:', err);
            showToast('Failed to load statistics', 'error');
        }
    }
    
    // ============================================
    // LOAD COURSES
    // ============================================
    async function loadCourses() {
        if (loadingStates.courses) return;
        loadingStates.courses = true;
        
        const container = document.getElementById('coursesTable');
        container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading courses...</p></div>';
        
        try {
            const { data, error } = await supabaseClient
                .from('courses')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i><p>No courses found</p></div>';
                return;
            }
            
            let html = `<table><thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Price</th><th>Duration</th><th>Level</th></thead><tbody>`;
            
            data.forEach(course => {
                html += `<tr>
                    <td data-label="ID">${course.id}</td>
                    <td data-label="Name">${escapeHtml(course.name)}</td>
                    <td data-label="Type"><span class="badge ${course.type}">${escapeHtml(course.type)}</span></td>
                    <td data-label="Price">KES ${course.price?.toLocaleString() || 0}</td>
                    <td data-label="Duration">${escapeHtml(course.duration || 'N/A')}</td>
                    <td data-label="Level">${escapeHtml(course.level || 'N/A')}</td>
                </tr>`;
            });
            
            html += '</tbody>赶';
            container.innerHTML = html;
            
        } catch (err) {
            console.error('Error loading courses:', err);
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading courses</p><button class="btn-primary" onclick="loadCourses()">Retry</button></div>`;
            showToast('Failed to load courses', 'error');
        } finally {
            loadingStates.courses = false;
        }
    }
    
    // ============================================
    // LOAD USERS
    // ============================================
    async function loadUsers() {
        if (loadingStates.users) return;
        loadingStates.users = true;
        
        const container = document.getElementById('usersTable');
        container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading users...</p></div>';
        
        try {
            const { data, error } = await supabaseClient
                .from('profiles')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i><p>No users found</p></div>';
                return;
            }
            
            let html = `<table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Joined</th></thead><tbody>`;
            
            data.forEach(user => {
                html += `<tr>
                    <td data-label="ID">${user.id?.substring(0, 8)}...</td>
                    <td data-label="Name">${escapeHtml(user.full_name || 'N/A')}</td>
                    <td data-label="Email">${escapeHtml(user.email || 'N/A')}</td>
                    <td data-label="Phone">${escapeHtml(user.phone || 'N/A')}</td>
                    <td data-label="Role"><span class="badge ${user.role || 'user'}">${escapeHtml(user.role || 'user')}</span></td>
                    <td data-label="Joined">${user.created_at ? new Date(user.created_at).toLocaleDateString() : 'N/A'}</td>
                </tr>`;
            });
            
            html += '</tbody>赶';
            container.innerHTML = html;
            
        } catch (err) {
            console.error('Error loading users:', err);
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading users</p><button class="btn-primary" onclick="loadUsers()">Retry</button></div>`;
            showToast('Failed to load users', 'error');
        } finally {
            loadingStates.users = false;
        }
    }
    
    // ============================================
    // LOAD ENROLLMENTS
    // ============================================
    async function loadEnrollments() {
        if (loadingStates.enrollments) return;
        loadingStates.enrollments = true;
        
        const container = document.getElementById('enrollmentsTable');
        container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading enrollments...</p></div>';
        
        try {
            const { data, error } = await supabaseClient
                .from('enrollments')
                .select(`
                    *,
                    profiles:user_id (full_name, email),
                    courses:course_id (name, type)
                `)
                .order('enrolled_at', { ascending: false });
            
            if (error) throw error;
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-graduation-cap"></i><p>No enrollments found</p></div>';
                return;
            }
            
            let html = `社<thead>
                <tr>
                    <th>User</th><th>Course</th><th>Status</th><th>Payment</th><th>Progress</th><th>Enrolled</th>
                </tr>
            </thead><tbody>`;
            
            data.forEach(enrollment => {
                const profile = enrollment.profiles;
                const course = enrollment.courses;
                
                html += `<tr>
                    <td data-label="User">${escapeHtml(profile?.full_name || 'N/A')}<br><small>${escapeHtml(profile?.email || '')}</small></td>
                    <td data-label="Course">${escapeHtml(course?.name || 'N/A')}<br><small>${escapeHtml(course?.type || '')}</small></td>
                    <td data-label="Status"><span class="badge ${enrollment.status || 'pending'}">${escapeHtml(enrollment.status || 'pending')}</span></td>
                    <td data-label="Payment"><span class="badge ${enrollment.payment_status || 'pending'}">${escapeHtml(enrollment.payment_status || 'pending')}</span></td>
                    <td data-label="Progress">${enrollment.progress || 0}%</td>
                    <td data-label="Enrolled">${enrollment.enrolled_at ? new Date(enrollment.enrolled_at).toLocaleDateString() : 'N/A'}</td>
                </tr>`;
            });
            
            html += '</tbody>赶';
            container.innerHTML = html;
            
        } catch (err) {
            console.error('Error loading enrollments:', err);
            container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading enrollments</p><button class="btn-primary" onclick="loadEnrollments()">Retry</button></div>`;
            showToast('Failed to load enrollments', 'error');
        } finally {
            loadingStates.enrollments = false;
        }
    }
    
    // ============================================
    // SECTION NAVIGATION
    // ============================================
    async function showSection(section) {
        const sections = ['dashboardSection', 'coursesSection', 'usersSection', 'enrollmentsSection'];
        
        sections.forEach(sec => {
            const element = document.getElementById(sec);
            if (element) element.style.display = 'none';
        });
        
        const targetSection = document.getElementById(`${section}Section`);
        if (targetSection) targetSection.style.display = 'block';
        
        // Update active menu
        document.querySelectorAll('.sidebar a').forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('data-section') === section) {
                link.classList.add('active');
            }
        });
        
        // Load data based on section
        if (section === 'dashboard') await loadStats();
        if (section === 'courses') await loadCourses();
        if (section === 'users') await loadUsers();
        if (section === 'enrollments') await loadEnrollments();
        
        // Close mobile menu
        if (window.innerWidth <= 768) closeMobileMenu();
    }
    
    // ============================================
    // LOGOUT
    // ============================================
    async function handleLogout() {
        try {
            await supabaseClient.auth.signOut();
            window.location.href = 'admin-login.html';
        } catch (err) {
            console.error('Logout error:', err);
            showToast('Failed to logout', 'error');
        }
    }
    
    // ============================================
    // MOBILE MENU
    // ============================================
    function openMobileMenu() {
        document.getElementById('sidebar').classList.add('active');
        document.getElementById('overlay').classList.add('active');
        document.body.style.overflow = 'hidden';
    }
    
    function closeMobileMenu() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
        document.body.style.overflow = '';
    }
    
    // ============================================
    // AUTH STATE LISTENER
    // ============================================
    supabaseClient.auth.onAuthStateChange((event, session) => {
        console.log('Auth event:', event);
        if (event === 'SIGNED_OUT') {
            window.location.href = 'admin-login.html';
        }
    });
    
    // ============================================
    // INITIALIZATION
    // ============================================
    async function init() {
        const isAdmin = await checkAdminAuth();
        if (!isAdmin) return;
        
        await loadStats();
        
        // Setup mobile menu
        const menuBtn = document.getElementById('mobileMenuBtn');
        const overlay = document.getElementById('overlay');
        
        if (menuBtn) menuBtn.addEventListener('click', openMobileMenu);
        if (overlay) overlay.addEventListener('click', closeMobileMenu);
        
        // Set active menu and show dashboard
        setActiveMenu('dashboard');
        await showSection('dashboard');
    }
    
    function setActiveMenu(section) {
        document.querySelectorAll('.sidebar a').forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('data-section') === section) {
                link.classList.add('active');
            }
        });
    }
    
    // Start the app
    init();
    
    // Global functions
    window.showSection = showSection;
    window.loadCourses = loadCourses;
    window.loadUsers = loadUsers;
    window.loadEnrollments = loadEnrollments;
    window.handleLogout = handleLogout;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Student dashboard for MEI DRIVE AFRICA - Track your driving course progress, enrollments, and certificates">
    <meta name="theme-color" content="#041B3D">
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="Student Dashboard | MEI DRIVE AFRICA">
    <meta property="og:description" content="Track your NTSA-approved driver training progress">
    <meta property="og:type" content="website">
    
    <!-- Preconnect to CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    
    <!-- Stylesheets with SRI hashes for security -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" 
          integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" 
          crossorigin="anonymous" referrerpolicy="no-referrer">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <title>Dashboard | MEI DRIVE AFRICA</title>
    
    <style>
        /* CSS Variables for theme support */
        :root {
            --bg-main: #0B0F19;
            --bg-card: #151D30;
            --accent: #00FF88;
            --accent-hover: #00E577;
            --text-primary: #FFFFFF;
            --text-secondary: #8A99AD;
            --border-color: rgba(255, 255, 255, 0.08);
            --danger: #FF4D4F;
            --danger-hover: #ff6b6b;
            --warning: #FFA800;
            --success: #00FF88;
        }

        /* Dark theme support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: #0B0F19;
                --bg-card: #151D30;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Focus styles for accessibility */
        :focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* Skip to main content link for accessibility */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--accent);
            color: #000;
            padding: 8px;
            text-decoration: none;
            z-index: 1001;
        }
        .skip-link:focus {
            top: 0;
        }

        header {
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .logo span { color: var(--accent); }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            text-align: right;
        }

        .user-info .name {
            font-weight: 600;
            font-size: 14px;
            display: block;
        }

        .user-info .email {
            font-size: 12px;
            color: var(--text-secondary);
            display: block;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-logout:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(255, 77, 79, 0.05);
        }

        main {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 32px 24px;
            flex: 1;
        }

        /* Loading states */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--border-color) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .spinner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s ease-in-out, visibility 0.2s;
        }

        .spinner-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(0, 255, 136, 0.1);
            border-left-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Button loading state */
        .btn-loading {
            position: relative;
            pointer-events: none;
            opacity: 0.7;
        }
        .btn-loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            animation: slideIn 0.3s ease;
            max-width: 350px;
            word-break: break-word;
        }
        .toast.success { border-left: 4px solid var(--accent); }
        .toast.error { border-left: 4px solid var(--danger); }
        .toast.warning { border-left: 4px solid var(--warning); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* ARIA live region for screen readers */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            header {
                padding: 12px 16px;
            }
            .user-info .email {
                display: none;
            }
            main {
                padding: 20px 16px;
            }
        }

        @media (max-width: 480px) {
            .user-info .name {
                font-size: 12px;
            }
            .btn-logout {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Skip to main content</a>

    <div id="loadingSpinner" class="spinner-overlay" aria-hidden="true" role="status">
        <div class="spinner"></div>
        <span class="sr-only">Loading...</span>
    </div>

    <header role="banner">
        <div class="logo" onclick="location.href='/'" role="button" tabindex="0" aria-label="Home">
            <i class="fas fa-steering-wheel" aria-hidden="true"></i> MeiDrive <span>Africa</span>
        </div>
        <div class="user-menu">
            <div class="user-info">
                <span class="name" id="userName">Student</span>
                <span class="email" id="userEmail"></span>
            </div>
            <button class="btn-logout" id="logoutButton" aria-label="Logout">
                <i class="fas fa-sign-out-alt" aria-hidden="true"></i> Logout
            </button>
        </div>
    </header>

    <main id="main-content" role="main">
        <div class="welcome-section">
            <h1 id="welcomeMsg">Welcome back!</h1>
            <p>Track your NTSA standard driving lesson requirements, curriculum schedules, and testing goals.</p>
        </div>

        <!-- Stats will be loaded dynamically -->
        <div class="stats-grid" id="statsGrid"></div>

        <div class="courses-section">
            <h2 class="section-title"><i class="fas fa-road" aria-hidden="true"></i> My Active Courses</h2>
            <div class="courses-grid" id="enrolledGrid" role="list" aria-label="Enrolled courses"></div>
        </div>

        <div class="courses-section">
            <h2 class="section-title"><i class="fas fa-plus" aria-hidden="true"></i> Available Training Programs</h2>
            <div class="courses-grid" id="coursesGrid" role="list" aria-label="Available courses"></div>
        </div>
    </main>

    <!-- Toast container for notifications -->
    <div id="toastContainer" aria-live="polite" aria-atomic="true" style="position: fixed; bottom: 20px; right: 20px; z-index: 10000;"></div>

    <script type="module">
        // Environment variables (should be replaced at build time)
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        
        // Import Supabase (using dynamic import for better performance)
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
            }
        });

        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            MAX_RETRIES: 3,
            RETRY_DELAY: 1000,
            TOAST_DURATION: 5000,
            CACHE_TTL: 300000, // 5 minutes
            PAGE_SIZE: 20
        };

        // Cache for course units
        const courseUnitsCache = new Map();

        // State management
        let state = {
            currentUser: null,
            allCourses: [],
            enrolledCourseIds: new Set(),
            userProgress: {},
            isLoading: false,
            pendingEnrollments: new Set()
        };

        // DOM Elements
        const elements = {
            spinner: document.getElementById('loadingSpinner'),
            toastContainer: document.getElementById('toastContainer'),
            statsGrid: document.getElementById('statsGrid'),
            enrolledGrid: document.getElementById('enrolledGrid'),
            coursesGrid: document.getElementById('coursesGrid'),
            userName: document.getElementById('userName'),
            userEmail: document.getElementById('userEmail'),
            welcomeMsg: document.getElementById('welcomeMsg')
        };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        
        function sanitizeHTML(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showToast(message, type = 'success', duration = CONFIG.TOAST_DURATION) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.setAttribute('role', 'alert');
            toast.setAttribute('aria-live', 'polite');
            
            const icon = type === 'success' ? 'fa-check-circle' : (type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle');
            toast.innerHTML = `<i class="fas ${icon}" aria-hidden="true"></i> ${sanitizeHTML(message)}`;
            
            elements.toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

        async function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function fetchWithRetry(fn, retries = CONFIG.MAX_RETRIES) {
            for (let i = 0; i < retries; i++) {
                try {
                    return await fn();
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await sleep(CONFIG.RETRY_DELAY * (i + 1));
                }
            }
        }

        function setLoading(loading, element = null) {
            state.isLoading = loading;
            if (element) {
                if (loading) {
                    element.classList.add('btn-loading');
                    element.disabled = true;
                } else {
                    element.classList.remove('btn-loading');
                    element.disabled = false;
                }
            } else {
                if (loading) {
                    elements.spinner.classList.add('active');
                } else {
                    elements.spinner.classList.remove('active');
                }
            }
        }

        // ============================================
        // AUTHENTICATION
        // ============================================
        
        async function checkAuth() {
            try {
                const { data: { session }, error } = await fetchWithRetry(() => 
                    supabase.auth.getSession()
                );
                
                if (error || !session) {
                    window.location.href = '/login.html';
                    return false;
                }
                
                state.currentUser = session.user;
                
                // Get user profile with fallback
                let displayName = session.user.email.split('@')[0];
                let fullName = '';
                
                try {
                    const { data: profile } = await supabase
                        .from('profiles')
                        .select('full_name')
                        .eq('id', state.currentUser.id)
                        .maybeSingle();
                    
                    if (profile?.full_name) {
                        fullName = profile.full_name;
                        displayName = fullName.split(' ')[0] || displayName;
                    }
                } catch (err) {
                    console.warn('Profile fetch failed:', err);
                }
                
                elements.userName.textContent = displayName;
                elements.userEmail.textContent = session.user.email;
                elements.welcomeMsg.textContent = `Welcome back, ${displayName}!`;
                
                // Setup auth state change listener
                supabase.auth.onAuthStateChange((event, session) => {
                    if (event === 'SIGNED_OUT') {
                        window.location.href = '/login.html';
                    } else if (event === 'TOKEN_REFRESHED') {
                        console.log('Session refreshed');
                    } else if (event === 'SIGNED_IN' && session) {
                        state.currentUser = session.user;
                        loadDashboard();
                    }
                });
                
                return true;
            } catch (err) {
                console.error('Auth error:', err);
                showToast('Authentication failed. Please login again.', 'error');
                window.location.href = '/login.html';
                return false;
            }
        }

        async function handleLogout() {
            setLoading(true);
            try {
                const { error } = await fetchWithRetry(() => supabase.auth.signOut());
                if (error) throw error;
                
                // Clear cache
                courseUnitsCache.clear();
                state = {
                    currentUser: null,
                    allCourses: [],
                    enrolledCourseIds: new Set(),
                    userProgress: {},
                    isLoading: false,
                    pendingEnrollments: new Set()
                };
                
                window.location.href = '/';
            } catch (err) {
                console.error('Logout error:', err);
                showToast('Logout failed. Please try again.', 'error');
                // Force redirect anyway
                window.location.href = '/';
            } finally {
                setLoading(false);
            }
        }

        // ============================================
        // DATA FETCHING (Optimized)
        // ============================================
        
        async function fetchAllCourses() {
            const { data, error } = await fetchWithRetry(() =>
                supabase
                    .from('courses')
                    .select('id, name, description, price, type, icon')
                    .order('id', { ascending: true })
                    .limit(CONFIG.PAGE_SIZE)
            );
            
            if (error) throw error;
            return data || [];
        }

        async function fetchUserEnrollments() {
            const { data, error } = await fetchWithRetry(() =>
                supabase
                    .from('enrollments')
                    .select('course_id')
                    .eq('user_id', state.currentUser.id)
            );
            
            if (error) throw error;
            return data || [];
        }

        async function fetchUserProgress() {
            const { data, error } = await fetchWithRetry(() =>
                supabase
                    .from('user_progress')
                    .select('course_id, unit_id, completed, score')
                    .eq('user_id', state.currentUser.id)
            );
            
            if (error) throw error;
            return data || [];
        }

        // Optimized: Get all unit counts in a single query (fixes N+1 problem)
        async function getUnitCounts(courseIds) {
            const { data, error } = await supabase
                .from('course_units')
                .select('course_id, count')
                .in('course_id', courseIds)
                .select('course_id', { count: 'exact', head: true });
            
            // Fallback: query each course individually if the above fails
            if (error) {
                const counts = {};
                for (const id of courseIds) {
                    const { count } = await supabase
                        .from('course_units')
                        .select('*', { count: 'exact', head: true })
                        .eq('course_id', id);
                    counts[id] = count || 1;
                }
                return counts;
            }
            
            // Process the aggregated data
            const counts = {};
            data.forEach(item => {
                counts[item.course_id] = item.count;
            });
            return counts;
        }

        // ============================================
        // PROGRESS CALCULATION
        // ============================================
        
        function calculateStats(progress, unitCounts, enrolledIds) {
            let totalCompleted = 0;
            let totalScores = 0;
            let scoreCount = 0;
            let totalProgress = 0;
            let progressCount = 0;
            
            for (const courseId of enrolledIds) {
                const courseProgress = progress.filter(p => p.course_id === courseId);
                const completed = courseProgress.filter(p => p.completed).length;
                totalCompleted += completed;
                
                const scores = courseProgress.filter(p => p.score > 0).map(p => p.score);
                scores.forEach(s => {
                    totalScores += s;
                    scoreCount++;
                });
                
                const totalUnits = unitCounts[courseId] || 1;
                const coursePercent = Math.round((completed / totalUnits) * 100);
                totalProgress += coursePercent;
                progressCount++;
            }
            
            return {
                enrolledCount: enrolledIds.length,
                completedUnits: totalCompleted,
                avgScore: scoreCount > 0 ? Math.round(totalScores / scoreCount) : 0,
                overallProgress: progressCount > 0 ? Math.round(totalProgress / progressCount) : 0
            };
        }

        // ============================================
        // RENDERING
        // ============================================
        
        function renderStats(stats) {
            elements.statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-book-open" aria-hidden="true"></i></div>
                    <div class="stat-details">
                        <span class="num">${stats.enrolledCount}</span>
                        <span class="label">Enrolled Courses</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-tasks" aria-hidden="true"></i></div>
                    <div class="stat-details">
                        <span class="num">${stats.completedUnits}</span>
                        <span class="label">Completed Units</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-graduation-cap" aria-hidden="true"></i></div>
                    <div class="stat-details">
                        <span class="num">${stats.avgScore}%</span>
                        <span class="label">Average Score</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-chart-line" aria-hidden="true"></i></div>
                    <div class="stat-details">
                        <span class="num">${stats.overallProgress}%</span>
                        <span class="label">Overall Progress</span>
                    </div>
                </div>
            `;
        }

        function renderAvailableCourses(courses, enrolledIds) {
            const available = courses.filter(c => !enrolledIds.has(c.id));
            
            if (available.length === 0) {
                elements.coursesGrid.innerHTML = '<div class="loading-placeholder" role="status">🎉 You\'re enrolled in all available courses!</div>';
                return;
            }
            
            elements.coursesGrid.innerHTML = '';
            
            available.forEach(course => {
                const isFree = course.type === 'free' || course.price === 0;
                const card = document.createElement('div');
                card.className = 'course-card';
                card.setAttribute('role', 'listitem');
                
                card.innerHTML = `
                    <span class="badge ${isFree ? 'free-badge' : 'premium-badge'}">${isFree ? 'FREE' : 'PREMIUM'}</span>
                    <h3><i class="fas fa-car" aria-hidden="true"></i> ${sanitizeHTML(course.name)}</h3>
                    <p>${sanitizeHTML(course.description?.substring(0, 100)) || 'Professional driver training course approved by NTSA.'}</p>
                    <div class="price ${isFree ? 'free' : 'premium'}">
                        ${isFree ? 'FREE' : `KES ${course.price?.toLocaleString() || 0}`}
                    </div>
                    <button class="btn-enroll" data-id="${course.id}" data-name="${sanitizeHTML(course.name)}">
                        <i class="fas fa-plus-circle" aria-hidden="true"></i> Enroll Now
                    </button>
                `;
                elements.coursesGrid.appendChild(card);
            });
            
            // Attach event listeners with debounce
            elements.coursesGrid.querySelectorAll('.btn-enroll').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const courseId = parseInt(btn.dataset.id);
                    const courseName = btn.dataset.name;
                    
                    if (state.pendingEnrollments.has(courseId)) {
                        showToast('Enrollment in progress...', 'warning');
                        return;
                    }
                    
                    await enrollInCourse(courseId, courseName, btn);
                });
            });
        }

        async function renderEnrolledCourses(courses, enrolledIds, progress, unitCounts) {
            const enrolled = courses.filter(c => enrolledIds.has(c.id));
            
            if (enrolled.length === 0) {
                elements.enrolledGrid.innerHTML = '<div class="loading-placeholder" role="status">You haven\'t enrolled in any courses yet.</div>';
                return;
            }
            
            elements.enrolledGrid.innerHTML = '';
            
            // Process all courses in parallel (fixes sequential loop)
            const cards = await Promise.all(enrolled.map(async (course) => {
                const courseProgress = progress.filter(p => p.course_id === course.id);
                const completed = courseProgress.filter(p => p.completed).length;
                const totalUnits = unitCounts[course.id] || 1;
                const progressPercent = Math.round((completed / totalUnits) * 100);
                
                const card = document.createElement('div');
                card.className = 'course-card';
                card.setAttribute('role', 'listitem');
                card.innerHTML = `
                    <span class="badge enrolled"><i class="fas fa-check-circle" aria-hidden="true"></i> ENROLLED</span>
                    <h3><i class="fas fa-car" aria-hidden="true"></i> ${sanitizeHTML(course.name)}</h3>
                    <p>${sanitizeHTML(course.description?.substring(0, 100)) || 'Continue your learning journey.'}</p>
                    <div class="progress-bar-container" role="progressbar" aria-label="Course progress" aria-valuenow="${progressPercent}" aria-valuemin="0" aria-valuemax="100">
                        <div class="progress-bar" style="width: ${progressPercent}%;"></div>
                    </div>
                    <div style="font-size: 12px; color: var(--text-secondary);">${progressPercent}% Complete</div>
                    <button class="btn-start" data-id="${course.id}">
                        <i class="fas fa-play-circle" aria-hidden="true"></i> Continue Learning
                    </button>
                `;
                return card;
            }));
            
            cards.forEach(card => elements.enrolledGrid.appendChild(card));
            
            elements.enrolledGrid.querySelectorAll('.btn-start').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const courseId = parseInt(btn.dataset.id);
                    window.location.href = `/course.html?id=${courseId}`;
                });
            });
        }

        // ============================================
        // ENROLLMENT (with transaction-like behavior)
        // ============================================
        
        async function enrollInCourse(courseId, courseName, buttonElement) {
            if (state.pendingEnrollments.has(courseId)) {
                showToast('Enrollment already in progress...', 'warning');
                return;
            }
            
            state.pendingEnrollments.add(courseId);
            setLoading(true, buttonElement);
            
            try {
                // Check if already enrolled (double-check)
                const { data: existing, error: checkError } = await supabase
                    .from('enrollments')
                    .select('id')
                    .eq('user_id', state.currentUser.id)
                    .eq('course_id', courseId)
                    .maybeSingle();
                
                if (checkError) throw checkError;
                
                if (existing) {
                    showToast(`You're already enrolled in ${courseName}!`, 'success');
                    window.location.href = `/course.html?id=${courseId}`;
                    return;
                }
                
                // Perform enrollment
                const { error: enrollError } = await supabase
                    .from('enrollments')
                    .insert([{
                        user_id: state.currentUser.id,
                        course_id: courseId,
                        status: 'active',
                        enrolled_at: new Date().toISOString()
                    }]);
                
                if (enrollError) throw enrollError;
                
                showToast(`Successfully enrolled in ${courseName}!`, 'success');
                
                // Refresh dashboard data efficiently
                await refreshDashboard();
                
                // Redirect to course
                window.location.href = `/course.html?id=${courseId}`;
                
            } catch (err) {
                console.error('Enrollment error:', err);
                showToast(err.message || 'Failed to enroll. Please try again.', 'error');
            } finally {
                state.pendingEnrollments.delete(courseId);
                setLoading(false, buttonElement);
            }
        }

        // ============================================
        // DASHBOARD LOADING
        // ============================================
        
        async function loadDashboard() {
            setLoading(true);
            
            try {
                // Parallel data fetching
                const [courses, enrollments, progress] = await Promise.all([
                    fetchAllCourses(),
                    fetchUserEnrollments(),
                    fetchUserProgress()
                ]);
                
                state.allCourses = courses;
                state.enrolledCourseIds = new Set(enrollments.map(e => e.course_id));
                state.userProgress = progress;
                
                // Get unit counts in optimized way
                let unitCounts = {};
                if (state.enrolledCourseIds.size > 0) {
                    unitCounts = await getUnitCounts(Array.from(state.enrolledCourseIds));
                }
                
                // Calculate stats
                const stats = calculateStats(progress, unitCounts, state.enrolledCourseIds);
                renderStats(stats);
                
                // Render courses
                renderAvailableCourses(courses, state.enrolledCourseIds);
                await renderEnrolledCourses(courses, state.enrolledCourseIds, progress, unitCounts);
                
            } catch (err) {
                console.error('Dashboard load error:', err);
                showToast('Failed to load dashboard. Please refresh the page.', 'error');
                
                // Show error state in grids
                elements.coursesGrid.innerHTML = '<div class="loading-placeholder" role="status">⚠️ Failed to load courses. Please refresh.</div>';
                elements.enrolledGrid.innerHTML = '<div class="loading-placeholder" role="status">⚠️ Failed to load your courses. Please refresh.</div>';
            } finally {
                setLoading(false);
            }
        }
        
        async function refreshDashboard() {
            // Clear cache
            courseUnitsCache.clear();
            await loadDashboard();
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        
        document.getElementById('logoutButton').addEventListener('click', handleLogout);
        
        async function init() {
            const authenticated = await checkAuth();
            if (authenticated) {
                await loadDashboard();
            }
        }
        
        init();
    </script>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-green: #00FF88;
            --dark-navy: #041B3D;
            --secondary-dark: #0A234F;
            --white: #FFFFFF;
            --soft-gray: #B7C4D6;
            --error: #ff4444;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--secondary-dark);
            color: var(--white);
        }
        .navbar {
            background: var(--dark-navy);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0,255,136,0.15);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--neon-green); cursor: pointer; }
        .logo span { color: white; }
        .logout-btn {
            background: rgba(255,68,68,0.2);
            border: 1px solid var(--error);
            color: var(--error);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
        }
        .container { max-width: 1200px; margin: auto; padding: 2rem; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--dark-navy);
            border-radius: 16px;
            padding: 1.5rem;
            text-align: center;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .stat-card h2 { font-size: 2rem; color: var(--neon-green); margin: 0.5rem 0; }
        .section-card {
            background: var(--dark-navy);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0,255,136,0.15);
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0,255,136,0.15);
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(183,196,214,0.1); }
        th { color: var(--neon-green); }
        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        .badge-success { background: rgba(0,255,136,0.2); color: var(--neon-green); }
        .loading { text-align: center; padding: 2rem; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            table { display: block; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="location.href='/'">MEI DRIVE <span>AFRICA</span></div>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><h2 id="totalCourses">0</h2><p>Total Courses</p></div>
            <div class="stat-card"><h2 id="totalUsers">0</h2><p>Total Users</p></div>
            <div class="stat-card"><h2 id="totalEnrollments">0</h2><p>Enrollments</p></div>
        </div>

        <div class="section-card">
            <div class="section-header"><h3>Recent Users</h3></div>
            <div id="usersList">Loading...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function checkAdmin() {
            const token = localStorage.getItem('adminToken');
            if (!token) {
                window.location.href = '/admin-login.html';
                return false;
            }
            
            const { data: { user }, error } = await supabase.auth.getUser(token);
            if (error || !user) {
                localStorage.removeItem('adminToken');
                window.location.href = '/admin-login.html';
                return false;
            }
            
            const { data: profile } = await supabase
                .from('profiles')
                .select('role')
                .eq('id', user.id)
                .single();
            
            if (profile?.role !== 'admin') {
                window.location.href = '/admin-login.html';
                return false;
            }
            
            return true;
        }
        
        async function loadStats() {
            const { count: courses } = await supabase.from('courses').select('*', { count: 'exact', head: true });
            const { count: users } = await supabase.from('profiles').select('*', { count: 'exact', head: true });
            const { count: enrollments } = await supabase.from('enrollments').select('*', { count: 'exact', head: true });
            
            document.getElementById('totalCourses').textContent = courses || 0;
            document.getElementById('totalUsers').textContent = users || 0;
            document.getElementById('totalEnrollments').textContent = enrollments || 0;
        }
        
        async function loadRecentUsers() {
            const { data: users } = await supabase
                .from('profiles')
                .select('full_name, email, created_at, role')
                .order('created_at', { ascending: false })
                .limit(5);
            
            const usersList = document.getElementById('usersList');
            if (!users || users.length === 0) {
                usersList.innerHTML = '<p>No users found</p>';
                return;
            }
            
            usersList.innerHTML = `
                <table>
                    <thead><tr><th>Name</th><th>Email</th><th>Joined</th><th>Role</th></tr></thead>
                    <tbody>
                        ${users.map(user => `
                            <tr>
                                <td>${user.full_name || 'N/A'}</td>
                                <td>${user.email}</td>
                                <td>${new Date(user.created_at).toLocaleDateString()}</td>
                                <td><span class="badge badge-success">${user.role || 'learner'}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }
        
        async function logout() {
            await supabase.auth.signOut();
            localStorage.removeItem('adminToken');
            localStorage.removeItem('adminEmail');
            window.location.href = '/admin-login.html';
        }
        
        document.getElementById('logoutBtn').addEventListener('click', logout);
        
        async function init() {
            const isAdmin = await checkAdmin();
            if (isAdmin) {
                await loadStats();
                await loadRecentUsers();
            }
        }
        
        init();
    </script>
</body>
</html>

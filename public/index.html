<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | NTSA Approved Driver Training</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #041B3D;
            color: #fff;
        }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(4, 27, 61, 0.96);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 255, 136, 0.15);
        }
        .nav-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #00FF88;
            cursor: pointer;
        }
        .logo span { color: #fff; }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
        }
        .nav-links a:hover { color: #00FF88; }
        .nav-btn {
            background: transparent;
            border: 1px solid #00FF88;
            color: #00FF88;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(135deg, rgba(4,27,61,0.9), rgba(10,35,79,0.95));
        }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero h1 span { color: #00FF88; }
        .hero p { color: #B7C4D6; max-width: 600px; margin: 0 auto 2rem; }
        .btn-primary {
            background: #00FF88;
            color: #041B3D;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }
        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
        }
        .section-title span { color: #00FF88; }
        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .course-card {
            background: #0A234F;
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(0, 255, 136, 0.1);
            transition: all 0.3s;
        }
        .course-card:hover {
            transform: translateY(-5px);
            border-color: #00FF88;
        }
        .course-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .course-badge {
            display: inline-block;
            background: #00FF88;
            color: #041B3D;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .course-card h3 { margin: 0.5rem 0; }
        .course-card p { color: #B7C4D6; font-size: 0.85rem; margin-bottom: 0.5rem; }
        .course-price { font-weight: bold; font-size: 1.2rem; margin: 0.5rem 0; }
        .course-price.free { color: #00FF88; }
        .course-price.premium { color: #ff9800; }
        .btn-view {
            width: 100%;
            background: transparent;
            border: 1px solid #00FF88;
            color: #fff;
            padding: 8px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn-view:hover { background: #00FF88; color: #041B3D; }
        .loading { text-align: center; padding: 40px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,255,136,0.3);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .debug-box {
            background: #1a1a2e;
            border: 1px solid #ff4444;
            border-radius: 8px;
            padding: 15px;
            margin: 20px;
            font-family: monospace;
            font-size: 12px;
            display: none;
        }
        footer {
            background: #0A234F;
            text-align: center;
            padding: 2rem;
            color: #B7C4D6;
        }
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .courses-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="location.href='/'">MEI DRIVE <span>AFRICA</span></div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#courses">Courses</a>
            <button class="nav-btn" id="loginBtn">Login</button>
            <button class="nav-btn" id="registerBtn">Register</button>
        </div>
    </div>
</nav>

<section class="hero">
    <div>
        <h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1>
        <p>For Learners and Experienced Drivers — Refresh Your Skills with MEI DRIVE AFRICA. NTSA-approved courses.</p>
        <a href="#courses" class="btn-primary">Explore Courses</a>
    </div>
</section>

<div class="container" id="courses">
    <h2 class="section-title">Our <span>Courses</span></h2>
    <div id="coursesContainer" class="courses-grid">
        <div class="loading"><div class="spinner"></div><p>Loading courses...</p></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training</p>
</footer>

<!-- Debug panel (hidden by default, press Ctrl+Shift+D to show) -->
<div id="debugPanel" class="debug-box"></div>

<script>
    // Supabase Configuration
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // Login/Register buttons
    document.getElementById('loginBtn').onclick = () => window.location.href = '/login.html';
    document.getElementById('registerBtn').onclick = () => window.location.href = '/register.html';
    
    // Debug function
    function addDebugMessage(message) {
        console.log(message);
        const debugPanel = document.getElementById('debugPanel');
        debugPanel.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${message}</div>`;
        debugPanel.scrollTop = debugPanel.scrollHeight;
    }
    
    // Show debug panel with Ctrl+Shift+D
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.shiftKey && e.key === 'D') {
            const panel = document.getElementById('debugPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }
    });
    
    async function loadCourses() {
        const container = document.getElementById('coursesContainer');
        
        try {
            addDebugMessage('🔍 Fetching courses from Supabase...');
            addDebugMessage(`📡 URL: ${SUPABASE_URL}`);
            
            const { data, error, status } = await supabase
                .from('courses')
                .select('*')
                .order('id');
            
            addDebugMessage(`📊 Response Status: ${status}`);
            
            if (error) {
                addDebugMessage(`❌ Supabase Error: ${error.message}`);
                addDebugMessage(`🔧 Error Code: ${error.code}`);
                container.innerHTML = `
                    <div style="text-align:center; padding:40px; background:#0A234F; border-radius:20px; grid-column:1/-1;">
                        <i class="fas fa-exclamation-circle" style="font-size:3rem; color:#ff4444;"></i>
                        <h3 style="color:#ff4444;">Error Loading Courses</h3>
                        <p>${error.message}</p>
                        <button onclick="location.reload()" style="margin-top:10px; padding:8px 16px; background:#00FF88; border:none; border-radius:8px; cursor:pointer;">Retry</button>
                        <p style="margin-top:10px; font-size:12px;">Press Ctrl+Shift+D for debug info</p>
                    </div>
                `;
                return;
            }
            
            addDebugMessage(`✅ Success! Found ${data?.length || 0} courses`);
            
            if (!data || data.length === 0) {
                addDebugMessage('⚠️ No courses found in database');
                container.innerHTML = `
                    <div style="text-align:center; padding:40px; background:#0A234F; border-radius:20px; grid-column:1/-1;">
                        <i class="fas fa-book-open" style="font-size:3rem; color:#00FF88;"></i>
                        <h3>No Courses Available</h3>
                        <p>Check back soon for our latest courses!</p>
                        <p style="margin-top:10px; font-size:12px;">Press Ctrl+Shift+D for debug info</p>
                    </div>
                `;
                return;
            }
            
            // Display courses
            container.innerHTML = '';
            const icons = ['🚗', '🚌', '⚡', '🛵', '📚', '📝', '🛡️', '🔄'];
            
            data.forEach((course, index) => {
                const isFree = course.type === 'free' || course.price === 0;
                const icon = course.icon || icons[index % icons.length];
                
                const card = document.createElement('div');
                card.className = 'course-card';
                card.innerHTML = `
                    <div class="course-icon">${icon}</div>
                    ${!isFree ? '<div class="course-badge">PREMIUM</div>' : '<div class="course-badge">FREE</div>'}
                    <h3>${escapeHtml(course.name)}</h3>
                    <p>${escapeHtml(course.description?.substring(0, 100) || 'Professional driver training course')}</p>
                    <div class="course-price ${isFree ? 'free' : 'premium'}">${isFree ? 'FREE' : `KES ${course.price?.toLocaleString()}`}</div>
                    <button class="btn-view" onclick="location.href='/login.html'">View Course →</button>
                `;
                container.appendChild(card);
                addDebugMessage(`📚 Displayed course: ${course.name} - ${isFree ? 'FREE' : `KES ${course.price}`}`);
            });
            
        } catch (err) {
            addDebugMessage(`❌ Fatal Error: ${err.message}`);
            container.innerHTML = `
                <div style="text-align:center; padding:40px; background:#0A234F; border-radius:20px; grid-column:1/-1;">
                    <i class="fas fa-exclamation-circle" style="font-size:3rem; color:#ff4444;"></i>
                    <h3>Connection Error</h3>
                    <p>Unable to connect to the server. Please check your internet connection.</p>
                    <button onclick="location.reload()" style="margin-top:10px; padding:8px 16px; background:#00FF88; border:none; border-radius:8px; cursor:pointer;">Retry</button>
                    <p style="margin-top:10px; font-size:12px;">Press Ctrl+Shift+D for debug info</p>
                </div>
            `;
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    // Test connection on load
    async function testConnection() {
        try {
            addDebugMessage('🔌 Testing Supabase connection...');
            const { data, error } = await supabase.from('courses').select('count', { count: 'exact', head: true });
            if (error) {
                addDebugMessage(`❌ Connection test failed: ${error.message}`);
            } else {
                addDebugMessage(`✅ Connection test successful!`);
            }
        } catch (err) {
            addDebugMessage(`❌ Connection test error: ${err.message}`);
        }
    }
    
    // Load courses when page loads
    testConnection();
    loadCourses();
</script>
</body>
</html>

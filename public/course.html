<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MEI DRIVE AFRICA - Course Player</title>
    <!-- Import the global API client -->
    <script src="supabase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: #0A192F;
            color: #e2f0ff;
            line-height: 1.5;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0D2137;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #00FF88;
            border-radius: 10px;
        }

        .navbar {
            background: rgba(10, 25, 47, 0.96);
            backdrop-filter: blur(14px);
            padding: 14px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 18px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.25);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00FF88, #00cc6a);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            color: #0A192F;
        }

        .logo span {
            color: #00FF88;
        }

        .back-btn {
            background: rgba(0, 255, 136, 0.12);
            color: #00FF88;
            border: 1px solid #00FF88;
            padding: 8px 26px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s ease;
            text-decoration: none;
            font-size: 14px;
        }

        .back-btn:hover {
            background: #00FF88;
            color: #0A192F;
            border-color: #00FF88;
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-login, .btn-register {
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-login {
            background: transparent;
            border: 1.5px solid #00FF88;
            color: #00FF88;
        }

        .btn-login:hover {
            background: rgba(0, 255, 136, 0.15);
            transform: translateY(-2px);
        }

        .btn-register {
            background: #00FF88;
            color: #0A192F;
        }

        .btn-register:hover {
            background: #00e07a;
            transform: translateY(-2px);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-email {
            color: #b6ffe0;
            font-size: 13px;
            background: rgba(0, 255, 136, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
        }

        .btn-logout {
            background: rgba(255, 82, 82, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.5);
            color: #ffa6a6;
            padding: 6px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-logout:hover {
            background: rgba(255, 82, 82, 0.4);
        }

        .container {
            max-width: 1400px;
            margin: 100px auto 60px;
            padding: 0 24px;
        }

        .course-header {
            background: rgba(13, 33, 55, 0.85);
            border-radius: 28px;
            padding: 28px 32px;
            margin-bottom: 32px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            backdrop-filter: blur(4px);
        }

        .course-title {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 14px;
        }

        .course-title span {
            color: #00FF88;
        }

        .course-description {
            opacity: 0.8;
            font-size: 1rem;
        }

        .course-meta {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .meta-badge {
            background: rgba(0, 255, 136, 0.12);
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #7effc7;
        }

        .progress-container {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 40px;
            height: 8px;
            margin: 28px 0 10px;
        }

        .progress-bar {
            background: #00FF88;
            height: 8px;
            border-radius: 40px;
            width: 0%;
            transition: width 0.35s ease;
        }

        .progress-text {
            font-size: 13px;
            opacity: 0.7;
            text-align: right;
        }

        .main-content {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 30px;
        }

        .units-sidebar {
            background: rgba(13, 33, 55, 0.7);
            border-radius: 28px;
            padding: 22px 18px;
            height: fit-content;
            position: sticky;
            top: 110px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            backdrop-filter: blur(4px);
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .units-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .unit-item {
            background: rgba(10, 25, 47, 0.7);
            border-radius: 18px;
            padding: 14px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .unit-item:hover {
            background: rgba(0, 255, 136, 0.12);
            transform: translateX(4px);
        }

        .unit-item.active {
            background: rgba(0, 255, 136, 0.18);
            border-left-color: #00FF88;
            box-shadow: 0 2px 8px rgba(0,255,136,0.1);
        }

        .unit-number {
            font-size: 11px;
            color: #00FF88;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .unit-title-sidebar {
            font-size: 14px;
            margin-top: 5px;
            font-weight: 500;
        }

        .unit-time {
            font-size: 10px;
            opacity: 0.55;
            margin-top: 6px;
        }

        .unit-content-area {
            background: rgba(13, 33, 55, 0.8);
            border-radius: 28px;
            padding: 36px 38px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .unit-content-title {
            font-size: 30px;
            margin-bottom: 12px;
            color: #00FF88;
            font-weight: 700;
        }

        .unit-content-meta {
            display: flex;
            gap: 24px;
            margin-bottom: 28px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .unit-content-meta span {
            font-size: 13px;
            opacity: 0.7;
        }

        .unit-content-text {
            line-height: 1.75;
            font-size: 1rem;
            color: #eef5ff;
        }

        .unit-content-text p {
            margin-bottom: 1.2rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 48px;
            padding-top: 28px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            gap: 20px;
        }

        .nav-btn {
            background: #00FF88;
            color: #0A192F;
            border: none;
            padding: 12px 36px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
        }

        .nav-btn:hover:not(:disabled) {
            background: #1eff99;
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(0,255,136,0.3);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            padding: 80px 20px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(0, 255, 136, 0.2);
            border-top: 4px solid #00FF88;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            background: rgba(13, 33, 55, 0.7);
            border-radius: 32px;
        }

        .empty-state-icon {
            font-size: 68px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            margin-bottom: 12px;
            font-size: 26px;
        }

        .btn-primary {
            background: #00FF88;
            color: #0A192F;
            border: none;
            padding: 12px 32px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #0e253f;
            padding: 40px 32px;
            border-radius: 32px;
            width: 90%;
            max-width: 440px;
            border: 1px solid rgba(0, 255, 136, 0.5);
            box-shadow: 0 25px 40px rgba(0,0,0,0.5);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #00FF88;
        }

        .modal-content input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 18px;
            background: #0a1a2c;
            border: 1px solid rgba(0, 255, 136, 0.4);
            border-radius: 20px;
            color: white;
            font-size: 15px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #00FF88;
        }

        .modal-content button {
            width: 100%;
            padding: 14px;
            background: #00FF88;
            color: #0A192F;
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .modal-switch {
            text-align: center;
            color: #bfd9ff;
            cursor: pointer;
            font-size: 14px;
        }

        .modal-switch span {
            color: #00FF88;
            font-weight: 600;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 28px;
            font-size: 32px;
            cursor: pointer;
            color: #b0c4de;
        }

        .error-msg {
            color: #ff8080;
            text-align: center;
            margin-bottom: 12px;
            font-size: 13px;
        }

        .success-msg {
            color: #7affb3;
            text-align: center;
            margin-bottom: 12px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0b2e1f;
            color: #bcffdb;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            z-index: 3000;
            display: none;
            backdrop-filter: blur(10px);
            border: 1px solid #00FF88;
            font-size: 14px;
            white-space: nowrap;
        }

        @media (max-width: 820px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .units-sidebar {
                position: relative;
                top: 0;
            }
            .container {
                margin-top: 140px;
            }
            .course-title {
                font-size: 26px;
            }
            .unit-content-area {
                padding: 24px;
            }
            .navbar {
                flex-direction: column;
                text-align: center;
            }
            .nav-buttons {
                flex-wrap: wrap;
            }
            .nav-btn {
                flex: 1;
                text-align: center;
            }
            .toast {
                white-space: normal;
                text-align: center;
                max-width: 85vw;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'">
            <div class="logo-icon">M</div>
            MEI DRIVE <span>AFRICA</span>
        </div>
        <div id="authContainer" class="auth-buttons"></div>
        <a href="index.html" class="back-btn">← Back to Courses</a>
    </nav>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <div id="modalError" class="error-msg"></div>
            <div id="modalSuccess" class="success-msg"></div>
            <input type="email" id="modalEmail" placeholder="Email address" autocomplete="email">
            <input type="password" id="modalPassword" placeholder="Password (min 6 chars)" autocomplete="current-password">
            <button id="modalSubmitBtn">Login</button>
            <div class="modal-switch" id="modalSwitch">Don't have an account? <span>Register</span></div>
        </div>
    </div>

    <div class="container" id="container">
        <div class="loading"><div class="spinner"></div>Loading immersive course...</div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Use the global API client from supabase.js
        const API = window.MEI_DRIVE_API;
        
        // App state
        const STATE = {
            user: null,
            authModalOpen: false,
            authMode: 'login',
            authError: '',
            authSuccess: '',
            course: null,
            units: [],
            currentUnitIndex: 0,
            loading: true,
            error: null,
            enrollment: null,
            enrollments: []
        };

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            toast.style.background = isError ? '#791a1a' : '#0a3826';
            toast.style.color = isError ? '#ffbcbc' : '#beffd6';
            setTimeout(() => { toast.style.display = 'none'; }, 4200);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function formatLessonContent(content) {
            if (!content) return '<p>📘 Content is being curated by expert instructors. Stay tuned!</p>';
            let sections = content.split(/\n\n+/);
            return sections.map(para => `<p>${escapeHtml(para)}</p>`).join('');
        }

        async function refreshUser() {
            const user = await API.getCurrentUser();
            STATE.user = user;
            if (STATE.user) {
                await loadUserEnrollments();
            }
            renderUI();
        }

        async function loadUserEnrollments() {
            if (!STATE.user) return;
            try {
                const enrollments = await API.getMyEnrollments();
                STATE.enrollments = enrollments;
                if (STATE.course) {
                    STATE.enrollment = enrollments.find(e => e.course_id === STATE.course.id) || null;
                }
            } catch (err) {
                console.warn('Failed to load enrollments', err);
            }
        }

        function renderUI() {
            const authContainer = document.getElementById('authContainer');
            if (STATE.user) {
                authContainer.innerHTML = `<div class="user-info"><span class="user-email">${escapeHtml(STATE.user.email)}</span><button class="btn-logout" onclick="window.actions.logout()">Logout</button></div>`;
            } else {
                authContainer.innerHTML = `<button class="btn-login" onclick="window.actions.openModal('login')">Login</button><button class="btn-register" onclick="window.actions.openModal('register')">Register</button>`;
            }
            
            const modalDiv = document.getElementById('authModal');
            if (STATE.authModalOpen) {
                modalDiv.classList.add('active');
                document.getElementById('modalTitle').innerText = STATE.authMode === 'login' ? 'Welcome Back' : 'Create Account';
                document.getElementById('modalSubmitBtn').innerText = STATE.authMode === 'login' ? 'Login' : 'Register';
                document.getElementById('modalSwitch').innerHTML = STATE.authMode === 'login' ? 'New here? <span>Register</span>' : 'Already have an account? <span>Login</span>';
                document.getElementById('modalError').innerText = STATE.authError || '';
                document.getElementById('modalSuccess').innerText = STATE.authSuccess || '';
            } else {
                modalDiv.classList.remove('active');
            }
            
            const container = document.getElementById('container');
            if (STATE.loading) {
                container.innerHTML = '<div class="loading"><div class="spinner"></div>Preparing your drive lessons...</div>';
                return;
            }
            
            if (STATE.error) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>Error</h3><p>${escapeHtml(STATE.error)}</p><a href="index.html" style="color:#00FF88; margin-top:20px; display:inline-block;">⬅ Return to courses</a></div>`;
                return;
            }
            
            if (!STATE.course) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📚</div><h3>Course Not Found</h3><p>Please select a valid course from the homepage.</p><a href="index.html" style="color:#00FF88;">← Back to Courses</a></div>`;
                return;
            }
            
            const isPremium = STATE.course.type !== 'free' && STATE.course.price > 0;
            const isEnrolled = STATE.enrollment !== null;
            
            if (isPremium && !isEnrolled && STATE.user) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💎</div>
                        <h3>Premium Course: ${escapeHtml(STATE.course.title)}</h3>
                        <p>Unlock full driving knowledge, video scenarios & certification.</p>
                        <p style="font-size: 28px; font-weight: bold; color: #00FF88; margin: 20px 0;">KES ${(STATE.course.price || 3999).toLocaleString()}</p>
                        <button class="btn-primary" onclick="window.actions.purchaseCourse()">💳 Purchase & Enroll</button>
                        <div style="margin-top: 28px;"><a href="index.html" style="color:#7effc7;">← Browse catalog</a></div>
                    </div>
                `;
                return;
            }
            
            if (isPremium && !STATE.user) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔐</div>
                        <h3>Sign in to access premium course</h3>
                        <p>Login or register to purchase and start your professional driving program.</p>
                        <button class="btn-primary" onclick="window.actions.openModal('login')">Login to Continue</button>
                        <div style="margin-top: 20px;"><a href="index.html" style="color:#00FF88;">← Back</a></div>
                    </div>
                `;
                return;
            }
            
            if (!STATE.units.length) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📖</div><h3>Units loading soon</h3><p>Instructors are updating content. Please check later.</p><a href="index.html" style="color:#00FF88;">Back to courses</a></div>`;
                return;
            }
            
            if (STATE.currentUnitIndex >= STATE.units.length) STATE.currentUnitIndex = 0;
            const currentUnit = STATE.units[STATE.currentUnitIndex];
            if (!currentUnit) {
                container.innerHTML = `<div class="empty-state"><h3>Unit error</h3><p>Please refresh</p></div>`;
                return;
            }
            
            const progressPercent = ((STATE.currentUnitIndex + 1) / STATE.units.length) * 100;
            
            container.innerHTML = `
                <div class="course-header">
                    <h1 class="course-title"><span>${escapeHtml(STATE.course.title)}</span></h1>
                    <p class="course-description">${escapeHtml(STATE.course.description || 'Master defensive driving, highway rules, and vehicle handling.')}</p>
                    <div class="course-meta">
                        <span class="meta-badge">⏱️ ${escapeHtml(STATE.course.duration || 'Self-paced')}</span>
                        <span class="meta-badge">📘 ${STATE.units.length} practical units</span>
                        ${STATE.enrollment ? '<span class="meta-badge" style="background:#00FF8822; color:#b3ffcf;">✅ Enrolled & Access</span>' : '<span class="meta-badge">📋 Free Access</span>'}
                    </div>
                    <div class="progress-container"><div class="progress-bar" style="width: ${progressPercent}%"></div></div>
                    <div class="progress-text">Progress: Unit ${STATE.currentUnitIndex+1} of ${STATE.units.length} • ${Math.round(progressPercent)}% completed</div>
                </div>
                <div class="main-content">
                    <div class="units-sidebar">
                        <div class="sidebar-title">🎯 Course curriculum</div>
                        <div class="units-list">
                            ${STATE.units.map((unit, idx) => `
                                <div class="unit-item ${idx === STATE.currentUnitIndex ? 'active' : ''}" onclick="window.actions.jumpToUnit(${idx})">
                                    <div class="unit-number">UNIT ${unit.unit_number || (idx+1)}</div>
                                    <div class="unit-title-sidebar">${escapeHtml(unit.title || 'Unit')}</div>
                                    <div class="unit-time">⌛ ${unit.estimated_minutes || 12} min</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="unit-content-area">
                        <h2 class="unit-content-title">${escapeHtml(currentUnit.title || 'Lesson')}</h2>
                        <div class="unit-content-meta">
                            <span>⏱️ Est. ${currentUnit.estimated_minutes || 15} minutes</span>
                            <span>📌 ${currentUnit.unit_number || STATE.currentUnitIndex+1} / ${STATE.units.length}</span>
                        </div>
                        <div class="unit-content-text">
                            ${formatLessonContent(currentUnit.content)}
                        </div>
                        <div class="nav-buttons">
                            <button class="nav-btn" onclick="window.actions.prevUnit()" ${STATE.currentUnitIndex === 0 ? 'disabled' : ''}>← Previous module</button>
                            <button class="nav-btn" onclick="window.actions.nextUnit()" ${STATE.currentUnitIndex === STATE.units.length-1 ? 'disabled' : ''}>Next module →</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        const actions = {
            async login(email, password) {
                STATE.authError = ''; STATE.authSuccess = ''; renderUI();
                try {
                    const result = await API.login(email, password);
                    STATE.user = result.user;
                    STATE.authSuccess = 'Login successful!';
                    STATE.authModalOpen = false;
                    await loadUserEnrollments();
                    showToast(`Welcome back, ${STATE.user.email.split('@')[0]}!`);
                    renderUI();
                    await loadCourseData();
                } catch (err) {
                    STATE.authError = err.message || 'Login failed';
                    renderUI();
                }
            },
            async register(email, password) {
                STATE.authError = ''; STATE.authSuccess = ''; renderUI();
                try {
                    await API.register(email, password, '', '');
                    STATE.authSuccess = 'Account created! Please login.';
                    setTimeout(() => { 
                        STATE.authMode = 'login'; 
                        STATE.authSuccess = ''; 
                        renderUI(); 
                    }, 1800);
                } catch (err) {
                    STATE.authError = err.message || 'Registration failed';
                }
                renderUI();
            },
            async logout() {
                await API.logout();
                STATE.user = null;
                STATE.enrollment = null;
                STATE.enrollments = [];
                showToast('Logged out successfully');
                window.location.href = 'index.html';
            },
            openModal(mode) {
                STATE.authMode = mode;
                STATE.authModalOpen = true;
                STATE.authError = '';
                STATE.authSuccess = '';
                renderUI();
            },
            closeModal() { STATE.authModalOpen = false; renderUI(); },
            async handleAuthSubmit() {
                const email = document.getElementById('modalEmail').value.trim();
                const pwd = document.getElementById('modalPassword').value;
                if (!email || !pwd) { STATE.authError = 'Email and password required'; renderUI(); return; }
                if (pwd.length < 6 && STATE.authMode === 'register') { STATE.authError = 'Password min 6 characters'; renderUI(); return; }
                if (STATE.authMode === 'login') await actions.login(email, pwd);
                else await actions.register(email, pwd);
            },
            jumpToUnit(idx) { 
                if (idx >= 0 && idx < STATE.units.length) { 
                    STATE.currentUnitIndex = idx; 
                    renderUI(); 
                    window.scrollTo({ top: 140, behavior: 'smooth' }); 
                } 
            },
            prevUnit() { if (STATE.currentUnitIndex > 0) actions.jumpToUnit(STATE.currentUnitIndex - 1); },
            nextUnit() { 
                if (STATE.currentUnitIndex < STATE.units.length - 1) {
                    actions.jumpToUnit(STATE.currentUnitIndex + 1);
                } else {
                    showToast('🏆 Excellent! You completed the entire course. Certificate will be issued soon!');
                }
            },
            async purchaseCourse() {
                if (!STATE.user) { showToast('Sign in first', true); actions.openModal('login'); return; }
                if (!STATE.course) return;
                const amount = STATE.course.price || 3999;
                let phone = prompt(`M-Pesa payment: KES ${amount}\nEnter phone number (e.g., 0712345678):`);
                if (!phone) { showToast('Payment cancelled', true); return; }
                let cleanPhone = phone.replace(/\D/g, '');
                if (cleanPhone.startsWith('0')) cleanPhone = '254' + cleanPhone.slice(1);
                if (!cleanPhone.startsWith('254') || cleanPhone.length < 12) { showToast('Invalid phone format', true); return; }
                showToast('⏳ Initiating payment request...');
                try {
                    const result = await API.initiateMpesaPayment(cleanPhone, amount, STATE.course.id);
                    if (result.success || result.checkoutRequestID) {
                        showToast('📲 M-Pesa prompt sent! Enter PIN to complete purchase.');
                        let attempts = 0;
                        const checkInterval = setInterval(async () => {
                            attempts++;
                            await loadUserEnrollments();
                            if (STATE.enrollment) {
                                clearInterval(checkInterval);
                                showToast('✅ Payment confirmed! Course unlocked instantly.');
                                renderUI();
                            } else if (attempts > 20) { 
                                clearInterval(checkInterval); 
                                showToast('Timeout: Please contact support or use Paybill 4095377', true); 
                            }
                        }, 3000);
                        setTimeout(() => clearInterval(checkInterval), 62000);
                    } else {
                        throw new Error(result.error || 'Payment initiation failed');
                    }
                } catch (err) {
                    showToast('Payment gateway error. Try again later.', true);
                }
            },
            async checkAndUpdateEnrollment() {
                await loadUserEnrollments();
                renderUI();
            }
        };
        
        async function loadCourseData() {
            STATE.loading = true; renderUI();
            try {
                const urlParams = new URLSearchParams(window.location.search);
                let courseId = urlParams.get('id');
                const storedTitle = sessionStorage.getItem('selectedCourse');
                
                if (!courseId && storedTitle) {
                    const allCourses = await API.getAllCourses();
                    const matched = allCourses.find(c => c.title === storedTitle);
                    if (matched) courseId = matched.id;
                    else throw new Error('Course not found');
                }
                if (!courseId) throw new Error('No course selected');
                
                const course = await API.getCourseById(parseInt(courseId));
                if (!course) throw new Error('Course does not exist');
                STATE.course = course;
                
                // Fetch lessons/units - using the same endpoint pattern
                try {
                    const lessonsResult = await API.request(`/api/courses/${course.id}/lessons`);
                    STATE.units = lessonsResult.lessons || [];
                } catch (err) {
                    STATE.units = [];
                }
                
                if (STATE.units.length === 0) {
                    STATE.units = [{ 
                        title: 'Introduction to Defensive Driving', 
                        content: 'Welcome! This course will transform your driving skills. Learn essential road safety, vehicle controls, and professional driving techniques.', 
                        unit_number: 1, 
                        estimated_minutes: 15 
                    }];
                }
                
                STATE.currentUnitIndex = 0;
                if (STATE.user) await loadUserEnrollments();
                STATE.loading = false;
                renderUI();
            } catch (err) {
                STATE.error = err.message || 'Failed to load course.';
                STATE.loading = false;
                renderUI();
            }
        }
        
        window.actions = actions;
        
        document.getElementById('modalSubmitBtn').onclick = () => actions.handleAuthSubmit();
        document.getElementById('modalSwitch').onclick = () => { STATE.authMode = STATE.authMode === 'login' ? 'register' : 'login'; renderUI(); };
        document.querySelector('.close-modal').onclick = () => actions.closeModal();
        window.onclick = (e) => { if (e.target === document.getElementById('authModal')) actions.closeModal(); };
        
        async function bootstrap() {
            if (API && typeof API.getCurrentUser === 'function') {
                await refreshUser();
                await loadCourseData();
            } else {
                console.warn('API not ready, retrying...');
                setTimeout(bootstrap, 200);
            }
        }
        
        bootstrap();
    </script>
</body>
</html>

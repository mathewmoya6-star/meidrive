    // Format phone number for M-Pesa API (254XXXXXXXXX)
    function formatPhoneForMpesa(phone) {
        let cleaned = phone.replace(/\D/g, '');
        if (cleaned.startsWith('0')) {
            cleaned = '254' + cleaned.substring(1);
        } else if (cleaned.startsWith('+254')) {
            cleaned = cleaned.substring(1);
        } else if (!cleaned.startsWith('254') && cleaned.length === 9) {
            cleaned = '254' + cleaned;
        }
        return cleaned;
    }

        const formatted = formatPhoneForMpesa(phone);
        return formatted.length === 12 && formatted.startsWith('254');
    }
    
    // Get OAuth token from M-Pesa API
    async function getMpesaToken() {
        try {
            const auth = btoa(`${MPESA_CONFIG.consumerKey}:${MPESA_CONFIG.consumerSecret}`);
            const response = await fetch(`${MPESA_CONFIG.apiBaseUrl}/oauth/v1/generate?grant_type=client_credentials`, {
                method: 'GET',
                headers: {
                    'Authorization': `Basic ${auth}`
                }
            });
            
            if (!response.ok) {
                throw new Error('Failed to get token');
            }
            
            const data = await response.json();
            return data.access_token;
        } catch (error) {
            console.error('M-Pesa token error:', error);
            return null;
        }

    // Convert markdown-style content to HTML
    function formatContent(content) {
        if (!content) return '<p>Content coming soon...</p>';
        
        let html = content;
        
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/^- (.*$)/gm, '<li>$1</li>');
        html = html.replace(/<li>.*?<\/li>/gs, match => `<ul>${match}</ul>`);
        html = html.replace(/^(?!<[hl]|<ul|<li)(.*$)/gm, '<p>$1</p>');
        html = html.replace(/<p>\s*<\/p>/g, '');
        
        return html;
    }

                { id: 1, question_text: "What does a solid white line on the road mean?", option_a: "You may overtake if safe", option_b: "No overtaking allowed", option_c: "Parking allowed", option_d: "Slow down only", correct_option: "b", explanation: "A solid white line indicates that overtaking is prohibited." },
                { id: 2, question_text: "What is the legal blood alcohol limit for professional drivers in Kenya?", option_a: "0.00%", option_b: "0.05%", option_c: "0.08%", option_d: "0.10%", correct_option: "a", explanation: "Professional drivers must have zero alcohol in their system." },
                { id: 3, question_text: "When approaching a yellow traffic light, you should:", option_a: "Speed up to beat the light", option_b: "Stop if safe to do so", option_c: "Honk and proceed", option_d: "Ignore it", correct_option: "b", explanation: "Yellow means prepare to stop, not speed up." },
                { id: 4, question_text: "What does this sign mean? (Stop sign)", option_a: "Yield to pedestrians", option_b: "Come to a complete stop", option_c: "Slow down only", option_d: "No entry", correct_option: "b", explanation: "A stop sign requires a complete stop." }
            ];
        }
    }
    
    async function loadUserProgress() {
        if (!currentUser) return;
        const { data, error } = await supabase.from('user_progress').select('lesson_id, progress_percentage').eq('user_id', currentUser.id);
        if (!error && data) {
            userProgress = {};
            data.forEach(p => { userProgress[p.lesson_id] = p.progress_percentage; });
        }
        
        // Load enrollments
        const { data: enrollData } = await supabase.from('user_enrollments').select('course_id').eq('user_id', currentUser.id);
        if (enrollData) {
            userEnrollments = {};
            enrollData.forEach(e => { userEnrollments[e.course_id] = true; });
        }
    }
    
    async function updateProgress(lessonId, progress) {
        if (!currentUser) { showToast('Please login to track progress', 'warning'); return false; }
        const { error } = await supabase.from('user_progress').upsert({
            user_id: currentUser.id,
            lesson_id: lessonId,
            progress_percentage: progress,
            last_accessed_at: new Date()
        });
        if (!error) {
            userProgress[lessonId] = progress;
            showToast(progress === 100 ? '🎉 Lesson completed!' : 'Progress saved', 'success');
            return true;
        }
        return false;
    }
    
    async function init() {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: { session } } = await supabase.auth.getSession();
        currentUser = session?.user || null;
        updateAuthUI();
        await Promise.all([loadCourses(), loadLessons(), loadQuestions()]);
        await loadUserProgress();
        renderPage();
    }
    
    function updateAuthUI() {
        const container = document.getElementById('authButtons');
        if (!container) return;
        if (currentUser) {
            container.innerHTML = `<div class="user-badge"><i class="fas fa-user"></i> ${currentUser.email.split('@')[0]}</div><button onclick="logout()" style="margin-left:8px;">Logout</button>`;
        } else {
            container.innerHTML = `<button onclick="showLoginModal()">Login</button><button onclick="showSignupModal()">Sign Up</button>`;
        }
    }
    
    async function logout() { await supabase.auth.signOut(); currentUser = null; updateAuthUI(); renderPage(); showToast('Logged out', 'info'); }
    
    function showLoginModal() {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="max-width:450px; margin:100px auto;">
                <div class="card"><h2>🔐 Login</h2>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button class="btn btn-primary" style="width:100%" onclick="performLogin()">Login</button>
                <p style="margin-top:1rem;">No account? <span style="color:var(--primary);cursor:pointer;" onclick="showSignupModal()">Sign up</span></p>
                <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="renderPage()">Cancel</button></div></div>`;
    }
    
    function showSignupModal() {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="max-width:450px; margin:100px auto;">
                <div class="card"><h2>📝 Sign Up</h2>
                <input type="text" id="signupName" placeholder="Full Name">
                <input type="email" id="signupEmail" placeholder="Email">
                <input type="password" id="signupPassword" placeholder="Password (min 6)">
                <button class="btn btn-primary" style="width:100%" onclick="performSignup()">Create Account</button>
                <p style="margin-top:1rem;">Have an account? <span style="color:var(--primary);cursor:pointer;" onclick="showLoginModal()">Login</span></p>
                <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="renderPage()">Cancel</button></div></div>`;
    }
    
    async function performLogin() {
        const email = document.getElementById('loginEmail')?.value;
        const password = document.getElementById('loginPassword')?.value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) showToast(error.message, 'error');
        else { showToast('Logged in!', 'success'); await init(); }
    }
    
    async function performSignup() {
        const email = document.getElementById('signupEmail')?.value;
        const password = document.getElementById('signupPassword')?.value;
        const fullName = document.getElementById('signupName')?.value;
        const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
        if (error) showToast(error.message, 'error');
        else { showToast('Account created! Please verify email.', 'success'); renderPage(); }
    }
    
    // ==================== PAGE RENDERING ====================
    function renderHome() {
        document.getElementById('page-content').innerHTML = `
            <div class="hero"><h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1>
            <p>NTSA-approved courses for Learner, EV, Boda Boda, PSV, and more.</p>
            <button class="btn btn-primary" onclick="navigateTo('courses')">🚀 Explore Courses</button></div>
            <div class="stats-bar"><div class="stat-item"><h3>${courses.length}</h3><p>Courses</p></div><div class="stat-item"><h3>${lessons.length}</h3><p>Lessons</p></div><div class="stat-item"><h3>${questions.length}</h3><p>Questions</p></div></div>
            <div class="container"><h2 class="section-title">Our <span>Courses</span></h2><div class="grid" id="homeGrid"></div></div>`;
        
        const grid = document.getElementById('homeGrid');
        if (grid && courses.length) {
            grid.innerHTML = courses.slice(0, 3).map(c => renderCourseCard(c)).join('');
        }
    }
    
    function renderCourseCard(c) {
        const isEnrolled = userEnrollments[c.id];
        return `<div class="card" onclick="viewCourse(${c.id})"><i class="fas ${c.icon || 'fa-book'}" style="font-size:2rem; color:var(--primary);"></i><h3>${escapeHtml(c.name)}</h3><p>${escapeHtml(c.description || '')}</p><div class="course-price">${c.price === 0 ? 'FREE' : `KES ${c.price.toLocaleString()}`}</div>${isEnrolled ? '<span style="color:var(--primary);"><i class="fas fa-check-circle"></i> Enrolled</span>' : ''}<button class="btn btn-primary">${isEnrolled ? 'Continue' : 'Enroll Now'}</button></div>`;
    }
    
    function renderCourses() {
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><h1 class="section-title">All <span>Courses</span></h1><div class="grid" id="coursesGrid"></div></div>`;
        const grid = document.getElementById('coursesGrid');
        if (grid && courses.length) {
            grid.innerHTML = courses.map(c => renderCourseCard(c)).join('');
        }
    }
    
    function viewCourse(courseId) {
        const course = courses.find(c => c.id === courseId);
        const isEnrolled = userEnrollments[courseId] || course.price === 0;
        
        if (!isEnrolled && course.price > 0) {
            // Show payment required
            document.getElementById('page-content').innerHTML = `
                <div class="container" style="padding-top:100px; max-width:600px;">
                    <div class="card" style="text-align:center;">
                        <i class="fas fa-lock" style="font-size:3rem; color:var(--primary); margin-bottom:1rem;"></i>
                        <h2>${escapeHtml(course.name)}</h2>
                        <p>${escapeHtml(course.description || '')}</p>
                        <div class="course-price" style="font-size:2rem;">KES ${course.price.toLocaleString()}</div>
                        <button class="btn btn-primary" onclick="openPaymentModal(${JSON.stringify(course).replace(/"/g, '&quot;')})">
                            <i class="fas fa-comment-dollar"></i> Pay with M-Pesa
                        </button>
                        <button class="btn btn-outline" style="margin-top:1rem;" onclick="navigateTo('courses')">← Back to Courses</button>
                    </div>
                </div>`;
            return;
        }
        
        const courseLessons = lessons.filter(l => l.course_id === courseId).sort((a,b) => a.order - b.order);
        const completedCount = courseLessons.filter(l => userProgress[l.id] === 100).length;
        const progressPercent = courseLessons.length ? Math.round((completedCount / courseLessons.length) * 100) : 0;
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top:100px;">
                <div style="background:linear-gradient(135deg,rgba(0,255,136,0.1),#0d2137); border-radius:20px; padding:2rem; margin-bottom:2rem;">
                    <h1>${escapeHtml(course.name)}</h1>
                    <p>${escapeHtml(course.description || '')}</p>
                    ${progressPercent > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width:${progressPercent}%"></div><p style="margin-top:5px;">${progressPercent}% Complete</p></div>` : ''}
                </div>
                <div class="card"><h3>📖 Course Modules (${courseLessons.length} lessons)</h3>
                ${courseLessons.length ? `<div class="grid">${courseLessons.map((l, idx) => `<div class="card" onclick="startLesson(${courseId}, ${l.id}, ${idx})"><h4>${idx+1}. ${escapeHtml(l.title)}</h4>${userProgress[l.id] === 100 ? '<span style="color:#00ff88; font-size:0.8rem;">✓ Completed</span>' : ''}<div class="progress-bar"><div class="progress-fill" style="width:${userProgress[l.id] || 0}%"></div></div><button class="btn btn-outline btn-sm">${userProgress[l.id] === 100 ? 'Review' : 'Start'}</button></div>`).join('')}</div>` : '<p>No lessons available yet. Content coming soon.</p>'}
                <button class="btn btn-outline" style="margin-top:1rem;" onclick="navigateTo('courses')">← Back to Courses</button></div>
            </div>`;
    }
    
    function startLesson(courseId, lessonId, lessonIndex) {
        const isEnrolled = userEnrollments[courseId] || courses.find(c => c.id === courseId)?.price === 0;
        if (!isEnrolled) {
            showToast('Please enroll in this course first', 'warning');
            viewCourse(courseId);
            return;
        }
        currentCourseId = courseId;
        currentLessonIndex = lessonIndex;
        currentCourseLessons = lessons.filter(l => l.course_id === courseId).sort((a,b) => a.order - b.order);
        renderLessonPage();
    }
    
    function renderLessonPage() {
        const lesson = currentCourseLessons[currentLessonIndex];
        if (!lesson) return;
        
        const progress = userProgress[lesson.id] || 0;
        const totalLessons = currentCourseLessons.length;
        const isLast = currentLessonIndex === totalLessons - 1;
        const isFirst = currentLessonIndex === 0;
        
        const formattedContent = formatContent(lesson.content || 'Content coming soon...');
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top:100px; max-width:900px;">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:1rem;">
                        <h2>${escapeHtml(lesson.title)}</h2>
                        <span style="background:var(--primary); color:#0a192f; padding:4px 12px; border-radius:50px;">Lesson ${currentLessonIndex+1} of ${totalLessons}</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                    <div class="lesson-content">${formattedContent}</div>
                    <div class="lesson-nav">
                        <button class="btn btn-outline" onclick="previousLesson()" ${isFirst ? 'disabled' : ''}>◀ Previous</button>
                        <button class="btn btn-primary" onclick="markAndContinue()">✓ Mark Complete & Continue</button>
                        <button class="btn btn-outline" onclick="nextLesson()" ${isLast ? 'disabled' : ''}>Next ▶</button>
                    </div>
                    <button class="btn btn-outline" style="margin-top:1rem;" onclick="viewCourse(${currentCourseId})">← Back to Course</button>
                </div>
            </div>`;
    }
    
    async function markAndContinue() {
        const lesson = currentCourseLessons[currentLessonIndex];
        if (!lesson) return;
        
        await updateProgress(lesson.id, 100);
        
        if (currentLessonIndex < currentCourseLessons.length - 1) {
            currentLessonIndex++;
            renderLessonPage();
            showToast('Lesson completed! Moving to next lesson...', 'success');
        } else {
            showToast('🎉 Congratulations! You have completed all lessons in this course!', 'success');
            viewCourse(currentCourseId);
        }
    }
    
    function nextLesson() {
        if (currentLessonIndex < currentCourseLessons.length - 1) {
            currentLessonIndex++;
            renderLessonPage();
        }
    }
    
    function previousLesson() {
        if (currentLessonIndex > 0) {
            currentLessonIndex--;
            renderLessonPage();
        }
    }
    
    window.previousLesson = previousLesson;
    window.nextLesson = nextLesson;
    window.markAndContinue = markAndContinue;
    window.startLesson = startLesson;
    
    // Quiz functionality
    let quizState = {
        currentIndex: 0,
        score: 0,
        userAnswers: [],
        questionsList: []
    };
    
    function renderQuiz() {
        loadQuestions().then(() => {
            if (!questions.length) {
                document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><div class="card"><h2>📝 No Questions Available</h2><p>Quiz questions will appear here once added to the database.</p><button class="btn btn-primary" onclick="navigateTo('home')">Back to Home</button></div></div>`;
                return;
            }
            
            quizState = {
                currentIndex: 0,
                score: 0,
                userAnswers: [],
                questionsList: [...questions]
            };
            renderQuizQuestion();
        });
    }
    
    function renderQuizQuestion() {
        if (quizState.currentIndex >= quizState.questionsList.length) {
            const percent = quizState.questionsList.length ? Math.round((quizState.score / quizState.questionsList.length) * 100) : 0;
            document.getElementById('page-content').innerHTML = `
                <div class="container" style="padding-top:100px; max-width:800px;">
                    <div class="card" style="text-align:center;">
                        <h2>🎉 Quiz Complete!</h2>
                        <div style="font-size:3rem; margin:1rem 0;">${percent >= 70 ? '🏆' : '📚'}</div>
                        <p style="font-size:1.2rem;">Your score: <strong>${quizState.score}</strong> / ${quizState.questionsList.length} (${percent}%)</p>
                        <div class="progress-bar" style="margin:1rem 0;"><div class="progress-fill" style="width:${percent}%;"></div></div>
                        <p>${percent >= 70 ? 'Excellent! You\'re well prepared for the NTSA test!' : 'Keep practicing to improve your score!'}</p>
                        <div style="display:flex; gap:1rem; justify-content:center; margin-top:2rem;">
                            <button class="btn btn-primary" onclick="renderQuiz()">🔄 Restart Quiz</button>
                            <button class="btn btn-outline" onclick="navigateTo('home')">🏠 Go Home</button>
                        </div>
                    </div>
                </div>`;
            return;
        }
        
        const q = quizState.questionsList[quizState.currentIndex];
        const options = [q.option_a, q.option_b, q.option_c, q.option_d];
        const hasAnswered = quizState.userAnswers[quizState.currentIndex] !== undefined;
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top:100px; max-width:800px;">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h2>📝 NTSA Practice Exam</h2>
                        <span style="background:var(--primary); color:#0a192f; padding:4px 12px; border-radius:50px;">Question ${quizState.currentIndex+1}/${quizState.questionsList.length}</span>
                    </div>
                    <div class="quiz-question"><strong>${escapeHtml(q.question_text)}</strong></div>
                    <div class="quiz-options" id="quizOptions">
                        ${options.map((opt, idx) => {
                            const letter = String.fromCharCode(65+idx);
                            const isSelected = hasAnswered && quizState.userAnswers[quizState.currentIndex] === idx;
                            const correctIndex = q.correct_option === 'a' ? 0 : q.correct_option === 'b' ? 1 : q.correct_option === 'c' ? 2 : 3;
                            let additionalClass = '';
                            if (hasAnswered) {
                                if (idx === correctIndex) additionalClass = 'correct';
                                else if (isSelected && idx !== correctIndex) additionalClass = 'wrong';
                            }
                            return `<div class="quiz-option ${additionalClass}" data-idx="${idx}" onclick="if(!window.hasAnswered) submitQuizAnswer(${idx})">${letter}. ${escapeHtml(opt)}</div>`;
                        }).join('')}
                    </div>
                    <div id="quizFeedback" class="quiz-feedback">
                        ${hasAnswered ? `
                            <div style="background:${quizState.userAnswers[quizState.currentIndex] === (q.correct_option === 'a' ? 0 : q.correct_option === 'b' ? 1 : q.correct_option === 'c' ? 2 : 3) ? 'rgba(0,255,136,0.1)' : 'rgba(255,71,87,0.1)'}; padding:1rem; border-radius:12px;">
                                <strong>${quizState.userAnswers[quizState.currentIndex] === (q.correct_option === 'a' ? 0 : q.correct_option === 'b' ? 1 : q.correct_option === 'c' ? 2 : 3) ? '✓ Correct!' : '✗ Incorrect'}</strong>
                                <p style="margin-top:0.5rem;">${escapeHtml(q.explanation || 'No explanation provided.')}</p>
                                <button class="btn btn-primary" style="margin-top:1rem;" onclick="nextQuizQuestion()">Next Question →</button>
                            </div>
                        ` : ''}
                    </div>
                    ${!hasAnswered ? '<p style="margin-top:1rem; color:var(--text-muted);"><i class="fas fa-info-circle"></i> Click on an option to answer</p>' : ''}
                </div>
            </div>`;
        
        window.hasAnswered = hasAnswered;
    }
    
    window.submitQuizAnswer = (selectedIdx) => {
        if (quizState.userAnswers[quizState.currentIndex] !== undefined) return;
        
        const q = quizState.questionsList[quizState.currentIndex];
        const correctIndex = q.correct_option === 'a' ? 0 : q.correct_option === 'b' ? 1 : q.correct_option === 'c' ? 2 : 3;
        const isCorrect = selectedIdx === correctIndex;
        
        if (isCorrect) {
            quizState.score++;
        }
        
        quizState.userAnswers[quizState.currentIndex] = selectedIdx;
        renderQuizQuestion();
    };
    
    window.nextQuizQuestion = () => {
        quizState.currentIndex++;
        renderQuizQuestion();
    };
    window.renderQuiz = renderQuiz;
    
    async function renderPage() {
        const container = document.getElementById('page-content');
        container.innerHTML = '<div class="loading-spinner"></div>';
        await Promise.all([loadCourses(), loadLessons(), loadQuestions()]);
        await loadUserProgress();
        
        if (currentPage === 'home') renderHome();
        else if (currentPage === 'courses') renderCourses();
        else if (currentPage === 'quiz') renderQuiz();
        else renderHome();
        
        if (window.innerWidth <= 768) document.getElementById('navLinks')?.classList.remove('show');
        window.scrollTo({ top: 0 });
    }
    
    function navigateTo(page) { 
        currentPage = page; 
        renderPage(); 
    }
    
    window.navigateTo = navigateTo;
    window.viewCourse = viewCourse;
    window.showLoginModal = showLoginModal;
    window.showSignupModal = showSignupModal;
    window.performLogin = performLogin;
    window.performSignup = performSignup;
    window.logout = logout;
    
    init();
</script>
</body>
</html>

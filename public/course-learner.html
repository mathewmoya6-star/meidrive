<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learner Hub | MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #041B3D; color: #fff; }
        .navbar {
            position: fixed; top: 0; width: 100%; background: rgba(4,27,61,0.96);
            backdrop-filter: blur(10px); padding: 1rem 2rem; z-index: 1000;
        }
        .nav-container { max-width: 1200px; margin: auto; display: flex; justify-content: space-between; }
        .logo { font-size: 1.6rem; font-weight: 700; color: #00FF88; cursor: pointer; }
        .logo span { color: #fff; }
        .hero {
            background: linear-gradient(135deg, #041B3D, #0A234F);
            padding: 100px 20px 50px; text-align: center;
        }
        .hero h1 { font-size: 2.5rem; color: #00FF88; margin-bottom: 15px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .course-info { background: #0A234F; border-radius: 20px; padding: 30px; margin-bottom: 40px; }
        .stats-grid { display: flex; gap: 30px; margin-top: 20px; flex-wrap: wrap; }
        .stat { display: flex; align-items: center; gap: 10px; color: #B7C4D6; }
        .stat i { color: #00FF88; }
        .topics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin: 30px 0; }
        .topic-card {
            background: #0A234F; border-radius: 16px; padding: 25px; cursor: pointer;
            border: 1px solid rgba(0,255,136,0.1); transition: all 0.3s;
        }
        .topic-card:hover { transform: translateY(-5px); border-color: #00FF88; }
        .topic-card i { font-size: 2rem; color: #00FF88; margin-bottom: 15px; }
        .topic-card h3 { margin-bottom: 10px; }
        .progress-section { background: #0A234F; border-radius: 20px; padding: 30px; margin-bottom: 40px; }
        .progress-bar { background: #041B3D; border-radius: 10px; height: 20px; margin: 15px 0; }
        .progress-fill { background: #00FF88; height: 100%; border-radius: 10px; width: 0%; transition: width 0.3s; }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #0A234F; border-radius: 20px; padding: 40px;
            max-width: 800px; width: 90%; max-height: 85vh; overflow-y: auto;
        }
        .modal-content h2 { color: #00FF88; margin-bottom: 20px; }
        .modal-content h3 { margin: 20px 0 10px; color: #00FF88; }
        .modal-content p { color: #B7C4D6; line-height: 1.6; margin-bottom: 15px; }
        .modal-content ul { margin-left: 20px; margin-bottom: 15px; color: #B7C4D6; }
        .close-modal { float: right; font-size: 1.5rem; cursor: pointer; }
        .close-modal:hover { color: #00FF88; }
        .btn-check {
            background: #00FF88; color: #041B3D; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 15px;
        }
        footer { background: #0A234F; text-align: center; padding: 30px; color: #B7C4D6; margin-top: 40px; }
        @media (max-width: 768px) { .hero h1 { font-size: 1.8rem; } .topics-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="location.href='/'">MEI DRIVE <span>AFRICA</span></div>
    </div>
</nav>

<section class="hero">
    <h1 id="courseTitle">Loading...</h1>
    <p id="courseSubtitle"></p>
</section>

<div class="container">
    <div class="course-info" id="courseInfo"></div>
    
    <div class="progress-section" id="progressSection">
        <h3><i class="fas fa-chart-line"></i> Your Progress</h3>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <p id="progressText">0% Complete</p>
    </div>
    
    <h2><i class="fas fa-book-open"></i> Course Topics</h2>
    <div class="topics-grid" id="topicsGrid"></div>
</div>

<footer>
    <p>&copy; 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training</p>
</footer>

<div id="topicModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentProfile = null;
    let courseData = null;
    let topics = [];
    let completedTopics = [];
    let courseId = null;
    
    async function getCurrentProfile() {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) return null;
        
        const { data: profile } = await supabase
            .from('profiles')
            .select('id')
            .eq('id', session.user.id)
            .maybeSingle();
        
        return profile;
    }
    
    async function loadCourse() {
        const { data: course, error } = await supabase
            .from('courses')
            .select('*')
            .eq('name', 'Learner Hub')
            .single();
        
        if (error) { console.error('Error:', error); return; }
        
        courseData = course;
        courseId = course.id;
        
        document.getElementById('courseTitle').textContent = course.name;
        document.getElementById('courseSubtitle').textContent = course.description;
        
        document.getElementById('courseInfo').innerHTML = `
            <h2><i class="fas fa-info-circle"></i> About This Course</h2>
            <p>${course.long_description || course.description}</p>
            <div class="stats-grid">
                <div class="stat"><i class="fas fa-clock"></i> Duration: ${course.duration} weeks</div>
                <div class="stat"><i class="fas fa-chart-line"></i> Level: ${course.level}</div>
                <div class="stat"><i class="fas fa-tag"></i> ${course.type === 'free' ? 'FREE' : `KES ${course.price?.toLocaleString()}`}</div>
            </div>
        `;
        
        await loadTopics();
    }
    
    async function loadTopics() {
        const { data, error } = await supabase
            .from('course_content')
            .select('*')
            .eq('course_id', courseId)
            .order('topic_order');
        
        if (error) { console.error('Error loading topics:', error); return; }
        
        topics = data;
        await loadUserProgress();
        renderTopics();
    }
    
    async function loadUserProgress() {
        currentProfile = await getCurrentProfile();
        
        if (!currentProfile) return;
        
        const { data, error } = await supabase
            .from('user_progress')
            .select('completed_topics')
            .eq('profile_id', currentProfile.id)
            .eq('course_id', courseId)
            .maybeSingle();
        
        if (!error && data) {
            completedTopics = data.completed_topics || [];
        }
        
        updateProgressDisplay();
    }
    
    async function saveProgress() {
        if (!currentProfile) {
            alert('Please login to track your progress');
            window.location.href = '/login.html';
            return;
        }
        
        const progressPercent = Math.round((completedTopics.length / topics.length) * 100);
        
        const { error } = await supabase
            .from('user_progress')
            .upsert({
                profile_id: currentProfile.id,
                course_id: courseId,
                completed_topics: completedTopics,
                overall_progress: progressPercent,
                last_accessed: new Date(),
                completed_at: progressPercent === 100 ? new Date() : null
            });
        
        if (error) console.error('Error saving progress:', error);
    }
    
    async function completeTopic(topicId) {
        if (!currentProfile) {
            alert('Please login to track your progress');
            window.location.href = '/login.html';
            return;
        }
        
        if (!completedTopics.includes(topicId)) {
            completedTopics.push(topicId);
            await saveProgress();
            updateProgressDisplay();
            renderTopics();
            showToast('✅ Topic completed!');
        }
    }
    
    function updateProgressDisplay() {
        const percent = topics.length ? (completedTopics.length / topics.length) * 100 : 0;
        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('progressText').innerHTML = `${Math.round(percent)}% Complete (${completedTopics.length}/${topics.length} topics)`;
    }
    
    function renderTopics() {
        const grid = document.getElementById('topicsGrid');
        grid.innerHTML = '';
        
        topics.forEach(topic => {
            const isCompleted = completedTopics.includes(topic.topic_id);
            const card = document.createElement('div');
            card.className = 'topic-card';
            card.style.border = isCompleted ? '1px solid #00FF88' : '';
            card.onclick = () => openTopic(topic);
            
            card.innerHTML = `
                <i class="fas ${topic.topic_icon || 'fa-book'}"></i>
                <h3>${topic.topic_title} ${isCompleted ? '✅' : ''}</h3>
                <p>Click to view content</p>
                ${!isCompleted ? '<button class="btn-check" onclick="event.stopPropagation(); completeTopic(' + topic.topic_id + ')">Mark Completed</button>' : ''}
            `;
            grid.appendChild(card);
        });
    }
    
    function openTopic(topic) {
        const modal = document.getElementById('topicModal');
        const modalContent = document.getElementById('modalContent');
        
        modalContent.innerHTML = `
            <h2><i class="fas ${topic.topic_icon || 'fa-book'}"></i> ${topic.topic_title}</h2>
            ${topic.topic_content}
            <button class="btn-check" onclick="completeTopic(${topic.topic_id}); closeModal();">
                ✅ Mark as Completed
            </button>
        `;
        modal.classList.add('active');
    }
    
    function closeModal() {
        document.getElementById('topicModal').classList.remove('active');
    }
    
    function showToast(message) {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.cssText = `
            position: fixed; bottom: 20px; right: 20px; background: #00FF88;
            color: #041B3D; padding: 12px 20px; border-radius: 8px;
            z-index: 1000; animation: fadeOut 3s forwards;
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    const style = document.createElement('style');
    style.textContent = `@keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }`;
    document.head.appendChild(style);
    
    supabase.auth.onAuthStateChange(async () => {
        await loadUserProgress();
        renderTopics();
    });
    
    loadCourse();
    window.completeTopic = completeTopic;
    window.closeModal = closeModal;
</script>
</body>
</html>

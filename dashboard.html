<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Learner Dashboard | MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #041B3D;
            color: #fff;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: #0A234F;
            padding: 20px;
            overflow-y: auto;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .sidebar h2 {
            color: #00FF88;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #B7C4D6;
            padding: 12px;
            text-decoration: none;
            margin-top: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .sidebar a:hover, .sidebar a.active {
            background: #00FF88;
            color: #041B3D;
        }

        .logout-btn {
            margin-top: 30px;
            background: #ff4d4f;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logout-btn:hover {
            background: #ff7875;
            transform: translateY(-2px);
        }

        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 15px;
            left: 15px;
            background: #00FF88;
            color: #041B3D;
            border: none;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            z-index: 101;
            font-size: 1.2rem;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        .main {
            margin-left: 280px;
            padding: 20px;
            transition: margin-left 0.3s ease;
        }

        .card {
            background: #0A234F;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #041B3D;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            border-color: #00FF88;
            transform: translateY(-3px);
        }

        .stat-card i {
            font-size: 2rem;
            color: #00FF88;
            margin-bottom: 10px;
        }

        .stat-card h3 {
            font-size: 2rem;
            color: #00FF88;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #B7C4D6;
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .course-card {
            background: #041B3D;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(0, 255, 136, 0.15);
            transition: all 0.3s ease;
        }

        .course-card:hover {
            transform: translateY(-3px);
            border-color: #00FF88;
        }

        .course-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .course-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .badge-free { background: #ff9800; color: #041B3D; }
        .badge-premium { background: #00FF88; color: #041B3D; }
        .badge-enrolled { background: #00C851; color: #fff; }

        .course-title {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .course-description {
            color: #B7C4D6;
            font-size: 0.85rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .course-progress {
            margin: 15px 0;
        }
        .progress-bar-bg {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background: #00FF88;
            height: 100%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.75rem;
            color: #B7C4D6;
            margin-top: 5px;
            text-align: center;
        }

        .btn-enroll, .btn-continue {
            width: 100%;
            padding: 12px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .btn-enroll {
            background: #00FF88;
            color: #041B3D;
        }
        .btn-enroll:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,255,136,0.3); }
        .btn-continue {
            background: transparent;
            border: 2px solid #00FF88;
            color: #00FF88;
        }
        .btn-continue:hover { background: #00FF88; color: #041B3D; }

        .btn-primary {
            background: #00FF88;
            color: #041B3D;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #1a3a5f;
        }
        th {
            color: #00FF88;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #B7C4D6;
        }
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 136, 0.3);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0A234F;
            border-left: 4px solid #00FF88;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast.error { border-left-color: #ff4d4f; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .price {
            font-size: 1.2rem;
            font-weight: bold;
            margin: 10px 0;
        }
        .price.free { color: #00FF88; }
        .price.premium { color: #ff9800; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main { margin-left: 0; padding: 60px 15px 20px 15px; }
            .mobile-menu-btn { display: block; }
            .overlay.active { display: block; }
            .stats-grid { grid-template-columns: 1fr; }
            .courses-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
    <h2><i class="fas fa-car"></i> MEI LEARNER</h2>
    <a href="javascript:void(0)" data-section="dashboard" onclick="showSection('dashboard')"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="javascript:void(0)" data-section="courses" onclick="showSection('courses')"><i class="fas fa-book"></i> My Courses</a>
    <a href="javascript:void(0)" data-section="progress" onclick="showSection('progress')"><i class="fas fa-chart-line"></i> My Progress</a>
    <button class="logout-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
</div>

<div class="main">
    <!-- DASHBOARD SECTION -->
    <div id="dashboardSection">
        <h2><i class="fas fa-tachometer-alt"></i> Dashboard Overview</h2>
        <div class="stats-grid">
            <div class="stat-card" onclick="showSection('courses')">
                <i class="fas fa-book"></i>
                <h3 id="totalCourses">0</h3>
                <p>Available Courses</p>
            </div>
            <div class="stat-card" onclick="showSection('courses')">
                <i class="fas fa-check-circle"></i>
                <h3 id="enrolledCount">0</h3>
                <p>Enrolled Courses</p>
            </div>
            <div class="stat-card" onclick="showSection('progress')">
                <i class="fas fa-trophy"></i>
                <h3 id="completedCount">0</h3>
                <p>Completed</p>
            </div>
            <div class="stat-card" onclick="showSection('progress')">
                <i class="fas fa-chart-line"></i>
                <h3 id="overallProgress">0%</h3>
                <p>Overall Progress</p>
            </div>
        </div>

        <!-- Featured/Recommended Courses -->
        <div class="card">
            <h3><i class="fas fa-star"></i> Recommended For You</h3>
            <div id="recommendedCourses" class="courses-grid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- MY COURSES SECTION -->
    <div id="coursesSection" style="display:none">
        <div class="card">
            <h2><i class="fas fa-book"></i> My Courses</h2>
            <button class="btn-primary" onclick="loadEnrolledCourses()"><i class="fas fa-sync-alt"></i> Refresh</button>
            <div id="enrolledCoursesContainer" class="courses-grid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Available Courses to Enroll -->
        <div class="card">
            <h3><i class="fas fa-store"></i> Available Courses</h3>
            <div id="availableCoursesContainer" class="courses-grid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- PROGRESS SECTION -->
    <div id="progressSection" style="display:none">
        <div class="card">
            <h2><i class="fas fa-chart-line"></i> My Learning Progress</h2>
            <div id="progressTable" class="table-wrapper">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    let supabaseClient;
    let currentUser = null;
    let allCourses = [];
    let userEnrollments = new Map();

    // COURSES DATA (Hardcoded for immediate display)
    const COURSES = [
        { id: 1, name: 'Learner Hub - Complete Driver Training', description: 'NTSA-approved curriculum from basics to road readiness. Covers traffic rules, vehicle controls, defensive driving, and complete exam preparation.', price: 0, type: 'free', icon: '📚', file: 'learner-hub.html', total_units: 21 },
        { id: 2, name: 'Boda Boda Professional Course', description: 'Professional motorcycle taxi training including safety, customer service, road regulations, and defensive riding techniques.', price: 0, type: 'free', icon: '🏍️', file: 'boda-course.html', total_units: 15 },
        { id: 3, name: 'Defensive Driving Course', description: 'Master advanced driving techniques, hazard perception, emergency maneuvers, and accident avoidance strategies.', price: 1999, type: 'premium', icon: '🛡️', file: 'defensive-driving-course.html', total_units: 12 },
        { id: 4, name: 'Professional Driver Course', description: 'Comprehensive training for PSV, logistics, and commercial drivers including customer care and regulations.', price: 4999, type: 'premium', icon: '🚛', file: 'professional-driver-course.html', total_units: 20 },
        { id: 5, name: 'Electric Vehicle Course', description: 'Master EV technology, charging systems, battery maintenance, and safety procedures for electric vehicles.', price: 2999, type: 'premium', icon: '⚡', file: 'ev-course-dynamic.html', total_units: 10 },
        { id: 6, name: 'School Transport Safety', description: 'Specialized certification for school bus drivers including child safety protocols, emergency procedures, and regulations.', price: 1999, type: 'premium', icon: '🚸', file: 'school-transport-course.html', total_units: 8 },
        { id: 7, name: 'E-Safety Library', description: 'Digital safety for drivers - online records management, apps, cybersecurity awareness, and digital compliance.', price: 0, type: 'free', icon: '💻', file: 'e-safety-library.html', total_units: 6 },
        { id: 8, name: 'Quiz Bank - Exam Preparation', description: '1000+ NTSA practice questions to prepare for your driving theory test with detailed explanations.', price: 0, type: 'free', icon: '📝', file: 'quiz-bank.html', total_units: 10 }
    ];

    document.addEventListener('DOMContentLoaded', function() {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        init();
    });

    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    async function checkAuth() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            window.location.href = '/login.html';
            return false;
        }
        currentUser = session.user;
        
        // Get user profile
        let displayName = currentUser.email.split('@')[0];
        try {
            const { data: profile } = await supabaseClient
                .from('profiles')
                .select('full_name')
                .eq('id', currentUser.id)
                .maybeSingle();
            if (profile?.full_name) displayName = profile.full_name;
        } catch (err) {}
        
        return true;
    }

    async function loadEnrollments() {
        try {
            const { data } = await supabaseClient
                .from('enrollments')
                .select('course_id, progress')
                .eq('user_id', currentUser.id);
            
            if (data) {
                userEnrollments.clear();
                data.forEach(e => {
                    userEnrollments.set(e.course_id, { enrolled: true, progress: e.progress || 0 });
                });
            }
            updateStats();
        } catch (err) {
            console.log('Enrollments table may not exist yet');
        }
    }

    async function enrollInCourse(courseId, courseName) {
        if (userEnrollments.has(courseId)) {
            showToast('Already enrolled in this course!');
            return;
        }
        
        try {
            const { error } = await supabaseClient
                .from('enrollments')
                .insert([{
                    user_id: currentUser.id,
                    course_id: courseId,
                    status: 'active',
                    progress: 0,
                    enrolled_at: new Date()
                }]);
            
            if (error) throw error;
            
            userEnrollments.set(courseId, { enrolled: true, progress: 0 });
            updateStats();
            renderAllCourseSections();
            showToast(`✅ Successfully enrolled in ${courseName}!`);
        } catch (err) {
            showToast('Enrollment failed: ' + err.message, 'error');
        }
    }

    function openCourse(course) {
        localStorage.setItem('currentCourse', JSON.stringify(course));
        window.location.href = `/${course.file}`;
    }

    function updateStats() {
        const totalCourses = COURSES.length;
        const enrolledCount = userEnrollments.size;
        const completedCount = Array.from(userEnrollments.values()).filter(e => e.progress === 100).length;
        const totalProgress = Array.from(userEnrollments.values()).reduce((sum, e) => sum + e.progress, 0);
        const avgProgress = enrolledCount > 0 ? Math.round(totalProgress / enrolledCount) : 0;
        
        document.getElementById('totalCourses').textContent = totalCourses;
        document.getElementById('enrolledCount').textContent = enrolledCount;
        document.getElementById('completedCount').textContent = completedCount;
        document.getElementById('overallProgress').textContent = `${avgProgress}%`;
    }

    function renderRecommendedCourses() {
        const container = document.getElementById('recommendedCourses');
        // Show first 3 courses as recommendations
        const recommended = COURSES.slice(0, 3);
        
        container.innerHTML = recommended.map(course => {
            const isEnrolled = userEnrollments.has(course.id);
            const isFree = course.type === 'free' || course.price === 0;
            
            return `
                <div class="course-card">
                    <div class="course-icon">${course.icon}</div>
                    <span class="course-badge ${isFree ? 'badge-free' : 'badge-premium'}">${isFree ? 'FREE' : 'PREMIUM'}</span>
                    <h3 class="course-title">${escapeHtml(course.name)}</h3>
                    <p class="course-description">${escapeHtml(course.description.substring(0, 100))}...</p>
                    ${isEnrolled ? 
                        `<button class="btn-continue" onclick="openCourse(${JSON.stringify(course).replace(/"/g, '&quot;')})">▶️ Continue Learning</button>` :
                        `<div class="price ${isFree ? 'free' : 'premium'}">${isFree ? 'FREE' : `KES ${course.price.toLocaleString()}`}</div>
                        <button class="btn-enroll" onclick="enrollInCourse(${course.id}, '${escapeHtml(course.name)}')">🎓 Enroll Now</button>`
                    }
                </div>
            `;
        }).join('');
    }

    function renderEnrolledCourses() {
        const container = document.getElementById('enrolledCoursesContainer');
        const enrolledCourses = COURSES.filter(c => userEnrollments.has(c.id));
        
        if (enrolledCourses.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-book-open"></i><h3>No enrolled courses yet</h3><p>Browse available courses below and enroll to get started!</p></div>`;
            return;
        }
        
        container.innerHTML = enrolledCourses.map(course => {
            const enrollment = userEnrollments.get(course.id);
            const progress = enrollment?.progress || 0;
            
            return `
                <div class="course-card">
                    <div class="course-icon">${course.icon}</div>
                    <span class="course-badge badge-enrolled">✅ ENROLLED</span>
                    <h3 class="course-title">${escapeHtml(course.name)}</h3>
                    <p class="course-description">${escapeHtml(course.description.substring(0, 100))}...</p>
                    <div class="course-progress">
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width: ${progress}%"></div></div>
                        <div class="progress-text">${progress}% Complete</div>
                    </div>
                    <button class="btn-continue" onclick="openCourse(${JSON.stringify(course).replace(/"/g, '&quot;')})">
                        ${progress === 100 ? '📋 Review Course' : '▶️ Continue Learning'}
                    </button>
                </div>
            `;
        }).join('');
    }

    function renderAvailableCourses() {
        const container = document.getElementById('availableCoursesContainer');
        const availableCourses = COURSES.filter(c => !userEnrollments.has(c.id));
        
        if (availableCourses.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-check-circle"></i><h3>You're enrolled in all courses!</h3><p>Great job! Keep learning and complete your courses.</p></div>`;
            return;
        }
        
        container.innerHTML = availableCourses.map(course => {
            const isFree = course.type === 'free' || course.price === 0;
            
            return `
                <div class="course-card">
                    <div class="course-icon">${course.icon}</div>
                    <span class="course-badge ${isFree ? 'badge-free' : 'badge-premium'}">${isFree ? 'FREE' : 'PREMIUM'}</span>
                    <h3 class="course-title">${escapeHtml(course.name)}</h3>
                    <p class="course-description">${escapeHtml(course.description.substring(0, 100))}...</p>
                    <div class="price ${isFree ? 'free' : 'premium'}">${isFree ? 'FREE' : `KES ${course.price.toLocaleString()}`}</div>
                    <button class="btn-enroll" onclick="enrollInCourse(${course.id}, '${escapeHtml(course.name)}')">🎓 Enroll Now</button>
                </div>
            `;
        }).join('');
    }

    function renderProgressTable() {
        const container = document.getElementById('progressTable');
        const enrolledCourses = COURSES.filter(c => userEnrollments.has(c.id));
        
        if (enrolledCourses.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-chart-line"></i><h3>No progress data yet</h3><p>Enroll in a course to start tracking your progress!</p></div>`;
            return;
        }
        
        let html = `<table><thead><tr><th>Course</th><th>Progress</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
        enrolledCourses.forEach(course => {
            const enrollment = userEnrollments.get(course.id);
            const progress = enrollment?.progress || 0;
            const status = progress === 100 ? '✅ Completed' : '🔄 In Progress';
            
            html += `<tr>
                <td data-label="Course">${escapeHtml(course.name)}</td>
                <td data-label="Progress">
                    <div class="progress-bar-bg" style="width: 150px;"><div class="progress-bar-fill" style="width: ${progress}%"></div></div>
                    ${progress}%
                </td>
                <td data-label="Status">${status}</td>
                <td data-label="Action"><button class="btn-continue" onclick="openCourse(${JSON.stringify(course).replace(/"/g, '&quot;')})">Continue</button></td>
            </tr>`;
        });
        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function renderAllCourseSections() {
        renderEnrolledCourses();
        renderAvailableCourses();
        renderRecommendedCourses();
        renderProgressTable();
        updateStats();
    }

    async function loadEnrolledCourses() {
        await loadEnrollments();
        renderAllCourseSections();
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    async function showSection(section) {
        document.getElementById('dashboardSection').style.display = section === 'dashboard' ? 'block' : 'none';
        document.getElementById('coursesSection').style.display = section === 'courses' ? 'block' : 'none';
        document.getElementById('progressSection').style.display = section === 'progress' ? 'block' : 'none';
        
        // Update active state in sidebar
        document.querySelectorAll('.sidebar a').forEach(a => a.classList.remove('active'));
        document.querySelector(`.sidebar a[data-section="${section}"]`)?.classList.add('active');
        
        if (section === 'dashboard') {
            await loadEnrollments();
            renderRecommendedCourses();
            updateStats();
        }
        if (section === 'courses') {
            await loadEnrolledCourses();
        }
        if (section === 'progress') {
            renderProgressTable();
        }
    }

    async function handleLogout() {
        await supabaseClient.auth.signOut();
        window.location.href = '/login.html';
    }

    function openMobileMenu() {
        document.getElementById('sidebar').classList.add('active');
        document.getElementById('overlay').classList.add('active');
    }

    function closeMobileMenu() {
        document.getElementById('sidebar').classList.remove('active');
        document.getElementById('overlay').classList.remove('active');
    }

    async function init() {
        if (!await checkAuth()) return;
        
        // Set all courses
        allCourses = COURSES;
        
        await loadEnrollments();
        renderRecommendedCourses();
        updateStats();
        
        document.getElementById('mobileMenuBtn').addEventListener('click', openMobileMenu);
        document.getElementById('overlay').addEventListener('click', closeMobileMenu);
        
        await showSection('dashboard');
    }

    window.showSection = showSection;
    window.handleLogout = handleLogout;
    window.enrollInCourse = enrollInCourse;
    window.openCourse = openCourse;
    window.loadEnrolledCourses = loadEnrolledCourses;
</script>
</body>
</html>

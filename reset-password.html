<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MEI Drive Africa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .reset-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #00FF88; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .message { margin-top: 10px; padding: 10px; border-radius: 8px; display: none; }
        .error { background: #fde8e8; color: #e74c3c; }
        .success { background: #e8f5e9; color: #00FF88; }
    </style>
</head>
<body>
    <div class="reset-container">
        <h2>Reset Password</h2>
        <p>Enter your email to receive a password reset link.</p>
        <input type="email" id="email" placeholder="Email address">
        <button onclick="resetPassword()">Send Reset Link</button>
        <div id="message" class="message"></div>
        <a href="/login.html" style="display: block; margin-top: 20px; color: #666;">← Back to Login</a>
    </div>
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';
        const supabase = createClient('https://jeksrwrzzrczamxijvwl.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs');
        
        window.resetPassword = async () => {
            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');
            if (!email) { messageDiv.textContent = 'Please enter your email'; messageDiv.className = 'message error'; messageDiv.style.display = 'block'; return; }
            
            const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo: `${window.location.origin}/update-password.html` });
            if (error) { messageDiv.textContent = error.message; messageDiv.className = 'message error'; }
            else { messageDiv.textContent = 'Password reset email sent! Check your inbox.'; messageDiv.className = 'message success'; }
            messageDiv.style.display = 'block';
        };
    </script>
</body>
</html>

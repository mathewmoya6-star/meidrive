<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Login | MEI DRIVE AFRICA</title>

    <meta name="theme-color" content="#041B3D" />

    <!-- Fonts & Icons -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --primary:#00FF88;
            --dark:#041B3D;
            --dark2:#0A234F;
            --white:#ffffff;
            --gray:#B7C4D6;
            --danger:#ff4d4f;
            --success:#22c55e;
            --transition:all .3s ease;
        }

        body{
            font-family:'Segoe UI',sans-serif;
            min-height:100vh;
            overflow:hidden;
            background:
            linear-gradient(rgba(4,27,61,.88),rgba(10,35,79,.92)),
            url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1400&auto=format&fit=crop')
            center/cover no-repeat;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            position:relative;
        }

        /* Floating Glow */
        .glow{
            position:absolute;
            width:400px;
            height:400px;
            border-radius:50%;
            background:rgba(0,255,136,.15);
            filter:blur(100px);
            z-index:0;
            animation:float 8s ease-in-out infinite;
        }

        .glow.one{
            top:-100px;
            left:-100px;
        }

        .glow.two{
            bottom:-120px;
            right:-120px;
            animation-delay:2s;
        }

        @keyframes float{
            0%,100%{
                transform:translateY(0px);
            }
            50%{
                transform:translateY(-20px);
            }
        }

        .login-card{
            width:100%;
            max-width:430px;
            background:rgba(255,255,255,.08);
            backdrop-filter:blur(18px);
            border:1px solid rgba(255,255,255,.12);
            border-radius:28px;
            padding:40px;
            position:relative;
            z-index:2;
            box-shadow:0 20px 60px rgba(0,0,0,.4);
            animation:fadeIn .8s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(25px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .logo{
            width:80px;
            height:80px;
            margin:auto;
            border-radius:24px;
            background:linear-gradient(135deg,var(--primary),#00cc6f);
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:38px;
            color:var(--dark);
            margin-bottom:20px;
            font-weight:bold;
            box-shadow:0 10px 30px rgba(0,255,136,.35);
        }

        h1{
            text-align:center;
            color:var(--white);
            font-size:2rem;
            margin-bottom:10px;
            font-weight:800;
        }

        .subtitle{
            text-align:center;
            color:var(--gray);
            margin-bottom:35px;
            font-size:.95rem;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            color:var(--white);
            margin-bottom:8px;
            font-size:.9rem;
            font-weight:600;
        }

        .input-box{
            position:relative;
        }

        .input-box i{
            position:absolute;
            top:50%;
            left:15px;
            transform:translateY(-50%);
            color:var(--gray);
        }

        .input-box input{
            width:100%;
            padding:15px 15px 15px 45px;
            border:none;
            outline:none;
            border-radius:14px;
            background:rgba(255,255,255,.12);
            color:white;
            font-size:15px;
            border:1px solid rgba(255,255,255,.08);
            transition:var(--transition);
        }

        .input-box input::placeholder{
            color:#d0d7e2;
        }

        .input-box input:focus{
            border-color:var(--primary);
            box-shadow:0 0 0 4px rgba(0,255,136,.12);
        }

        .login-btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,var(--primary),#00d977);
            color:var(--dark);
            font-weight:800;
            font-size:16px;
            cursor:pointer;
            transition:var(--transition);
            margin-top:10px;
        }

        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 12px 30px rgba(0,255,136,.3);
        }

        .message{
            display:none;
            margin-top:15px;
            padding:12px;
            border-radius:12px;
            font-size:.9rem;
            text-align:center;
        }

        .error{
            background:rgba(255,77,79,.12);
            color:#ff9b9c;
            border:1px solid rgba(255,77,79,.2);
        }

        .success{
            background:rgba(34,197,94,.12);
            color:#7dffac;
            border:1px solid rgba(34,197,94,.2);
        }

        .spinner{
            display:none;
            width:24px;
            height:24px;
            border:3px solid rgba(255,255,255,.25);
            border-top-color:var(--primary);
            border-radius:50%;
            margin:18px auto 0;
            animation:spin .8s linear infinite;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }

        .bottom-links{
            text-align:center;
            margin-top:28px;
            color:var(--gray);
            font-size:.92rem;
        }

        .bottom-links a{
            color:var(--primary);
            text-decoration:none;
            font-weight:700;
        }

        .home-link{
            display:inline-block;
            margin-top:18px;
            color:#d9e2ef;
            text-decoration:none;
            font-size:.88rem;
            transition:var(--transition);
        }

        .home-link:hover{
            color:var(--primary);
        }

        @media(max-width:480px){

            body{
                padding:15px;
            }

            .login-card{
                padding:30px 22px;
            }

            h1{
                font-size:1.7rem;
            }
        }
    </style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="login-card">

    <div class="logo">🚗</div>

    <h1>Welcome Back</h1>

    <p class="subtitle">
        Login to continue learning with MEI DRIVE AFRICA
    </p>

    <div id="error" class="message error"></div>
    <div id="success" class="message success"></div>

    <form id="loginForm">

        <div class="input-group">

            <label>Email Address</label>

            <div class="input-box">
                <i class="fas fa-envelope"></i>

                <input
                type="email"
                id="email"
                placeholder="Enter your email"
                autocomplete="email"
                required>
            </div>

        </div>

        <div class="input-group">

            <label>Password</label>

            <div class="input-box">
                <i class="fas fa-lock"></i>

                <input
                type="password"
                id="password"
                placeholder="Enter your password"
                autocomplete="current-password"
                required>
            </div>

        </div>

        <button type="submit" class="login-btn" id="loginBtn">
            Login
        </button>

    </form>

    <div id="spinner" class="spinner"></div>

    <div class="bottom-links">
        Don't have an account?
        <a href="/register.html">Create Account</a>

        <br>

        <a href="/" class="home-link">
            <i class="fas fa-arrow-left"></i>
            Back to Home
        </a>
    </div>

</div>

<script>

    const SUPABASE_URL =
    'https://jeksrwrzzrczamxijvwl.supabase.co';

    const SUPABASE_KEY =
    'YOUR_SUPABASE_ANON_KEY';

    const { createClient } = window.supabase;

    const supabase =
    createClient(SUPABASE_URL, SUPABASE_KEY);

    const form =
    document.getElementById('loginForm');

    const loginBtn =
    document.getElementById('loginBtn');

    const spinner =
    document.getElementById('spinner');

    const errorDiv =
    document.getElementById('error');

    const successDiv =
    document.getElementById('success');

    function showError(message){

        errorDiv.innerText = message;

        errorDiv.style.display = 'block';

        successDiv.style.display = 'none';

        setTimeout(()=>{
            errorDiv.style.display = 'none';
        },5000);
    }

    function showSuccess(message){

        successDiv.innerText = message;

        successDiv.style.display = 'block';

        errorDiv.style.display = 'none';
    }

    function setLoading(state){

        spinner.style.display =
        state ? 'block' : 'none';

        loginBtn.disabled = state;

        loginBtn.innerText =
        state ? 'Logging in...' : 'Login';
    }

    form.addEventListener('submit', async(e)=>{

        e.preventDefault();

        const email =
        document.getElementById('email').value.trim();

        const password =
        document.getElementById('password').value;

        if(!email || !password){
            showError('Please fill all fields');
            return;
        }

        setLoading(true);

        try{

            const { data, error } =
            await supabase.auth.signInWithPassword({
                email,
                password
            });

            setLoading(false);

            if(error){

                if(error.message.includes('Invalid')){
                    showError('Invalid email or password');
                }else{
                    showError(error.message);
                }

                return;
            }

            localStorage.setItem(
                'user_id',
                data.user.id
            );

            localStorage.setItem(
                'user_email',
                data.user.email
            );

            showSuccess(
                'Login successful! Redirecting...'
            );

            setTimeout(()=>{
                window.location.href =
                '/dashboard.html';
            },1500);

        }catch(err){

            console.error(err);

            setLoading(false);

            showError(
                'Network error. Try again.'
            );
        }
    });

    async function checkSession(){

        const {
            data:{ session }
        } = await supabase.auth.getSession();

        if(session){
            window.location.href =
            '/dashboard.html';
        }
    }

    checkSession();

</script>

</body>
</html>

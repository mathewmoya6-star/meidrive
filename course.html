<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0e27; color: white; }
        .navbar { background: #1a1f3a; padding: 1rem 2rem; border-bottom: 1px solid rgba(0,255,136,0.2); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 1.5rem; font-weight: bold; color: #00ff88; text-decoration: none; }
        .logo span { color: white; }
        .back-btn { background: transparent; border: 1px solid #00ff88; color: #00ff88; padding: 8px 20px; border-radius: 8px; cursor: pointer; text-decoration: none; transition: all 0.3s; }
        .back-btn:hover { background: rgba(0,255,136,0.1); }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .course-header { background: linear-gradient(135deg, #1a1f3a, #0a0e27); border-radius: 20px; padding: 40px; text-align: center; border: 1px solid rgba(0,255,136,0.2); margin-bottom: 30px; }
        .course-header h1 { color: #00ff88; margin-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #1a1f3a; padding: 25px; border-radius: 16px; text-align: center; border: 1px solid rgba(0,255,136,0.1); }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: #00ff88; }
        .progress-section { background: #1a1f3a; border-radius: 16px; padding: 30px; margin-bottom: 30px; }
        .progress-bar-container { background: rgba(255,255,255,0.1); border-radius: 10px; height: 20px; overflow: hidden; margin: 15px 0; }
        .progress-fill { background: linear-gradient(135deg, #00ff88, #00ccff); height: 100%; width: 0%; transition: width 0.3s; }
        .units-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .unit-card { background: #1a1f3a; border-radius: 12px; padding: 20px; border: 1px solid rgba(0,255,136,0.1); transition: all 0.3s; cursor: pointer; }
        .unit-card:hover { transform: translateY(-3px); border-color: #00ff88; }
        .unit-number { color: #00ff88; font-size: 0.8rem; margin-bottom: 5px; }
        .unit-title { font-size: 1.1rem; margin-bottom: 10px; }
        .unit-status { font-size: 0.75rem; color: #a0a0c0; margin-top: 10px; }
        .unit-status.completed { color: #00ff88; }
        .enroll-btn { background: #00ff88; color: #0a0e27; border: none; padding: 12px 30px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; margin-top: 20px; }
        .enroll-btn:hover { background: #00cc6a; transform: translateY(-2px); }
        .loading { text-align: center; padding: 60px; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(0,255,136,0.2); border-top-color: #00ff88; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-message { background: rgba(255,68,68,0.2); border: 1px solid #ff4444; border-radius: 16px; padding: 40px; text-align: center; }
        .footer { text-align: center; padding: 30px; color: #a0a0c0; font-size: 0.8rem; border-top: 1px solid rgba(0,255,136,0.1); margin-top: 40px; }
        @media (max-width: 768px) { .stats-grid, .units-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar"><div class="nav-container"><a href="index.html" class="logo">MEI DRIVE <span>AFRICA</span></a><a href="index.html" class="back-btn">← All Courses</a></div></nav>
    <div class="container" id="courseContent"><div class="loading"><div class="spinner"></div> Loading course...</div></div>
    <div class="footer"><p>© 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training</p></div>

    <script>
        let currentUser = null, courseData = null, courseUnits = [], completedUnitIds = new Set(), isEnrolled = false;
        function getCourseId() { return parseInt(new URLSearchParams(window.location.search).get('id')) || 1; }
        
        if (!window.MEIDrive?.supabase) { document.getElementById('courseContent').innerHTML = '<div class="error-message"><h3>⚠️ Connection Error</h3><button onclick="location.reload()">Retry</button></div>'; }
        
        async function loadCourse() { const courseId = getCourseId(); courseData = await window.MEIDrive.fetchCourseById(courseId); if (!courseData) document.getElementById('courseContent').innerHTML = '<div class="error-message"><h3>Course not found</h3></div>'; return courseData; }
        async function loadUnits() { const courseId = getCourseId(); courseUnits = await window.MEIDrive.fetchLessons(courseId); return courseUnits; }
        async function loadUser() { currentUser = await window.MEIDrive.getCurrentUser(); return currentUser; }
        async function loadEnrollments() { if (!currentUser) return; const enrollments = await window.MEIDrive.fetchEnrollments(currentUser.id); isEnrolled = enrollments.some(e => e.course_id === courseData?.id); }
        async function loadProgress() { if (!currentUser || !isEnrolled) return; const progress = await window.MEIDrive.fetchLessonProgress(currentUser.id); completedUnitIds.clear(); progress.forEach(p => { if (p.completed) completedUnitIds.add(p.lesson_id); }); }
        async function enroll() { if (!currentUser) { alert('Please login'); window.location.href = 'index.html'; return; } if (isEnrolled) { alert('Already enrolled'); return; } const result = await window.MEIDrive.enrollInCourse(currentUser.id, courseData.id); if (result.success) { isEnrolled = true; alert('Enrolled!'); renderPage(); } else alert('Error: ' + result.error); }
        async function toggleUnit(unitId, completed) { if (!currentUser) { alert('Please login'); return; } await window.MEIDrive.toggleLessonComplete(currentUser.id, unitId, completed); if (completed) completedUnitIds.add(unitId); else completedUnitIds.delete(unitId); const progress = Math.round((completedUnitIds.size / courseUnits.length) * 100); await window.MEIDrive.updateProgress(currentUser.id, courseData.id, progress); renderPage(); }
        function viewUnit(unitId) { window.location.href = `unit.html?id=${unitId}&course_id=${courseData.id}`; }
        function calculateProgress() { return courseUnits.length ? Math.round((completedUnitIds.size / courseUnits.length) * 100) : 0; }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        
        function renderPage() { const container = document.getElementById('courseContent'); if (!courseData) return; const progress = calculateProgress(); container.innerHTML = `<div class="course-header"><h1>${escapeHtml(courseData.name)}</h1><p>${escapeHtml(courseData.description || '')}</p><div class="stats-grid"><div class="stat-card"><div class="stat-number">${courseUnits.length}</div><div class="stat-label">Lessons</div></div><div class="stat-card"><div class="stat-number">${completedUnitIds.size}</div><div class="stat-label">Completed</div></div><div class="stat-card"><div class="stat-number">${progress}%</div><div class="stat-label">Progress</div></div></div>${!isEnrolled ? `<button class="enroll-btn" onclick="enroll()"><i class="fas fa-graduation-cap"></i> Enroll Now</button>` : ''}</div>${isEnrolled ? `<div class="progress-section"><h3>Your Progress</h3><div class="progress-bar-container"><div class="progress-fill" style="width:${progress}%"></div></div><p>${completedUnitIds.size} of ${courseUnits.length} lessons completed</p></div><h3>Course Lessons</h3><div class="units-grid">${courseUnits.map(unit => `<div class="unit-card" onclick="viewUnit(${unit.id})"><div class="unit-number">Lesson ${unit.order_number || unit.id}</div><div class="unit-title">${escapeHtml(unit.title)}</div><div class="unit-status ${completedUnitIds.has(unit.id) ? 'completed' : ''}">${completedUnitIds.has(unit.id) ? '<i class="fas fa-check-circle"></i> Completed' : '<i class="fas fa-clock"></i> Not started'}</div></div>`).join('')}</div>` : ''}`; }
        
        async function init() { if (!window.MEIDrive) { setTimeout(init, 500); return; } await loadUser(); await loadCourse(); if (courseData) { await loadUnits(); await loadEnrollments(); await loadProgress(); renderPage(); } }
        init();
    </script>
</body>
</html>

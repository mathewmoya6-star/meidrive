<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #041B3D;
            --secondary: #0A234F;
            --accent: #00FF88;
            --white: #ffffff;
            --gray: #B7C4D6;
            --danger: #ff4d4d;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #041B3D, #0A234F);
        }
        
        .register-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .logo { font-size: 48px; text-align: center; margin-bottom: 20px; }
        h2 { color: #041B3D; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #00FF88;
        }
        
        .password-requirements {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .password-requirements.valid { color: #27ae60; }
        .password-requirements.invalid { color: #e74c3c; }
        
        button {
            width: 100%;
            padding: 14px;
            background: #00FF88;
            color: #041B3D;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            margin-top: 10px;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .error {
            color: #e74c3c;
            background: #fde8e8;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .success {
            color: #27ae60;
            background: #e8f8f0;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        
        .login-link { text-align: center; margin-top: 20px; color: #666; }
        .login-link a { color: #00FF88; text-decoration: none; font-weight: bold; }
        .back-home { text-align: center; margin-top: 15px; display: block; color: #666; text-decoration: none; font-size: 14px; }
        .back-home:hover { color: #00FF88; }
        
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #041B3D;
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .terms {
            text-align: center;
            font-size: 12px;
            color: #888;
            margin-top: 20px;
        }
        .terms a { color: #00FF88; text-decoration: none; }
    </style>
</head>
<body>

<div class="register-container">
    <div class="logo">🚗</div>
    <h2>MEI DRIVE AFRICA</h2>
    <p class="subtitle">Create your account to start learning</p>
    
    <div id="errorBox" class="error"></div>
    <div id="successBox" class="success"></div>
    
    <form id="registerForm">
        <div class="input-group">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required autocomplete="name">
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
            <div class="password-requirements" id="passwordHelp">
                <i class="fas fa-info-circle"></i> Min 6 characters
            </div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-check-circle"></i> Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required autocomplete="off">
        </div>
        
        <button type="submit" id="registerBtn">Create Account</button>
    </form>
    
    <div class="login-link">
        Already have an account? <a href="/login.html">Login here</a>
    </div>
    
    <div class="terms">
        By registering, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
    </div>
    
    <a href="/" class="back-home"><i class="fas fa-arrow-left"></i> Back to Home</a>
</div>

<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const form = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const fullNameInput = document.getElementById('fullName');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const errorBox = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');
    const passwordHelp = document.getElementById('passwordHelp');
    
    function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = 'block';
        successBox.style.display = 'none';
        setTimeout(() => errorBox.style.display = 'none', 5000);
    }
    
    function showSuccess(message) {
        successBox.textContent = message;
        successBox.style.display = 'block';
        errorBox.style.display = 'none';
    }
    
    function setLoading(state) {
        registerBtn.disabled = state;
        registerBtn.innerHTML = state ? '<span class="loader"></span>Creating account...' : 'Create Account';
    }
    
    function isValidEmail(email) {
        const re = /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/;
        return re.test(String(email).toLowerCase());
    }
    
    function updatePasswordStrength() {
        const password = passwordInput.value;
        if (password.length >= 6) {
            passwordHelp.innerHTML = '<i class="fas fa-check-circle"></i> Password meets requirements';
            passwordHelp.className = 'password-requirements valid';
        } else if (password.length > 0) {
            passwordHelp.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Password must be at least 6 characters';
            passwordHelp.className = 'password-requirements invalid';
        } else {
            passwordHelp.innerHTML = '<i class="fas fa-info-circle"></i> Min 6 characters';
            passwordHelp.className = 'password-requirements';
        }
    }
    
    function doPasswordsMatch() {
        return passwordInput.value === confirmPasswordInput.value;
    }
    
    passwordInput.addEventListener('input', updatePasswordStrength);
    confirmPasswordInput.addEventListener('input', () => {
        if (confirmPasswordInput.value.length > 0 && !doPasswordsMatch()) {
            confirmPasswordInput.style.borderColor = '#e74c3c';
        } else {
            confirmPasswordInput.style.borderColor = '#27ae60';
        }
    });
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const fullName = fullNameInput.value.trim();
        const email = emailInput.value.trim();
        const password = passwordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        
        if (!fullName || !email || !password || !confirmPassword) {
            return showError('Please fill in all fields');
        }
        
        if (fullName.length < 2) {
            return showError('Please enter your full name');
        }
        
        if (!isValidEmail(email)) {
            return showError('Please enter a valid email address');
        }
        
        if (password.length < 6) {
            return showError('Password must be at least 6 characters');
        }
        
        if (password !== confirmPassword) {
            return showError('Passwords do not match');
        }
        
        setLoading(true);
        errorBox.style.display = 'none';
        successBox.style.display = 'none';
        
        try {
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        full_name: fullName,
                        role: 'learner'
                    }
                }
            });
            
            if (error) {
                setLoading(false);
                if (error.message.includes('User already registered')) {
                    return showError('This email is already registered. Please login instead.');
                }
                return showError(error.message);
            }
            
            if (data.user) {
                showSuccess('Account created successfully! Redirecting to login...');
                form.reset();
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
            }
            
        } catch (err) {
            console.error('Registration error:', err);
            showError('Network error. Please check your connection.');
            setLoading(false);
        }
    });
    
    async function testConnection() {
        const { error } = await supabase.from('courses').select('id').limit(1);
        if (error) {
            console.warn('Connection test:', error.message);
        } else {
            console.log('✅ Supabase connection OK');
        }
    }
    
    async function checkExistingSession() {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            window.location.href = '/dashboard.html';
        }
    }
    
    testConnection();
    checkExistingSession();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MEI DRIVE AFRICA | Driver Training</title>
    <meta name="description" content="NTSA-approved driver training platform">
    <meta name="theme-color" content="#0a192f">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a192f; color: #ffffff; line-height: 1.5; }
        :root { --primary: #00ff88; --border: rgba(0,255,136,0.25); --text-muted: #a0b3d9; }
        
        .navbar { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,25,47,0.98); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 1000; padding: 0.8rem 2rem; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #00ff88, #00cc66); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links button { background: transparent; border: none; color: #a0b3d9; padding: 8px 14px; border-radius: 50px; cursor: pointer; transition: 0.2s; }
        .nav-links button:hover { background: rgba(0,255,136,0.1); color: var(--primary); }
        .btn { padding: 12px 28px; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: linear-gradient(135deg, #00ff88, #00cc66); color: #0a192f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,255,136,0.3); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: rgba(0,255,136,0.1); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.8rem; margin: 2rem 0; }
        .card { background: #0d2137; border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; transition: 0.2s; cursor: pointer; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .hero { text-align: center; padding: 120px 20px 60px; background: linear-gradient(135deg, rgba(10,25,47,0.95), rgba(13,33,55,0.85)); margin-bottom: 2rem; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; }
        .hero h1 span { color: var(--primary); }
        .course-price { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin: 0.5rem 0; }
        .progress-bar { background: #1e2a3a; border-radius: 10px; height: 6px; margin: 12px 0; }
        .progress-fill { background: var(--primary); height: 6px; border-radius: 10px; width: 0%; }
        .quiz-option { background: #112240; padding: 12px 16px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
        .quiz-option:hover { border-color: var(--primary); background: rgba(0,255,136,0.1); }
        .quiz-option.correct { background: rgba(0,255,136,0.2); border-color: #00ff88; }
        .quiz-option.wrong { background: rgba(255,71,87,0.2); border-color: #ff4757; }
        .lesson-content { line-height: 1.8; padding: 1rem 0; }
        .lesson-content h1, .lesson-content h2, .lesson-content h3 { color: var(--primary); margin: 1rem 0 0.5rem; }
        .lesson-content ul, .lesson-content ol { margin-left: 1.5rem; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #1e2a3a; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1100; }
        .toast { background: #0d2137; border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); margin-top: 2rem; }
        .stats-bar { background: #0d2137; padding: 2rem; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 2rem; text-align: center; border-bottom: 1px solid var(--border); }
        .stat-item h3 { font-size: 2rem; color: var(--primary); }
        .section-title { text-align: center; font-size: 2rem; margin: 2rem 0; }
        .section-title span { color: var(--primary); }
        .lesson-nav { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; flex-wrap: wrap; }
        .quiz-feedback { margin-top: 1rem; padding: 12px; border-radius: 12px; }
        .user-badge { background: rgba(0,255,136,0.15); border-radius: 40px; padding: 6px 16px; display: inline-flex; align-items: center; gap: 8px; }
        .mobile-menu { display: none; font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        .enrolled-badge { display: inline-block; background: rgba(0,255,136,0.2); color: var(--primary); font-size: 0.75rem; padding: 4px 10px; border-radius: 50px; margin-left: 8px; }
        
        @media (max-width: 768px) { 
            .hero h1 { font-size: 2rem; } 
            .nav-links { display: none; width: 100%; flex-direction: column; padding: 1rem 0; } 
            .nav-links.show { display: flex; } 
            .mobile-menu { display: block; } 
            .grid { grid-template-columns: 1fr; }
        }
        
        button:disabled, .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
<div id="app">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="navigateTo('home')">MEI DRIVE AFRICA</div>
            <div class="mobile-menu" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></div>
            <div class="nav-links" id="navLinks">
                <button onclick="navigateTo('home')">🏠 Home</button>
                <button onclick="navigateTo('courses')">📚 Courses</button>
                <button onclick="navigateTo('quiz')">📝 Quiz</button>
                <div id="authButtons"></div>
            </div>
        </div>
    </nav>
    <main id="page-content"><div class="loading-spinner"></div></main>
    <footer>© 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training</footer>
</div>
<div id="toast-container"></div>

<script>
    // YOUR CORRECT SUPABASE CREDENTIALS
    const SUPABASE_URL = 'https://qpqkmmkrzxlhcpccefjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s';
    
    let supabase;
    let currentUser = null;
    let currentPage = 'home';
    let courses = [];
    let lessons = [];
    let questions = [];
    let userProgress = {};
    let userEnrollments = {};
    let currentCourseId = null;
    let currentLessonIndex = 0;
    let currentCourseLessons = [];
    
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function toggleMobileMenu() { document.getElementById('navLinks')?.classList.toggle('show'); }
    
    async function loadCourses() { 
        try {
            const { data, error } = await supabase.from('courses').select('*');
            if (error) throw error;
            courses = data || [];
            console.log('✅ Courses loaded:', courses.length);
        } catch (err) {
            console.error('Error loading courses:', err);
            showToast('Database connection issue. Please run SQL setup.', 'error');
        }
    }
    
    async function loadLessons() { 
        const { data, error } = await supabase.from('lessons').select('*');
        if (!error) lessons = data || [];
    }
    
    async function loadQuestions() { 
        const { data, error } = await supabase.from('questions').select('*');
        if (!error && data && data.length) questions = data;
        else {
            questions = [
                { id: 1, question_text: "What does a solid white line on the road mean?", option_a: "You may overtake if safe", option_b: "No overtaking allowed", option_c: "Parking allowed", option_d: "Slow down only", correct_option: "b", explanation: "A solid white line indicates that overtaking is prohibited." },
                { id: 2, question_text: "What is the legal blood alcohol limit for professional drivers in Kenya?", option_a: "0.00%", option_b: "0.05%", option_c: "0.08%", option_d: "0.10%", correct_option: "a", explanation: "Professional drivers must have zero alcohol in their system." },
                { id: 3, question_text: "When approaching a yellow traffic light, you should:", option_a: "Speed up to beat the light", option_b: "Stop if safe to do so", option_c: "Honk and proceed", option_d: "Ignore it", correct_option: "b", explanation: "Yellow means prepare to stop, not speed up." },
                { id: 4, question_text: "What does a Stop sign mean?", option_a: "Yield to pedestrians", option_b: "Come to a complete stop", option_c: "Slow down only", option_d: "No entry", correct_option: "b", explanation: "A stop sign requires a complete stop." }
            ];
        }
    }
    
    async function loadUserProgress() {
        if (!currentUser) return;
        const { data } = await supabase.from('user_progress').select('lesson_id, progress_percentage').eq('user_id', currentUser.id);
        if (data) { userProgress = {}; data.forEach(p => { userProgress[p.lesson_id] = p.progress_percentage; }); }
        const { data: enrollData } = await supabase.from('user_enrollments').select('course_id').eq('user_id', currentUser.id);
        if (enrollData) { userEnrollments = {}; enrollData.forEach(e => { userEnrollments[e.course_id] = true; }); }
    }
    
    async function init() {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const { data: { session } } = await supabase.auth.getSession();
        currentUser = session?.user || null;
        updateAuthUI();
        await Promise.all([loadCourses(), loadLessons(), loadQuestions()]);
        await loadUserProgress();
        renderPage();
        if (courses.length > 0) showToast(`✅ Connected! ${courses.length} courses loaded`, 'success');
    }
    
    function updateAuthUI() {
        const container = document.getElementById('authButtons');
        if (!container) return;
        if (currentUser) {
            container.innerHTML = `<div class="user-badge"><i class="fas fa-user"></i> ${currentUser.email.split('@')[0]}</div><button onclick="logout()" style="margin-left:8px;">Logout</button>`;
        } else {
            container.innerHTML = `<button onclick="showLoginModal()">Login</button><button onclick="showSignupModal()">Sign Up</button>`;
        }
    }
    
    async function logout() { await supabase.auth.signOut(); currentUser = null; updateAuthUI(); renderPage(); showToast('Logged out', 'info'); }
    
    function showLoginModal() {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="max-width:450px; margin:100px auto;">
                <div class="card"><h2>🔐 Login</h2>
                <input type="email" id="loginEmail" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; background:#0f1a2c; border:1px solid var(--border); border-radius:12px; color:white;">
                <input type="password" id="loginPassword" placeholder="Password" style="width:100%; padding:12px; margin:10px 0; background:#0f1a2c; border:1px solid var(--border); border-radius:12px; color:white;">
                <button class="btn btn-primary" style="width:100%" onclick="performLogin()">Login</button>
                <p style="margin-top:1rem;">No account? <span style="color:var(--primary);cursor:pointer;" onclick="showSignupModal()">Sign up</span></p>
                <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="renderPage()">Cancel</button></div></div>`;
    }
    
    function showSignupModal() {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="max-width:450px; margin:100px auto;">
                <div class="card"><h2>📝 Sign Up</h2>
                <input type="text" id="signupName" placeholder="Full Name" style="width:100%; padding:12px; margin:10px 0; background:#0f1a2c; border:1px solid var(--border); border-radius:12px; color:white;">
                <input type="email" id="signupEmail" placeholder="Email" style="width:100%; padding:12px; margin:10px 0; background:#0f1a2c; border:1px solid var(--border); border-radius:12px; color:white;">
                <input type="password" id="signupPassword" placeholder="Password (min 6)" style="width:100%; padding:12px; margin:10px 0; background:#0f1a2c; border:1px solid var(--border); border-radius:12px; color:white;">
                <button class="btn btn-primary" style="width:100%" onclick="performSignup()">Create Account</button>
                <p style="margin-top:1rem;">Have an account? <span style="color:var(--primary);cursor:pointer;" onclick="showLoginModal()">Login</span></p>
                <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="renderPage()">Cancel</button></div></div>`;
    }
    
    async function performLogin() {
        const email = document.getElementById('loginEmail')?.value;
        const password = document.getElementById('loginPassword')?.value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) showToast(error.message, 'error');
        else { showToast('Logged in!', 'success'); await init(); }
    }
    
    async function performSignup() {
        const email = document.getElementById('signupEmail')?.value;
        const password = document.getElementById('signupPassword')?.value;
        const fullName = document.getElementById('signupName')?.value;
        const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
        if (error) showToast(error.message, 'error');
        else { showToast('Account created! Please verify email.', 'success'); renderPage(); }
    }
    
    function formatContent(content) {
        if (!content) return '<p>Content coming soon...</p>';
        let html = content;
        html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/^- (.*$)/gm, '<li>$1</li>');
        html = html.replace(/<li>.*?<\/li>/gs, match => `<ul>${match}</ul>`);
        html = html.replace(/^(?!<[hl]|<ul|<li)(.*$)/gm, '<p>$1</p>');
        return html.replace(/<p>\s*<\/p>/g, '');
    }
    
    function renderCourseCard(c) {
        const isEnrolled = userEnrollments[c.id];
        return `<div class="card" onclick="viewCourse(${c.id})"><i class="fas ${c.icon || 'fa-book'}" style="font-size:2rem; color:var(--primary);"></i><h3>${escapeHtml(c.name)}${isEnrolled ? '<span class="enrolled-badge"><i class="fas fa-check-circle"></i> Enrolled</span>' : ''}</h3><p>${escapeHtml(c.description || '')}</p><div class="course-price">${c.price === 0 ? 'FREE' : `KES ${c.price.toLocaleString()}`}</div><button class="btn btn-primary">${isEnrolled ? 'Continue Learning' : 'Enroll Now'}</button></div>`;
    }
    
    function renderHome() {
        document.getElementById('page-content').innerHTML = `
            <div class="hero"><h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1>
            <p>NTSA-approved courses for Learner, EV, Boda Boda, PSV, and more.</p>
            <button class="btn btn-primary" onclick="navigateTo('courses')">🚀 Explore Courses</button></div>
            <div class="stats-bar"><div class="stat-item"><h3>${courses.length}</h3><p>Courses</p></div><div class="stat-item"><h3>${lessons.length}</h3><p>Lessons</p></div><div class="stat-item"><h3>${questions.length}</h3><p>Questions</p></div></div>
            <div class="container"><h2 class="section-title">Our <span>Courses</span></h2><div class="grid" id="homeGrid"></div></div>`;
        const grid = document.getElementById('homeGrid');
        if (grid && courses.length) grid.innerHTML = courses.slice(0, 3).map(c => renderCourseCard(c)).join('');
    }
    
    function renderCourses() {
        document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><h1 class="section-title">All <span>Courses</span></h1><div class="grid" id="coursesGrid"></div></div>`;
        const grid = document.getElementById('coursesGrid');
        if (grid && courses.length) grid.innerHTML = courses.map(c => renderCourseCard(c)).join('');
    }
    
    function viewCourse(courseId) {
        const course = courses.find(c => c.id === courseId);
        const isEnrolled = userEnrollments[courseId] || course?.price === 0;
        if (!isEnrolled && course?.price > 0) {
            document.getElementById('page-content').innerHTML = `
                <div class="container" style="padding-top:100px; max-width:600px;">
                    <div class="card" style="text-align:center;">
                        <i class="fas fa-lock" style="font-size:3rem; color:var(--primary); margin-bottom:1rem;"></i>
                        <h2>${escapeHtml(course.name)}</h2>
                        <p>${escapeHtml(course.description || '')}</p>
                        <div class="course-price" style="font-size:2rem;">KES ${course.price.toLocaleString()}</div>
                        <button class="btn btn-primary" onclick="enrollFree(${courseId})">Enroll Now (Demo)</button>
                        <button class="btn btn-outline" style="margin-top:1rem;" onclick="navigateTo('courses')">← Back to Courses</button>
                    </div>
                </div>`;
            return;
        }
        const courseLessons = lessons.filter(l => l.course_id === courseId).sort((a,b) => a.order - b.order);
        const completedCount = courseLessons.filter(l => userProgress[l.id] === 100).length;
        const progressPercent = courseLessons.length ? Math.round((completedCount / courseLessons.length) * 100) : 0;
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top:100px;">
                <div style="background:linear-gradient(135deg,rgba(0,255,136,0.1),#0d2137); border-radius:20px; padding:2rem; margin-bottom:2rem;">
                    <h1>${escapeHtml(course.name)}</h1>
                    <p>${escapeHtml(course.description || '')}</p>
                    ${progressPercent > 0 ? `<div class="progress-bar"><div class="progress-fill" style="width:${progressPercent}%"></div><p style="margin-top:5px;">${progressPercent}% Complete</p></div>` : ''}
                </div>
                <div class="card"><h3>📖 Course Modules (${courseLessons.length} lessons)</h3>
                ${courseLessons.length ? `<div class="grid">${courseLessons.map((l, idx) => `<div class="card" onclick="startLesson(${courseId}, ${l.id}, ${idx})"><h4>${idx+1}. ${escapeHtml(l.title)}</h4>${userProgress[l.id] === 100 ? '<span style="color:#00ff88; font-size:0.8rem;">✓ Completed</span>' : ''}<div class="progress-bar"><div class="progress-fill" style="width:${userProgress[l.id] || 0}%"></div></div><button class="btn btn-outline btn-sm">${userProgress[l.id] === 100 ? 'Review' : 'Start'}</button></div>`).join('')}</div>` : '<p>No lessons available yet.</p>'}
                <button class="btn btn-outline" style="margin-top:1rem;" onclick="navigateTo('courses')">← Back to Courses</button></div>
            </div>`;
    }
    
    async function enrollFree(courseId) {
        if (!currentUser) {
            showToast('Please login first to enroll', 'warning');
            showLoginModal();
            return;
        }
        const { error } = await supabase.from('user_enrollments').upsert({
            user_id: currentUser.id,
            course_id: courseId,
            payment_status: 'completed',
            amount_paid: 0,
            paid_at: new Date()
        });
        if (!error) {
            userEnrollments[courseId] = true;
            showToast('✅ Enrolled successfully!', 'success');
            viewCourse(courseId);
        } else {
            showToast('Enrollment failed. Please try again.', 'error');
        }
    }
    
    function startLesson(courseId, lessonId, lessonIndex) {
        const isEnrolled = userEnrollments[courseId] || courses.find(c => c.id === courseId)?.price === 0;
        if (!isEnrolled) { showToast('Please enroll in this course first', 'warning'); viewCourse(courseId); return; }
        currentCourseId = courseId;
        currentLessonIndex = lessonIndex;
        currentCourseLessons = lessons.filter(l => l.course_id === courseId).sort((a,b) => a.order - b.order);
        renderLessonPage();
    }
    
    function renderLessonPage() {
        const lesson = currentCourseLessons[currentLessonIndex];
        if (!lesson) return;
        const progress = userProgress[lesson.id] || 0;
        const totalLessons = currentCourseLessons.length;
        const isLast = currentLessonIndex === totalLessons - 1;
        const isFirst = currentLessonIndex === 0;
        const formattedContent = formatContent(lesson.content || 'Content coming soon...');
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top:100px; max-width:900px;">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:1rem;">
                        <h2>${escapeHtml(lesson.title)}</h2>
                        <span style="background:var(--primary); color:#0a192f; padding:4px 12px; border-radius:50px;">Lesson ${currentLessonIndex+1} of ${totalLessons}</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                    <div class="lesson-content">${formattedContent}</div>
                    <div class="lesson-nav">
                        <button class="btn btn-outline" onclick="previousLesson()" ${isFirst ? 'disabled' : ''}>◀ Previous</button>
                        <button class="btn btn-primary" onclick="markAndContinue()">✓ Mark Complete & Continue</button>
                        <button class="btn btn-outline" onclick="nextLesson()" ${isLast ? 'disabled' : ''}>Next ▶</button>
                    </div>
                    <button class="btn btn-outline" style="margin-top:1rem;" onclick="viewCourse(${currentCourseId})">← Back to Course</button>
                </div>
            </div>`;
    }
    
    async function markAndContinue() {
        const lesson = currentCourseLessons[currentLessonIndex];
        if (!lesson) return;
        if (currentUser) {
            await supabase.from('user_progress').upsert({
                user_id: currentUser.id,
                lesson_id: lesson.id,
                progress_percentage: 100,
                last_accessed_at: new Date()
            });
            userProgress[lesson.id] = 100;
        }
        if (currentLessonIndex < currentCourseLessons.length - 1) {
            currentLessonIndex++;
            renderLessonPage();
            showToast('Lesson completed! Moving to next lesson...', 'success');
        } else {
            showToast('🎉 Congratulations! You have completed all lessons!', 'success');
            viewCourse(currentCourseId);
        }
    }
    
    function nextLesson() { if (currentLessonIndex < currentCourseLessons.length - 1) { currentLessonIndex++; renderLessonPage(); } }
    function previousLesson() { if (currentLessonIndex > 0) { currentLessonIndex--; renderLessonPage(); } }
    
    let quizState = { currentIndex: 0, score: 0, userAnswers: [], questionsList: [] };
    
    function renderQuiz() {
        if (!questions.length) {
            document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><div class="card"><h2>📝 No Questions Available</h2><button class="btn btn-primary" onclick="navigateTo('home')">Back to Home</button></div></div>`;
            return;
        }
        quizState = { currentIndex: 0, score: 0, userAnswers: [], questionsList: [...questions] };
        renderQuizQuestion();
    }
    
    function renderQuizQuestion() {
        if (quizState.currentIndex >= quizState.questionsList.length) {
            const percent = Math.round((quizState.score / quizState.questionsList.length) * 100);
            document.getElementById('page-content').innerHTML = `
                <div class="container" style="padding-top:100px; max-width:800px;">
                    <div class="card" style="text-align:center;">
                        <h2>🎉 Quiz Complete!</h2>
                        <div style="font-size:3rem; margin:1rem 0;">${percent >= 70 ? '🏆' : '📚'}</div>
                        <p style="font-size:1.2rem;">Your score: <strong>${quizState.score}</strong> / ${quizState.questionsList.length} (${percent}%)</p>
                        <div class="progress-bar" style="margin:1rem 0;"><div class="progress-fill" style="width:${percent}%;"></div></div>
                        <div style="display:flex; gap:1rem; justify-content:center; margin-top:2rem;">
                            <button class="btn btn-primary" onclick="renderQuiz()">🔄 Restart Quiz</button>
                            <button class="btn btn-outline" onclick="navigateTo('home')">🏠 Go Home</button>
                        </div>
                    </div>
                </div>`;
            return;
        }
        const q = quizState.questionsList[quizState.currentIndex];
        const options = [q.option_a, q.option_b, q.option_c, q.option_d];
        const hasAnswered = quizState.userAnswers[quizState.currentIndex] !== undefined;
        const correctIndex = q.correct_option === 'a' ? 0 : q.correct_option === 'b' ? 1 : q.correct_option === 'c' ? 2 : 3;
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top:100px; max-width:800px;">
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h2>📝 NTSA Practice Exam</h2>
                        <span style="background:var(--primary); color:#0a192f; padding:4px 12px; border-radius:50px;">Question ${quizState.currentIndex+1}/${quizState.questionsList.length}</span>
                    </div>
                    <div class="quiz-question"><strong>${escapeHtml(q.question_text)}</strong></div>
                    <div class="quiz-options" id="quizOptions">
                        ${options.map((opt, idx) => {
                            const letter = String.fromCharCode(65+idx);
                            const isSelected = hasAnswered && quizState.userAnswers[quizState.currentIndex] === idx;
                            let additionalClass = '';
                            if (hasAnswered) {
                                if (idx === correctIndex) additionalClass = 'correct';
                                else if (isSelected && idx !== correctIndex) additionalClass = 'wrong';
                            }
                            return `<div class="quiz-option ${additionalClass}" data-idx="${idx}" onclick="if(!window.hasAnswered) submitQuizAnswer(${idx})">${letter}. ${escapeHtml(opt)}</div>`;
                        }).join('')}
                    </div>
                    <div id="quizFeedback" class="quiz-feedback">
                        ${hasAnswered ? `
                            <div style="background:${quizState.userAnswers[quizState.currentIndex] === correctIndex ? 'rgba(0,255,136,0.1)' : 'rgba(255,71,87,0.1)'}; padding:1rem; border-radius:12px;">
                                <strong>${quizState.userAnswers[quizState.currentIndex] === correctIndex ? '✓ Correct!' : '✗ Incorrect'}</strong>
                                <p style="margin-top:0.5rem;">${escapeHtml(q.explanation || 'No explanation provided.')}</p>
                                <button class="btn btn-primary" style="margin-top:1rem;" onclick="nextQuizQuestion()">Next Question →</button>
                            </div>
                        ` : ''}
                    </div>
                    ${!hasAnswered ? '<p style="margin-top:1rem; color:var(--text-muted);"><i class="fas fa-info-circle"></i> Click on an option to answer</p>' : ''}
                </div>
            </div>`;
        window.hasAnswered = hasAnswered;
    }
    
    window.submitQuizAnswer = (selectedIdx) => {
        if (quizState.userAnswers[quizState.currentIndex] !== undefined) return;
        const q = quizState.questionsList[quizState.currentIndex];
        const correctIndex = q.correct_option === 'a' ? 0 : q.correct_option === 'b' ? 1 : q.correct_option === 'c' ? 2 : 3;
        if (selectedIdx === correctIndex) quizState.score++;
        quizState.userAnswers[quizState.currentIndex] = selectedIdx;
        renderQuizQuestion();
    };
    window.nextQuizQuestion = () => { quizState.currentIndex++; renderQuizQuestion(); };
    
    async function renderPage() {
        const container = document.getElementById('page-content');
        container.innerHTML = '<div class="loading-spinner"></div>';
        await loadCourses();
        await loadLessons();
        await loadQuestions();
        await loadUserProgress();
        if (currentPage === 'home') renderHome();
        else if (currentPage === 'courses') renderCourses();
        else if (currentPage === 'quiz') renderQuiz();
        else renderHome();
        if (window.innerWidth <= 768) document.getElementById('navLinks')?.classList.remove('show');
        window.scrollTo({ top: 0 });
    }
    
    function navigateTo(page) { currentPage = page; renderPage(); }
    
    window.navigateTo = navigateTo;
    window.viewCourse = viewCourse;
    window.startLesson = startLesson;
    window.renderQuiz = renderQuiz;
    window.submitQuizAnswer = submitQuizAnswer;
    window.nextQuizQuestion = nextQuizQuestion;
    window.previousLesson = previousLesson;
    window.nextLesson = nextLesson;
    window.markAndContinue = markAndContinue;
    window.showLoginModal = showLoginModal;
    window.showSignupModal = showSignupModal;
    window.performLogin = performLogin;
    window.performSignup = performSignup;
    window.logout = logout;
    window.enrollFree = enrollFree;
    
    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learner Hub | MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #041B3D;
            color: #fff;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(4, 27, 61, 0.96);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 136, 0.15);
            padding: 1rem 2rem;
            z-index: 1000;
        }
        .nav-container {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #00FF88;
            cursor: pointer;
        }
        .logo span { color: #fff; }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        .nav-links a {
            color: #fff;
            text-decoration: none;
            transition: all 0.3s;
        }
        .nav-links a:hover { color: #00FF88; }
        .logout-btn {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4d4f;
            color: #ff4d4f;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .logout-btn:hover { background: #ff4d4f; color: #fff; }

        .main {
            padding-top: 80px;
            padding-bottom: 40px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .course-header {
            background: linear-gradient(135deg, #0A234F, #041B3D);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .course-header h1 {
            color: #00FF88;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .progress-bar-container {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            height: 10px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar {
            background: #00FF88;
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
        }
        .progress-text {
            color: #B7C4D6;
            font-size: 0.9rem;
        }

        .units-container {
            background: #0A234F;
            border-radius: 16px;
            padding: 20px;
        }
        .units-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #00FF88;
        }
        .unit-card {
            background: rgba(4, 27, 61, 0.8);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
            border: 1px solid rgba(0, 255, 136, 0.1);
        }
        .unit-card:hover {
            border-color: #00FF88;
            transform: translateX(5px);
        }
        .unit-info {
            flex: 1;
        }
        .unit-number {
            font-size: 0.8rem;
            color: #00FF88;
            margin-bottom: 5px;
        }
        .unit-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .unit-description {
            font-size: 0.8rem;
            color: #B7C4D6;
        }
        .unit-status {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .unit-status i {
            font-size: 1.2rem;
        }
        .completed-icon {
            color: #00FF88;
        }
        .locked-icon {
            color: #ff4d4f;
        }
        .btn-view-unit {
            background: #00FF88;
            color: #041B3D;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-view-unit:hover {
            transform: translateY(-2px);
        }
        .btn-view-unit:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .loading-spinner {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 136, 0.3);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0A234F;
            border-left: 4px solid #00FF88;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
        }
        .toast.error { border-left-color: #ff4d4f; }

        footer {
            background: #0A234F;
            text-align: center;
            padding: 30px;
            color: #B7C4D6;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .unit-card {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            .unit-status {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo" onclick="location.href='/'">MEI DRIVE <span>AFRICA</span></div>
        <div class="nav-links">
            <a href="/dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
            <button class="logout-btn" id="logoutButton"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
</nav>

<div class="main">
    <div class="container">
        <div class="course-header">
            <h1><i class="fas fa-car"></i> Learner Hub</h1>
            <p>Complete training for new drivers - from basics to road readiness</p>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="progress-text" id="progressText">0% Complete</div>
        </div>

        <div class="units-container">
            <div class="units-title"><i class="fas fa-book"></i> Course Units</div>
            <div id="unitsContainer">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading units...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 MEI DRIVE AFRICA | NTSA Approved Driver Training</p>
</footer>

<script>
    const SUPABASE_URL = 'https://jeksrwrzzrczamxijvwl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impla3Nyd3J6enJjemFteGlqdndsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NzYyMjAsImV4cCI6MjA5NDI1MjIyMH0.1poYpJKNFEVe2NTBkXBTH2bIHGk2yT8aqCU-OlJc4vs';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let currentUser = null;
    let units = [];
    let completedUnits = new Set();
    let currentCourseId = 1; // Learner Hub course ID
    
    async function checkAuth() {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.href = '/login.html';
            return false;
        }
        currentUser = session.user;
        return true;
    }
    
    async function loadUnits() {
        const container = document.getElementById('unitsContainer');
        
        try {
            console.log('Fetching units from Supabase...');
            
            // First, try to get units from database
            let { data: dbUnits, error } = await supabase
                .from('course_units')
                .select('*')
                .eq('course_id', currentCourseId)
                .order('unit_number', { ascending: true });
            
            // If no units in database, use mock data
            if (error || !dbUnits || dbUnits.length === 0) {
                console.log('Using mock units data');
                units = [
                    { id: 1, unit_number: 1, title: 'Introduction to Driving', description: 'Basic vehicle controls, cockpit drill, and safety checks', content: 'unit1.html' },
                    { id: 2, unit_number: 2, title: 'Road Signs & Rules', description: 'Understanding Kenyan road signs, traffic rules, and right of way', content: 'unit2.html' },
                    { id: 3, unit_number: 3, title: 'Basic Maneuvers', description: 'Steering, clutch control, gear changes, and braking', content: 'unit3.html' },
                    { id: 4, unit_number: 4, title: 'Parking Techniques', description: 'Parallel parking, reverse parking, and bay parking', content: 'unit4.html' },
                    { id: 5, unit_number: 5, title: 'Roundabouts & Junctions', description: 'Navigating roundabouts and junctions safely', content: 'unit5.html' },
                    { id: 6, unit_number: 6, title: 'Highway Driving', description: 'Motorway and highway driving techniques', content: 'unit6.html' },
                    { id: 7, unit_number: 7, title: 'Defensive Driving', description: 'Anticipating hazards and staying safe', content: 'unit7.html' },
                    { id: 8, unit_number: 8, title: 'NTSA Final Assessment', description: 'Prepare for your driving test', content: 'unit8.html' }
                ];
            } else {
                units = dbUnits;
            }
            
            // Get user progress
            const { data: progress } = await supabase
                .from('user_progress')
                .select('unit_id, completed')
                .eq('user_id', currentUser?.id)
                .eq('course_id', currentCourseId);
            
            if (progress && progress.length) {
                progress.forEach(p => {
                    if (p.completed) completedUnits.add(p.unit_id);
                });
            }
            
            renderUnits();
            updateProgress();
            
        } catch (err) {
            console.error('Error loading units:', err);
            container.innerHTML = `
                <div style="text-align:center; padding:40px; color:#ff4d4f;">
                    <i class="fas fa-exclamation-circle"></i> Error loading units
                    <button onclick="location.reload()" style="display:block; margin:20px auto; padding:10px 20px; background:#00FF88; border:none; border-radius:8px; cursor:pointer;">Retry</button>
                </div>
            `;
        }
    }
    
    function renderUnits() {
        const container = document.getElementById('unitsContainer');
        
        if (!units.length) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">No units available yet.</div>';
            return;
        }
        
        container.innerHTML = '';
        
        units.forEach((unit, index) => {
            const isCompleted = completedUnits.has(unit.id);
            const isLocked = index > 0 && !completedUnits.has(units[index - 1]?.id) && index > 0;
            
            const card = document.createElement('div');
            card.className = 'unit-card';
            card.innerHTML = `
                <div class="unit-info">
                    <div class="unit-number">Unit ${unit.unit_number}</div>
                    <div class="unit-title">${escapeHtml(unit.title)}</div>
                    <div class="unit-description">${escapeHtml(unit.description)}</div>
                </div>
                <div class="unit-status">
                    ${isCompleted ? '<i class="fas fa-check-circle completed-icon"></i>' : (isLocked ? '<i class="fas fa-lock locked-icon"></i>' : '')}
                    <button class="btn-view-unit" data-unit-id="${unit.id}" data-unit-number="${unit.unit_number}" ${isLocked ? 'disabled' : ''}>
                        ${isCompleted ? 'Review' : (isLocked ? 'Locked' : 'Start')}
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
        
        // Add event listeners to buttons
        document.querySelectorAll('.btn-view-unit').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const unitId = parseInt(btn.dataset.unitId);
                const unitNumber = btn.dataset.unitNumber;
                await startUnit(unitId, unitNumber);
            });
        });
    }
    
    async function startUnit(unitId, unitNumber) {
        try {
            // Mark as started in progress
            const { error } = await supabase
                .from('user_progress')
                .upsert({
                    user_id: currentUser.id,
                    course_id: currentCourseId,
                    unit_id: unitId,
                    overall_progress: Math.floor((unitNumber / units.length) * 100),
                    updated_at: new Date()
                });
            
            if (error) console.error('Progress update error:', error);
            
            // Show unit content (you can expand this to show actual content)
            showToast(`Opening Unit ${unitNumber}...`, 'success');
            
            // For now, just mark as completed (in production, you'd show the actual content)
            await markUnitCompleted(unitId);
            
        } catch (err) {
            console.error('Error starting unit:', err);
            showToast('Error loading unit content', 'error');
        }
    }
    
    async function markUnitCompleted(unitId) {
        try {
            const { error } = await supabase
                .from('user_progress')
                .upsert({
                    user_id: currentUser.id,
                    course_id: currentCourseId,
                    unit_id: unitId,
                    completed: true,
                    overall_progress: Math.floor((completedUnits.size + 1) / units.length * 100),
                    updated_at: new Date()
                });
            
            if (!error) {
                completedUnits.add(unitId);
                renderUnits();
                updateProgress();
                showToast('Unit completed! 🎉', 'success');
            }
        } catch (err) {
            console.error('Error marking unit completed:', err);
        }
    }
    
    function updateProgress() {
        const percentComplete = units.length > 0 ? Math.floor((completedUnits.size / units.length) * 100) : 0;
        document.getElementById('progressBar').style.width = `${percentComplete}%`;
        document.getElementById('progressText').textContent = `${percentComplete}% Complete`;
        
        // Update overall progress in database
        if (currentUser) {
            supabase
                .from('user_progress')
                .upsert({
                    user_id: currentUser.id,
                    course_id: currentCourseId,
                    overall_progress: percentComplete,
                    updated_at: new Date()
                });
        }
    }
    
    async function handleLogout() {
        await supabase.auth.signOut();
        window.location.href = '/';
    }
    
    function showToast(message, type = 'info') {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    document.getElementById('logoutButton').addEventListener('click', handleLogout);
    
    async function init() {
        const isAuthenticated = await checkAuth();
        if (!isAuthenticated) return;
        await loadUnits();
    }
    
    init();
</script>
</body>
</html>

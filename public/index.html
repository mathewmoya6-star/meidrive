    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a192f; color: #ffffff; line-height: 1.5; }
        :root {
            --primary: #00ff88;
            --primary-dark: #00cc66;
            --primary-light: #88ffcc;
            --gradient-green: linear-gradient(135deg, #00ff88 0%, #00cc66 100%);
            --dark-card: #0d2137;
            --border: rgba(0, 255, 136, 0.25);
            --text-muted: #a0b3d9;
            --success: #00ff88;
            --danger: #ff4757;
        }
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 25, 47, 0.96);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 0.8rem 2rem;
        }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.3rem; font-weight: 800; background: var(--gradient-green); -webkit-background-clip: text; background-clip: text; color: transparent; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .logo i { color: var(--primary); font-size: 1.5rem; }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links button { background: transparent; border: none; color: #a0b3d9; padding: 8px 14px; border-radius: 50px; cursor: pointer; font-size: 13px; font-weight: 500; transition: 0.2s; }
        .nav-links button:hover { background: rgba(0, 255, 136, 0.1); color: var(--primary); }
        .btn-primary-nav { background: var(--gradient-green); color: #0a192f !important; font-weight: 700; }
        .user-badge { background: rgba(0, 255, 136, 0.15); border-radius: 40px; padding: 6px 16px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
        .mobile-menu { display: none; font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        @media (max-width: 768px) { .navbar { padding: 0.8rem 1rem; } .nav-links { display: none; width: 100%; flex-direction: column; padding: 1rem 0; } .nav-links.show { display: flex; } .mobile-menu { display: block; } }
        .hero { min-height: 85vh; background: linear-gradient(135deg, rgba(10, 25, 47, 0.95) 0%, rgba(13, 33, 55, 0.85) 100%), url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 100px 2rem 4rem; }
        .hero-content { max-width: 1400px; margin: 0 auto; }
        .hero h1 { font-size: 3.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 1.5rem; }
        .hero h1 span { color: var(--primary); }
        .hero p { font-size: 1.1rem; color: var(--text-muted); max-width: 600px; margin-bottom: 2rem; }
        .btn { padding: 12px 28px; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; font-size: 1rem; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--gradient-green); color: #0a192f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 255, 136, 0.3); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: rgba(0, 255, 136, 0.1); }
        .stats-bar { background: #0d2137; border-bottom: 1px solid var(--border); padding: 2rem; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 2rem; text-align: center; }
        .stat-item h3 { font-size: 2rem; color: var(--primary); }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .section { padding: 4rem 0; }
        .section-title { text-align: center; font-size: 2.2rem; margin-bottom: 2.5rem; }
        .section-title span { color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.8rem; }
        .card { background: #0d2137; border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { border-color: var(--primary); transform: translateY(-4px); }
        .module-price { font-size: 1.5rem; font-weight: 800; color: var(--primary); margin: 0.8rem 0; }
        .progress-bar { background: #1e2a3a; border-radius: 10px; height: 6px; margin: 12px 0; }
        .progress-fill { background: var(--primary); height: 6px; border-radius: 10px; width: 0%; }
        .quiz-option { padding: 12px 16px; background: #112240; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border); transition: 0.2s; }
        .quiz-option:hover { border-color: var(--primary); background: rgba(0, 255, 136, 0.1); }
        .quiz-category-selector { margin-bottom: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .quiz-category-btn { background: #112240; border: 1px solid var(--border); border-radius: 50px; padding: 6px 14px; cursor: pointer; transition: 0.2s; color: #a0b3d9; }
        .quiz-category-btn.active, .quiz-category-btn:hover { background: var(--primary); color: #0a192f; border-color: var(--primary); }
        .search-input { background: #0f1a2c; border: 1px solid var(--border); padding: 10px 16px; border-radius: 50px; color: white; width: 100%; max-width: 300px; }
        .resource-tag { background: rgba(0, 255, 136, 0.2); padding: 4px 8px; border-radius: 20px; font-size: 0.7rem; display: inline-block; margin: 2px; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #1e2a3a; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2100; max-height: 300px; overflow-y: auto; }
        .toast { background: #0d2137; border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .toast-close { cursor: pointer; color: var(--text-muted); font-size: 14px; }
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.85rem; }
        @media (max-width: 768px) { .hero h1 { font-size: 2rem; } .grid { grid-template-columns: 1fr; } }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(12px); z-index: 2000; justify-content: center; align-items: center; }
        .modal.active { display: flex; }
        .modal-content { background: #0d2137; border: 1px solid var(--primary); border-radius: 24px; width: 90%; max-width: 500px; padding: 2rem; }
        input { background: #0f1a2c; border: 1px solid var(--border); padding: 12px; border-radius: 12px; color: white; width: 100%; margin: 8px 0; }
        .dashboard-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: #0d2137; padding: 1rem; border-radius: 16px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 800; color: var(--primary); }
        .lesson-nav { display: flex; justify-content: space-between; margin-top: 2rem; gap: 1rem; flex-wrap: wrap; }
    </style>
</head>
<body>
<div id="app">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="app.navigate('home')"><i class="fas fa-car"></i> MEI DRIVE AFRICA</div>
            <div class="mobile-menu" onclick="app.toggleMobileMenu()"><i class="fas fa-bars"></i></div>
            <div class="nav-links" id="navLinks">
                <button onclick="app.navigate('home')">🏠 Home</button>
                <button onclick="app.navigate('courses')">📚 Courses</button>
                <button onclick="app.navigate('quiz')">📝 Quiz</button>
                <button onclick="app.navigate('library')">📖 Safety Library</button>
                <button id="dashboardNavBtn" onclick="app.navigate('dashboard')" style="display:none;">📊 Dashboard</button>
                <div id="authButtons"></div>
            </div>
        </div>
    </nav>
    <main id="page-content"><div class="container" style="padding: 120px 20px;"><div class="loading-spinner"></div></div></main>
    <footer>© 2026 MEI DRIVE AFRICA | NTSA Approved | <a href="#" onclick="app.showLegal('privacy')" style="color:var(--primary);">Privacy</a> | <a href="#" onclick="app.showLegal('terms')" style="color:var(--primary);">Terms</a></footer>
</div>
<div id="toast-container" class="toast-container"></div>

<script>
    // ==================== SUPABASE CREDENTIALS ====================
    const SUPABASE_URL = 'https://qpqkmmkrzxlhcpccefjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s';
    
    const appState = {
        supabase: null,
        currentUser: null,
        isAdmin: false,
        currentRoute: 'home',
        isLoading: false,
        courses: [],
        userStats: { totalProgress: 0, completedCourses: 0, quizScore: 0 },
        routeParams: {}
    };
    
    // Helper functions
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const id = Date.now();
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.id = `toast-${id}`;
        const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
        toast.innerHTML = `${icons[type] || 'ℹ️'} ${escapeHtml(msg)}<span class="toast-close" onclick="app.closeToast('${id}')">×</span>`;
        container.appendChild(toast);
        setTimeout(() => app.closeToast(id), 5000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    
    // ==================== LOAD COURSES FROM SUPABASE ====================
    async function loadCoursesFromSupabase() {
        try {
            const { data, error } = await appState.supabase
                .from('courses')
                .select('*')
                .eq('active', true)
                .order('id');
            
            if (error) throw error;
            
            if (data && data.length > 0) {
                appState.courses = data;
                console.log('✅ Courses loaded from Supabase:', appState.courses.length);
            } else {
                // Fallback to default courses if none exist
                console.warn('No courses found in Supabase, using defaults');
                appState.courses = [
                    { id: 1, name: "Learner Hub", type: "learner", price: 0, duration: "25 hours", lessons: 21, description: "Complete NTSA-approved driver training", icon: "fa-id-card", active: true },
                    { id: 2, name: "EV Drivers & Riders", type: "ev", price: 0, duration: "12 hours", lessons: 12, description: "Electric vehicle safety training", icon: "fa-charging-station", active: true },
                    { id: 3, name: "Boda Boda Safety", type: "boda", price: 0, duration: "18 hours", lessons: 12, description: "Motorcycle safety & defensive riding", icon: "fa-motorcycle", active: true },
                    { id: 4, name: "PSV Professional", type: "psv", price: 2999, duration: "15 hours", lessons: 8, description: "Commercial driver certification", icon: "fa-bus", active: true },
                    { id: 5, name: "School Bus/Van Driver", type: "schoolbus", price: 1999, duration: "12 hours", lessons: 12, description: "School transport safety training", icon: "fa-chalkboard-user", active: true },
                    { id: 6, name: "Advanced Driver Academy", type: "advanced", price: 4999, duration: "20 hours", lessons: 10, description: "Professional driver excellence", icon: "fa-award", active: true }
                ];
            }
        } catch (err) {
            console.error('Error loading courses:', err);
            showToast('Error loading courses', 'error');
        }
    }
    
    async function initSupabase() {
        try {
            appState.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            appState.supabase.auth.onAuthStateChange(async (event, session) => {
                if (event === 'SIGNED_IN' && session) await handleUserLogin(session.user);
                else if (event === 'SIGNED_OUT') handleUserLogout();
                await checkSession();
                renderCurrentRoute();
            });
            await checkSession();
            await loadCoursesFromSupabase();
        } catch (err) { showToast('Connection error', 'error'); }
    }
    
    async function checkSession() {
        const { data: { session } } = await appState.supabase.auth.getSession();
        if (session && !appState.currentUser) await handleUserLogin(session.user);
        else if (!session && appState.currentUser) handleUserLogout();
        updateAuthUI();
    }
    
    async function isUserAdmin() {
        if (!appState.currentUser) return false;
        try {
            const { data, error } = await appState.supabase.rpc('is_admin_user');
            if (!error) return !!data;
            const { data: profile } = await appState.supabase.from('user_profiles').select('is_admin').single();
            return profile?.is_admin === true;
        } catch { return false; }
    }
    
    async function handleUserLogin(user) {
        appState.currentUser = user;
        appState.isAdmin = await isUserAdmin();
        await loadUserStats();
        updateAuthUI();
        renderCurrentRoute();
    }
    
    function handleUserLogout() {
        appState.currentUser = null;
        appState.isAdmin = false;
        appState.userStats = { totalProgress: 0, completedCourses: 0, quizScore: 0 };
        updateAuthUI();
        renderCurrentRoute();
    }
    
    async function loadUserStats() {
        if (!appState.currentUser) return;
        try {
            const { data: progress } = await appState.supabase.from('user_progress').select('progress_percentage');
            if (progress?.length) {
                const total = progress.reduce((a, p) => a + (p.progress_percentage || 0), 0);
                appState.userStats.totalProgress = Math.round(total / progress.length);
            }
            const { data: enrolls } = await appState.supabase.from('enrollments').select('course_id').eq('payment_status', 'verified');
            appState.userStats.completedCourses = enrolls?.length || 0;
            const { data: quizzes } = await appState.supabase.from('quiz_attempts').select('score').order('id', { ascending: false }).limit(1);
            if (quizzes?.[0]) appState.userStats.quizScore = quizzes[0].score;
        } catch (err) { console.error(err); }
    }
    
    async function enrollInCourse(courseId, price) {
        if (!appState.currentUser) { showToast('Please login', 'warning'); showLoginModal(); return false; }
        if (price === 0) return true;
        showToast(`Processing KES ${price}...`, 'info');
        try {
            const { data, error } = await appState.supabase.rpc('process_enrollment', { p_course_id: courseId, p_amount: price });
            if (error) throw error;
            if (data === true) { showToast('Enrolled!', 'success'); await loadUserStats(); return true; }
            else { showToast('Payment failed', 'error'); return false; }
        } catch { showToast('Enrollment error', 'error'); return false; }
    }
    
    async function updateProgress(courseId, progressPercent) {
        if (!appState.currentUser) return false;
        try {
            const { error } = await appState.supabase.rpc('update_progress', { p_course_id: courseId, p_progress: progressPercent });
            if (error) throw error;
            await loadUserStats();
            return true;
        } catch (err) { console.error('Progress update error:', err); return false; }
    }
    
    // Auth functions
    async function signUp(email, password, fullName) {
        try {
            const { data, error } = await appState.supabase.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
            if (error) throw error;
            if (data.user) {
                await appState.supabase.from('user_profiles').upsert({ id: data.user.id, email, full_name: fullName, is_admin: false });
                showToast('Account created! Verify email.', 'success');
                return true;
            }
        } catch (err) { showToast(err.message, 'error'); return false; }
        return false;
    }
    
    async function signIn(email, password) {
        try {
            const { error } = await appState.supabase.auth.signInWithPassword({ email, password });
            if (error) throw error;
            showToast('Logged in', 'success');
            return true;
        } catch (err) { showToast(err.message, 'error'); return false; }
    }
    
    async function signOut() { await appState.supabase.auth.signOut(); showToast('Logged out', 'info'); app.navigate('home'); }
    
    function updateAuthUI() {
        const container = document.getElementById('authButtons');
        const dashboardBtn = document.getElementById('dashboardNavBtn');
        if (!container) return;
        if (appState.currentUser) {
            container.innerHTML = `<div class="user-badge"><i class="fas fa-user"></i> ${escapeHtml(appState.currentUser.email?.split('@')[0])}</div><button onclick="app.signOut()">Logout</button>${appState.isAdmin ? '<button class="btn-primary-nav" onclick="app.navigate(\'admin\')">Admin</button>' : ''}`;
            if (dashboardBtn) dashboardBtn.style.display = 'inline-block';
        } else {
            container.innerHTML = `<button onclick="app.showLoginModal()">Login</button><button class="btn-primary-nav" onclick="app.showSignupModal()">Sign Up</button>`;
            if (dashboardBtn) dashboardBtn.style.display = 'none';
        }
    }
    
    // ==================== RENDERING FUNCTIONS ====================
    async function renderCurrentRoute() {
        if (appState.isLoading) return;
        appState.isLoading = true;
        const container = document.getElementById('page-content');
        container.innerHTML = '<div class="container" style="padding:120px 20px;"><div class="loading-spinner"></div></div>';
        try {
            if (appState.currentRoute === 'home') await renderHome();
            else if (appState.currentRoute === 'courses') await renderCourses();
            else if (appState.currentRoute === 'course-detail') await renderCourseDetail();
            else if (appState.currentRoute === 'learn') await renderLearnPage();
            else if (appState.currentRoute === 'quiz') await renderQuizPage();
            else if (appState.currentRoute === 'library') await renderLibraryPage();
            else if (appState.currentRoute === 'dashboard') {
                if (!appState.currentUser) { app.showLoginModal(); return; }
                await renderDashboard();
            }
            else if (appState.currentRoute === 'admin' && appState.isAdmin) await renderAdminDashboard();
            else if (appState.currentRoute === 'legal') await renderLegal();
            else await renderHome();
        } catch (err) {
            console.error(err);
            container.innerHTML = '<div class="container"><div class="card"><h2>Error</h2><button class="btn btn-primary" onclick="app.navigate(\'home\')">Home</button></div></div>';
        }
        appState.isLoading = false;
        if (window.innerWidth <= 768) document.getElementById('navLinks')?.classList.remove('show');
        window.scrollTo({ top: 0 });
    }
    
    async function renderHome() {
        const html = `
            <section class="hero"><div class="hero-content"><h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1><p>For Learners and Experienced Drivers — Refresh Your Skills with MEI DRIVE AFRICA. NTSA-approved courses.</p><div class="btn-group"><button class="btn btn-primary" onclick="app.navigate('courses')"><i class="fas fa-road"></i> Explore Courses</button><button class="btn btn-outline" onclick="app.showLoginModal()"><i class="fas fa-user-graduate"></i> Get Started</button></div></div></section>
            <div class="stats-bar"><div class="stat-item"><h3>10K+</h3><p>Students</p></div><div class="stat-item"><h3>6</h3><p>Courses</p></div><div class="stat-item"><h3>98%</h3><p>Pass Rate</p></div></div>

    async function renderCourseDetail() {

        const course = appState.courses.find(c => c.type === courseType);
        if (!course) { app.navigate('courses'); return; }
        let isEnrolled = false;

            const { data } = await appState.supabase.from('enrollments').select('id').eq('user_id', appState.currentUser.id).eq('course_id', course.id).eq('payment_status', 'verified').maybeSingle();

    window.enrollNow = async (courseId, price) => {
        const success = await enrollInCourse(courseId, price);

            const course = appState.courses.find(c => c.id === courseId);

    async function renderLearnPage() {
        const courseId = parseInt(appState.routeParams.courseId);
        const course = appState.courses.find(c => c.id === courseId);
        if (!course) { showToast('Course not found', 'error'); app.navigate('courses'); return; }
        if (!appState.currentUser) { showToast('Please login', 'warning'); app.showLoginModal(); return; }
        const { data: enrollment } = await appState.supabase.from('enrollments').select('id').eq('user_id', appState.currentUser.id).eq('course_id', courseId).eq('payment_status', 'verified').maybeSingle();
        if (!enrollment && course.price > 0) { showToast('Enroll first', 'warning'); app.navigate('course-detail', { courseType: course.type }); return; }
        
        const { data: lessons, error } = await appState.supabase.from('lessons').select('*').eq('course_id', courseId).order('order', { ascending: true });
        if (error || !lessons || lessons.length === 0) {
            document.getElementById('page-content').innerHTML = `<div class="container" style="padding-top:100px;"><div class="card"><h2>${escapeHtml(course.name)}</h2><p>No lessons yet. Content coming soon.</p><button class="btn btn-outline" onclick="app.navigate('courses')">Back</button></div></div>`;
            return;
        }
        
        let currentIndex = parseInt(localStorage.getItem(`lesson_${courseId}_index`)) || 0;
        if (currentIndex >= lessons.length) currentIndex = lessons.length - 1;
        if (currentIndex < 0) currentIndex = 0;
        
        const { data: progressData } = await appState.supabase.from('user_progress').select('progress_percentage').eq('user_id', appState.currentUser.id).eq('course_id', courseId).maybeSingle();
        const totalLessons = lessons.length;
        
        function renderLesson() {
            const lesson = lessons[currentIndex];
            const progressPercent = ((currentIndex + 1) / totalLessons) * 100;
            const html = `
                <div class="container" style="padding-top:100px;">
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; margin-bottom:1rem;">
                            <h2>${escapeHtml(course.name)}</h2>
                            <span style="background:var(--primary); color:#0a192f; padding:4px 12px; border-radius:50px;">Lesson ${currentIndex+1} of ${totalLessons}</span>
                        </div>
                        <div class="progress-bar" style="margin-bottom:1.5rem;">
                            <div class="progress-fill" style="width: ${progressPercent}%;"></div>
                        </div>
                        <h3>${escapeHtml(lesson.title)}</h3>
                        <div style="margin-top:1.5rem; line-height:1.6;">
                            ${DOMPurify.sanitize(lesson.content, { ALLOWED_TAGS: ['h1','h2','h3','h4','h5','h6','p','ul','li','strong','em','span','div','br','hr','a','i','b','blockquote','code','pre'] })}
                        </div>
                        <div class="lesson-nav">
                            <button class="btn btn-outline" onclick="app.lessonPrev(${courseId}, ${currentIndex})" ${currentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                            <button class="btn btn-primary" onclick="app.lessonComplete(${courseId}, ${currentIndex}, ${totalLessons})">✓ Mark Complete & Continue</button>
                            <button class="btn btn-outline" onclick="app.lessonNext(${courseId}, ${currentIndex})" ${currentIndex === totalLessons-1 ? 'disabled' : ''}>Next ▶</button>
                        </div>
                        <button class="btn btn-outline" style="margin-top:1rem;" onclick="app.navigate('courses')">← Back to Courses</button>
                    </div>
                </div>
            `;
            document.getElementById('page-content').innerHTML = html;
        }
        renderLesson();
        
        window.app.lessonPrev = (cid, idx) => { if (idx > 0) { localStorage.setItem(`lesson_${cid}_index`, idx-1); renderLearnPage(); } };
        window.app.lessonNext = (cid, idx) => { if (idx < totalLessons-1) { localStorage.setItem(`lesson_${cid}_index`, idx+1); renderLearnPage(); } };
        window.app.lessonComplete = async (cid, idx, total) => {
            const newProgress = Math.round(((idx+1)/total)*100);
            const success = await updateProgress(cid, newProgress);
            if (success) {
                showToast(`Progress: ${newProgress}%`, 'success');
                if (idx+1 < total) {
                    localStorage.setItem(`lesson_${cid}_index`, idx+1);
                    await renderLearnPage();
                } else {
                    showToast(`🎉 Congratulations! Completed ${course.name}!`, 'success');
                    localStorage.removeItem(`lesson_${cid}_index`);
                    app.navigate('dashboard');
                }
            } else { showToast('Failed to save progress', 'error'); }
        };
    }

    // ==================== QUIZ PAGE ====================
    let currentQuizQuestions = [];
    let quizCurrentIndex = 0;
    let quizScore = 0;
    let quizUserAnswers = [];
    
    async function renderQuizPage() {
        if (!appState.currentUser) { app.showLoginModal(); return; }
        
        let categories = ['All'];
        try {
            const { data, error } = await appState.supabase.from('questions').select('category').limit(1000);
            if (!error && data) {
                const unique = [...new Set(data.map(q => q.category))];
                categories = ['All', ...unique];
            }
        } catch(e) { console.warn('Questions table not ready'); }
        
        const html = `
            <div class="container" style="padding-top:100px;">
                <div class="card">
                    <h2>📝 NTSA Practice Exam</h2>
                    <div id="quizSetup">
                        <div class="quiz-category-selector" id="quizCategorySelector"></div>
                        <button class="btn btn-primary" onclick="app.startQuiz()">Start Randomized Quiz (20 Questions)</button>
                    </div>
                    <div id="quizContainer" style="display:none;"></div>
                </div>
            </div>
        `;
        document.getElementById('page-content').innerHTML = html;
        
        const selector = document.getElementById('quizCategorySelector');
        selector.innerHTML = categories.map(cat => `<button class="quiz-category-btn ${cat === 'All' ? 'active' : ''}" data-cat="${cat}" onclick="app.selectQuizCategory('${cat}')">${cat}</button>`).join('');
        window.app.selectedQuizCategory = 'All';
        window.app.selectQuizCategory = (cat) => {
            window.app.selectedQuizCategory = cat;
            document.querySelectorAll('#quizCategorySelector .quiz-category-btn').forEach(btn => {
                if (btn.dataset.cat === cat) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        };
        
        window.app.startQuiz = async () => {
            const category = window.app.selectedQuizCategory === 'All' ? null : window.app.selectedQuizCategory;
            let query = appState.supabase.from('questions').select('*');
            if (category) query = query.eq('category', category);
            const { data, error } = await query;
            if (error || !data || data.length === 0) {
                showToast('No questions available for this category', 'error');
                return;
            }
            const shuffled = [...data];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            currentQuizQuestions = shuffled.slice(0, 20);
            quizCurrentIndex = 0;
            quizScore = 0;
            quizUserAnswers = new Array(currentQuizQuestions.length).fill(null);
            document.getElementById('quizSetup').style.display = 'none';
            document.getElementById('quizContainer').style.display = 'block';
            renderQuizQuestion();
        };
        
        function renderQuizQuestion() {
            if (quizCurrentIndex >= currentQuizQuestions.length) {
                const percent = Math.round((quizScore / currentQuizQuestions.length) * 100);
                saveQuizScore(percent, currentQuizQuestions.length);
                document.getElementById('quizContainer').innerHTML = `
                    <div style="text-align:center; padding:2rem;">
                        <h3>🎉 Quiz Complete!</h3>
                        <p>Your score: ${quizScore} / ${currentQuizQuestions.length} (${percent}%)</p>
                        <button class="btn btn-primary" onclick="app.navigate('dashboard')">Dashboard</button>
                        <button class="btn btn-outline" onclick="app.resetQuiz()">Try Again</button>
                    </div>
                `;
                return;
            }
            const q = currentQuizQuestions[quizCurrentIndex];
            const options = [q.option_a, q.option_b, q.option_c, q.option_d];
            const letters = ['a','b','c','d'];
            const currentAnswer = quizUserAnswers[quizCurrentIndex];
            const html = `
                <div class="quiz-question">${escapeHtml(q.question_text)}</div>
                <div class="quiz-options">
                    ${options.map((opt, idx) => `
                        <div class="quiz-option ${currentAnswer !== null && letters[idx] === q.correct_option ? 'correct-option' : (currentAnswer === letters[idx] ? 'selected-option' : '')}"
                             style="${currentAnswer !== null && letters[idx] === q.correct_option ? 'border-color:#00ff88; background:rgba(0,255,136,0.1);' : (currentAnswer === letters[idx] ? 'border-color:#ff4757; background:rgba(255,71,87,0.1);' : '')}"
                             onclick="if(${currentAnswer === null}) app.submitAnswer('${letters[idx]}')">
                            ${escapeHtml(opt)}
                        </div>
                    `).join('')}
                </div>
                <div id="quizFeedback" class="quiz-feedback">
                    ${currentAnswer !== null ? `<span style="color: ${currentAnswer === q.correct_option ? '#00ff88' : '#ff4757'}">${currentAnswer === q.correct_option ? '✓ Correct!' : '✗ Incorrect'}</span> ${escapeHtml(q.explanation || '')}` : ''}
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:1.5rem;">
                    <button class="btn btn-outline" onclick="app.prevQuizQuestion()" ${quizCurrentIndex === 0 ? 'disabled' : ''}>◀ Previous</button>
                    <span>Question ${quizCurrentIndex+1} of ${currentQuizQuestions.length}</span>
                    <button class="btn btn-primary" onclick="app.nextQuizQuestion()">Next ▶</button>
                </div>
            `;
            document.getElementById('quizContainer').innerHTML = html;
        }
        
        window.app.submitAnswer = (selectedLetter) => {
            if (quizUserAnswers[quizCurrentIndex] !== null) return;
            const q = currentQuizQuestions[quizCurrentIndex];
            quizUserAnswers[quizCurrentIndex] = selectedLetter;
            if (selectedLetter === q.correct_option) quizScore++;
            renderQuizQuestion();
        };
        window.app.nextQuizQuestion = () => {
            if (quizCurrentIndex < currentQuizQuestions.length - 1) {
                quizCurrentIndex++;
                renderQuizQuestion();
            } else {
                quizCurrentIndex = currentQuizQuestions.length;
                renderQuizQuestion();
            }
        };
        window.app.prevQuizQuestion = () => {
            if (quizCurrentIndex > 0) {
                quizCurrentIndex--;
                renderQuizQuestion();
            }
        };
        window.app.resetQuiz = () => {
            document.getElementById('quizSetup').style.display = 'block';
            document.getElementById('quizContainer').style.display = 'none';
            currentQuizQuestions = [];
        };
    }
    
    async function saveQuizScore(scorePercent, total) {
        if (!appState.currentUser) return;
        try {
            await appState.supabase.from('quiz_attempts').insert({
                user_id: appState.currentUser.id,
                score: scorePercent,
                total: total,
                completed_at: new Date()
            });
            await loadUserStats();
        } catch(e) { console.error('Quiz save error', e); }
    }

    // UI helpers
    function showLoginModal() { showAuthModal('login'); }
    function showSignupModal() { showAuthModal('signup'); }
    function showAuthModal(mode) {
        const modalHtml = `<div class="modal active" id="authModal"><div class="modal-content"><h2>${mode === 'login' ? '🔐 Sign In' : '📝 Sign Up'}</h2>${mode === 'signup' ? '<input type="text" id="authName" placeholder="Full Name">' : ''}<input type="email" id="authEmail" placeholder="Email"><input type="password" id="authPassword" placeholder="Password"><button class="btn btn-primary" onclick="app.handleAuth('${mode}')">${mode === 'login' ? 'Login' : 'Sign Up'}</button><p style="margin-top:1rem;">${mode === 'login' ? 'No account? <span style="color:var(--primary);cursor:pointer;" onclick="app.showSignupModal()">Sign up</span>' : 'Have account? <span style="color:var(--primary);cursor:pointer;" onclick="app.showLoginModal()">Login</span>'}</p><button class="btn btn-outline" onclick="app.closeAuthModal()">Cancel</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    async function handleAuth(mode) {
        const email = document.getElementById('authEmail')?.value;
        const pwd = document.getElementById('authPassword')?.value;
        if (!email || !pwd) { showToast('Fill fields', 'error'); return; }
        if (mode === 'signup') {
            const name = document.getElementById('authName')?.value;
            if (!name) { showToast('Full name required', 'error'); return; }
            await signUp(email, pwd, name);
        } else { await signIn(email, pwd); }
        closeAuthModal();
    }
    function closeAuthModal() { document.getElementById('authModal')?.remove(); }
    function closeToast(id) { document.getElementById(`toast-${id}`)?.remove(); }
    function toggleMobileMenu() { document.getElementById('navLinks')?.classList.toggle('show'); }
    function navigate(route, params = {}) { appState.currentRoute = route; appState.routeParams = params; renderCurrentRoute(); }
    function navigateToCourse(courseType) { navigate('course-detail', { courseType }); }
    function showLegal(page) { navigate('legal', { page }); }
    
    window.app = { navigate, navigateToCourse, showLegal, enrollNow, lessonPrev:()=>{}, lessonNext:()=>{}, lessonComplete:()=>{}, showLoginModal, showSignupModal, handleAuth, closeAuthModal, closeToast, signOut, toggleMobileMenu, showToast, filterLibrary:()=>{}, viewResource:()=>{}, startQuiz:()=>{}, submitAnswer:()=>{}, nextQuizQuestion:()=>{}, prevQuizQuestion:()=>{}, resetQuiz:()=>{}, selectQuizCategory:()=>{} };
    initSupabase();
    renderCurrentRoute();
</script>

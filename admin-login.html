<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0e27; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .login-card { background: #1a1f3a; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(0,255,136,0.2); }
        .login-card h1 { color: #00ff88; margin-bottom: 10px; }
        .login-card input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #00ff88; background: #0a0e27; color: white; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: #00ff88; color: #0a0e27; }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; }
        .error { background: rgba(255,68,68,0.2); color: #ff8888; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Admin Login</h1>
        <p style="margin-bottom: 20px; color: #a0a0c0;">Access MEI Drive Africa Dashboard</p>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="password" placeholder="Password">
        <button class="btn btn-primary" onclick="adminLogin()">Login as Admin</button>
        <div id="message"></div>
    </div>
    <script>
        async function adminLogin() { const email = document.getElementById('email').value; const password = document.getElementById('password').value; if (!email || !password) { showMessage('Enter email and password', 'error'); return; } const result = await window.MEIDrive.loginUser(email, password); if (result.success) { const user = await window.MEIDrive.getCurrentUser(); const { data } = await window.MEIDrive.supabase.from('profiles').select('role').eq('id', user.id).single(); if (data?.role === 'admin') window.location.href = 'admin-dashboard.html'; else { await window.MEIDrive.logoutUser(); showMessage('Access denied. Admin only.', 'error'); } } else showMessage('Invalid credentials', 'error'); }
        function showMessage(msg, type) { const div = document.getElementById('message'); div.innerHTML = `<div class="message ${type}">${msg}</div>`; setTimeout(() => div.innerHTML = '', 3000); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Bank - MEI DRIVE AFRICA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: #0A192F;
            color: #fff;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0D2137; }
        ::-webkit-scrollbar-thumb { background: #00FF88; border-radius: 4px; }

        .navbar {
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(12px);
            padding: 16px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
        }
        .logo span { color: #00FF88; }

        .back-btn {
            background: rgba(0, 255, 136, 0.1);
            color: #00FF88;
            border: 1px solid #00FF88;
            padding: 10px 28px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-login, .btn-register {
            padding: 8px 24px;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }

        .btn-login {
            background: transparent;
            border: 1.5px solid #00FF88;
            color: #00FF88;
        }

        .btn-login:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        .btn-register {
            background: #00FF88;
            color: #0A192F;
        }

        .btn-register:hover {
            background: #00cc6a;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-email {
            color: #00FF88;
            font-size: 14px;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 900px;
            margin: 100px auto 60px;
            padding: 0 20px;
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .quiz-header h1 {
            font-size: 42px;
            margin-bottom: 12px;
        }
        .quiz-header h1 span { color: #00FF88; }
        .quiz-header p { opacity: 0.7; }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(13, 33, 55, 0.8);
            padding: 15px 30px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #00FF88;
        }
        .stat-label { font-size: 13px; opacity: 0.7; }

        .category-filter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            justify-content: center;
        }
        .filter-btn {
            background: rgba(13, 33, 55, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.2);
            padding: 10px 22px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .filter-btn.active, .filter-btn:hover {
            background: #00FF88;
            color: #0A192F;
            border-color: #00FF88;
        }

        .quiz-item {
            background: rgba(13, 33, 55, 0.6);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 136, 0.1);
        }
        .quiz-question {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(10, 25, 47, 0.6);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .quiz-option:hover {
            background: rgba(0, 255, 136, 0.1);
        }
        .check-btn {
            background: #00FF88;
            color: #0A192F;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
        }
        .feedback {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .feedback.correct {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid #00FF88;
            color: #00FF88;
            display: block;
        }
        .feedback.wrong {
            background: rgba(244, 67, 54, 0.15);
            border: 1px solid #f44336;
            color: #f44336;
            display: block;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,255,136,0.2);
            border-top-color: #00FF88;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: #0D2137;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            text-align: center;
            color: #00FF88;
        }

        .modal-content input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: rgba(10, 25, 47, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #00FF88;
        }

        .modal-content button {
            width: 100%;
            padding: 14px;
            background: #00FF88;
            color: #0A192F;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .modal-content button:hover { background: #00cc6a; }

        .modal-switch {
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
        }

        .modal-switch span { color: #00FF88; }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 30px;
            cursor: pointer;
            color: white;
        }

        .error-msg {
            color: #ff4444;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .success-msg {
            color: #00FF88;
            text-align: center;
            margin-bottom: 15px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .container { margin-top: 140px; }
            .quiz-header h1 { font-size: 28px; }
            .stats { flex-direction: column; align-items: center; }
            .stat-card { width: 100%; }
            .navbar { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">MEI DRIVE <span>AFRICA</span></div>
        <div id="authContainer" class="auth-buttons">
            <button class="btn-login" onclick="openModal('login')">Login</button>
            <button class="btn-register" onclick="openModal('register')">Register</button>
        </div>
        <a href="index.html" class="back-btn">← Back</a>
    </nav>

    <!-- Auth Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Login</h2>
            <div id="modalError" class="error-msg"></div>
            <div id="modalSuccess" class="success-msg"></div>
            <input type="email" id="modalEmail" placeholder="Email address">
            <input type="password" id="modalPassword" placeholder="Password">
            <button id="modalSubmitBtn" onclick="handleAuth()">Login</button>
            <div class="modal-switch" id="modalSwitch" onclick="switchAuthMode()">
                Don't have an account? <span>Register</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="quiz-header">
            <h1>📝 <span>Quiz Bank</span></h1>
            <p>Test your knowledge with real exam-style questions</p>
        </div>
        <div id="quizContainer">
            <div class="loading"><div class="spinner"></div>Loading questions...</div>
        </div>
    </div>

    <script>
        // ============================================
        // SINGLE SUPABASE INITIALIZATION
        // ============================================
        const SUPABASE_CONFIG = {
            url: 'https://qpqkmmkrzxlhcpccefjn.supabase.co',
            anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s'
        };
        
        const supabase = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.anonKey);
        
        // ============================================
        // AUTH STATE MANAGEMENT
        // ============================================
        let currentAuthMode = 'login';
        let currentUser = null;

        async function checkAuthState() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                updateAuthUI();
            }
        }

        function updateAuthUI() {
            const authContainer = document.getElementById('authContainer');
            if (currentUser) {
                authContainer.innerHTML = `
                    <div class="user-info">
                        <span class="user-email">${currentUser.email}</span>
                        <button class="btn-logout" onclick="logout()">Logout</button>
                    </div>
                    <a href="index.html" class="back-btn" style="margin-left:10px;">← Back</a>
                `;
            } else {
                authContainer.innerHTML = `
                    <button class="btn-login" onclick="openModal('login')">Login</button>
                    <button class="btn-register" onclick="openModal('register')">Register</button>
                    <a href="index.html" class="back-btn" style="margin-left:10px;">← Back</a>
                `;
            }
        }

        function openModal(mode) {

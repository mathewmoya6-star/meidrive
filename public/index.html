    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a192f; color: #ffffff; line-height: 1.5; }
        :root { --primary: #00ff88; --primary-dark: #00cc66; --border: rgba(0,255,136,0.25); --text-muted: #a0b3d9; --bg-card: #0d2137; }
        
        .navbar { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,25,47,0.98); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 1000; padding: 0.8rem 2rem; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.3rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: #0a192f; }
        .logo span { color: var(--primary); }
        .nav-links { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links button { background: transparent; border: none; color: #a0b3d9; padding: 8px 14px; border-radius: 50px; cursor: pointer; transition: 0.2s; font-weight: 500; }
        .nav-links button:hover { background: rgba(0,255,136,0.1); color: var(--primary); }
        .nav-links button.active { background: rgba(0,255,136,0.15); color: var(--primary); }
        .btn { padding: 12px 28px; border-radius: 50px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #0a192f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,255,136,0.3); }
        .btn-outline { border: 1px solid var(--primary); color: var(--primary); background: transparent; }
        .btn-outline:hover { background: rgba(0,255,136,0.1); }
        .btn-sm { padding: 8px 20px; font-size: 13px; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }
        .hero { text-align: center; padding: 140px 20px 80px; background: linear-gradient(135deg, rgba(10,25,47,0.95), rgba(13,33,55,0.85)); margin-bottom: 2rem; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 1rem; line-height: 1.2; }
        .hero h1 span { color: var(--primary); }
        .hero p { font-size: 1.2rem; opacity: 0.8; max-width: 600px; margin: 0 auto 2rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.8rem; margin: 2rem 0; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 1.8rem; transition: 0.2s; cursor: pointer; }
        .card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .course-price { font-size: 1.3rem; font-weight: 800; color: var(--primary); margin: 0.5rem 0; }
        .progress-bar { background: #1e2a3a; border-radius: 10px; height: 6px; margin: 12px 0; }
        .progress-fill { background: var(--primary); height: 6px; border-radius: 10px; width: 0%; transition: width 0.3s; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #1e2a3a; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 60px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 1100; }
        .toast { background: var(--bg-card); border-left: 4px solid var(--primary); padding: 12px 20px; border-radius: 12px; margin-top: 8px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        footer { text-align: center; padding: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); margin-top: 3rem; }
        .stats-bar { background: var(--bg-card); padding: 2rem; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 2rem; text-align: center; margin-bottom: 2rem; border-radius: 20px; }
        .stat-item h3 { font-size: 2rem; color: var(--primary); }
        .section-title { text-align: center; font-size: 2rem; margin: 2rem 0; }
        .section-title span { color: var(--primary); }
        .user-badge { background: rgba(0,255,136,0.15); border-radius: 40px; padding: 6px 16px; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
        .mobile-menu { display: none; font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        .badge { display: inline-block; background: rgba(0,255,136,0.2); color: var(--primary); font-size: 0.7rem; padding: 4px 10px; border-radius: 50px; margin-left: 10px; }
        .category-tag { display: inline-block; background: rgba(0,255,136,0.1); padding: 4px 12px; border-radius: 20px; font-size: 12px; margin: 5px 5px 0 0; }
        .admin-badge { background: #ff4757; color: white; padding: 2px 8px; border-radius: 20px; font-size: 10px; margin-left: 8px; }
        .quiz-option { margin-bottom: 12px; cursor: pointer; padding: 14px 18px; background: #112240; border-radius: 12px; border: 1px solid var(--border); transition: 0.2s; }
        .quiz-option:hover { border-color: var(--primary); background: rgba(0,255,136,0.08); }
        .quiz-option.correct { background: rgba(0,255,136,0.2); border-color: var(--primary); }
        .quiz-option.wrong { background: rgba(255,71,87,0.2); border-color: #ff4757; }
        
        @media (max-width: 768px) { 
            .hero h1 { font-size: 2rem; } 
            .nav-links { display: none; width: 100%; flex-direction: column; padding: 1rem 0; } 
            .nav-links.show { display: flex; } 
            .mobile-menu { display: block; } 
            .container { padding: 0 16px; }
            .stats-bar { flex-direction: column; gap: 1rem; }
            .grid { grid-template-columns: 1fr; }
        }
        
        input { font-family: inherit; background: #0f1a2c; border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; width: 100%; margin: 10px 0; }
        input:focus { outline: none; border-color: var(--primary); }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); border-radius: 28px; padding: 2rem; max-width: 450px; width: 90%; border: 1px solid var(--primary); }
    </style>
</head>
<body>
<div id="app">
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="navigateTo('home')">
                <div class="logo-icon">M</div>
                MEI DRIVE <span>AFRICA</span>
            </div>
            <div class="mobile-menu" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></div>
            <div class="nav-links" id="navLinks">
                <button id="navHome" onclick="navigateTo('home')"><i class="fas fa-home"></i> Home</button>
                <button id="navCourses" onclick="navigateTo('courses')"><i class="fas fa-book"></i> Courses</button>
                <button id="navQuiz" onclick="navigateTo('quiz')"><i class="fas fa-question-circle"></i> Quiz</button>
                <button id="navAdmin" onclick="navigateTo('admin')" style="display:none;"><i class="fas fa-user-shield"></i> Admin</button>
                <div id="authButtons"></div>
            </div>
        </div>
    </nav>
    <main id="page-content"><div class="loading-spinner"></div></main>
    <footer>© 2026 MEI DRIVE AFRICA | Drive Safe, Arrive Alive</footer>
</div>
<div id="toast-container"></div>

<script>
    const SUPABASE_URL = 'https://qpqkmmkrzxlhcpccefjn.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwcWttbWtyenhsaGNwY2NlZmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MjU0NzIsImV4cCI6MjA5NTEwMTQ3Mn0.Vw1hexN3NKoF_y9VFBFs_NUhJgFNNMwuyzDjImUcM6s';
    
    let supabase;
    let currentUser = null;
    let currentPage = 'home';
    let courses = [];
    let quizQuestions = [];
    let userEnrollments = {};
    let userProgress = {};
    let payments = [];
    let users = [];
    let isAdmin = false;
    
    // Quiz bank (fallback if no data in Supabase)
    const defaultQuizQuestions = [
        { id: 1, category: 'Road Signs', question: 'What does a STOP sign mean?', option_a: 'Slow down only', option_b: 'Continue carefully', option_c: 'Come to a complete stop', option_d: 'Overtake carefully', correct_option: 2, explanation: 'A STOP sign requires you to come to a complete stop.' },
        { id: 2, category: 'Road Signs', question: 'A triangular road sign normally indicates:', option_a: 'Direction', option_b: 'Warning', option_c: 'Parking', option_d: 'Speed limit', correct_option: 1, explanation: 'Triangular signs are warning signs.' },
        { id: 3, category: 'Highway Code', question: 'Seat belts are important because they:', option_a: 'Improve music quality', option_b: 'Prevent accidents', option_c: 'Reduce injury during accidents', option_d: 'Increase speed', correct_option: 2, explanation: 'Seat belts reduce the risk of serious injury.' }
    ];
    
    function showToast(msg, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = `${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'} ${msg}`;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
    function toggleMobileMenu() { document.getElementById('navLinks')?.classList.toggle('show'); }
    
    async function fetchCourses() {
        try {
            const { data, error } = await supabase.from('courses').select('*').eq('is_active', true);
            if (error) throw error;
            courses = data || [];
            if (courses.length === 0) {
                courses = [
                    { id: 1, name: 'LEARNER HUB', description: 'Complete driver training for new drivers.', price: 2999, duration: '8 weeks', icon: 'fa-car', lessons_count: 21 },
                    { id: 2, name: 'BODA BODA SAFETY', description: 'Professional motorcycle rider training.', price: 2499, duration: '6 weeks', icon: 'fa-motorcycle', lessons_count: 26 }
                ];
            }
        } catch (err) {
            console.error('Error fetching courses:', err);
        }
    }
    
    async function fetchQuizQuestions() {
        try {
            const { data, error } = await supabase.from('quiz_questions').select('*');
            if (error) throw error;
            quizQuestions = (data && data.length) ? data : defaultQuizQuestions;
        } catch (err) {
            console.error('Error fetching quiz:', err);
            quizQuestions = defaultQuizQuestions;
        }
    }
    
    async function loadUserData() {
        const { data: { session } } = await supabase.auth.getSession();
        currentUser = session?.user || null;
        
        isAdmin = currentUser?.email === 'admin@meidrive.com' || currentUser?.email === 'admin@gmail.com';
        
        if (currentUser) {
            // Fetch enrollments
            const { data: enrollments } = await supabase.from('user_enrollments').select('course_id').eq('user_id', currentUser.id);
            if (enrollments) {
                userEnrollments = {};
                enrollments.forEach(e => { userEnrollments[e.course_id] = true; });
            }
            
            // Fetch progress
            const { data: progress } = await supabase.from('user_progress').select('course_id, progress').eq('user_id', currentUser.id);
            if (progress) {
                userProgress = {};
                progress.forEach(p => { userProgress[p.course_id] = p.progress; });
            }
            
            // Admin data
            if (isAdmin) {
                const { data: paymentData } = await supabase.from('payments').select('*');
                if (paymentData) payments = paymentData;
                const { data: userData } = await supabase.from('users').select('*');
                if (userData) users = userData;
                document.getElementById('navAdmin').style.display = 'inline-block';
            }
        } else {
            document.getElementById('navAdmin').style.display = 'none';
        }
        updateAuthUI();
    }
    
    function updateAuthUI() {
        const container = document.getElementById('authButtons');
        if (!container) return;
        if (currentUser) {
            container.innerHTML = `<div class="user-badge"><i class="fas fa-user-check"></i> ${escapeHtml(currentUser.email.split('@')[0])}${isAdmin ? '<span class="admin-badge">Admin</span>' : ''}</div><button onclick="logout()" class="btn-outline btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>`;
        } else {
            container.innerHTML = `<button onclick="showAuthModal('login')" class="btn-outline btn-sm"><i class="fas fa-key"></i> Login</button><button onclick="showAuthModal('signup')" class="btn-primary btn-sm"><i class="fas fa-user-plus"></i> Sign Up</button>`;
        }
    }
    
    async function logout() { 
        await supabase.auth.signOut(); 
        currentUser = null; 
        isAdmin = false;
        updateAuthUI(); 
        navigateTo('home'); 
        showToast('Logged out successfully', 'info'); 
    }
    
    function showAuthModal(mode) {
        document.getElementById('page-content').innerHTML = `
            <div class="modal" style="display:flex;">
                <div class="modal-content">
                    <h2 style="text-align:center;">${mode === 'login' ? '🔐 Login to Your Account' : '📝 Create New Account'}</h2>
                    <input type="email" id="authEmail" placeholder="Email address">
                    <input type="password" id="authPassword" placeholder="Password (minimum 6 characters)">
                    <button class="btn btn-primary" style="width:100%" onclick="handleAuth('${mode}')">${mode === 'login' ? 'Login' : 'Sign Up'}</button>
                    <p style="margin-top:1rem; text-align:center;">
                        ${mode === 'login' ? 'No account? ' : 'Already have an account? '}
                        <span style="color:var(--primary);cursor:pointer;" onclick="showAuthModal('${mode === 'login' ? 'signup' : 'login'}')">${mode === 'login' ? 'Create one' : 'Login here'}</span>
                    </p>
                    <button class="btn btn-outline" style="width:100%; margin-top:0.5rem;" onclick="navigateTo('home')">Cancel</button>
                </div>
            </div>`;
    }
    
    async function handleAuth(mode) {
        const email = document.getElementById('authEmail')?.value.trim();
        const password = document.getElementById('authPassword')?.value;
        
        if (!email || !password) { 
            showToast('Please enter both email and password', 'error'); 
            return; 
        }
        if (password.length < 6) { 
            showToast('Password must be at least 6 characters', 'error'); 
            return; 
        }
        
        try {
            if (mode === 'signup') {
                const { data, error } = await supabase.auth.signUp({ 
                    email, 
                    password,
                    options: { data: { full_name: email.split('@')[0] } }
                });
                if (error) throw error;
                showToast('Account created! Please check your email to verify.', 'success');
                showAuthModal('login');
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                currentUser = data.user;
                showToast(`Welcome back, ${email.split('@')[0]}!`, 'success');
                await loadUserData();
                navigateTo('home');
            }
        } catch (err) {
            showToast(err.message, 'error');
        }
    }
    
    function isEnrolled(courseId) { return userEnrollments[courseId] === true; }
    
    async function enrollCourse(courseId) {
        if (!currentUser) { showAuthModal('login'); return; }
        const course = courses.find(c => c.id === courseId);
        if (!course) return;
        
        const phone = prompt(`💰 Payment for ${course.name}\nAmount: KES ${course.price.toLocaleString()}\n\nEnter M-Pesa phone number:`);
        if (!phone) { showToast('Payment cancelled', 'info'); return; }
        
        showToast(`Processing payment for KES ${course.price}...`, 'info');
        
        setTimeout(async () => {
            const { error } = await supabase.from('user_enrollments').upsert({
                user_id: currentUser.id,
                course_id: courseId,
                payment_status: 'completed',
                amount_paid: course.price,
                paid_at: new Date().toISOString()
            });
            
            if (!error) {
                userEnrollments[courseId] = true;
                showToast(`✅ Successfully enrolled in ${course.name}!`, 'success');
                renderCourses();
            } else {
                showToast('Enrollment failed. Please try again.', 'error');
            }
        }, 1500);
    }
    
    function viewCourse(courseId) { 
        window.location.href = `course.html?id=${courseId}`;
    }
    
    // Quiz functionality
    let quizState = { currentIndex: 0, score: 0, userAnswers: [], questions: [] };
    
    function renderQuiz() {
        if (quizState.questions.length === 0) {
            quizState.questions = [...quizQuestions];
        }
        
        if (quizState.currentIndex >= quizState.questions.length) {
            const percent = Math.round((quizState.score / quizState.questions.length) * 100);
            document.getElementById('page-content').innerHTML = `
                <div class="container" style="padding-top: 100px; max-width: 800px;">
                    <div class="card" style="text-align:center;">
                        <h2>🎉 Quiz Complete!</h2>
                        <div style="font-size: 4rem;">${percent >= 70 ? '🏆' : '📚'}</div>
                        <p>Your score: <strong>${quizState.score}</strong> / ${quizState.questions.length} (${percent}%)</p>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
                            <button class="btn btn-primary" onclick="resetQuiz()">Restart Quiz</button>
                            <button class="btn btn-outline" onclick="navigateTo('home')">Back Home</button>
                        </div>
                    </div>
                </div>`;
            return;
        }
        
        const q = quizState.questions[quizState.currentIndex];
        const hasAnswered = quizState.userAnswers[quizState.currentIndex] !== undefined;
        const options = [q.option_a, q.option_b, q.option_c, q.option_d];
        
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px; max-width: 800px;">
                <div class="card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <span class="category-tag">${q.category || 'General'}</span>
                        <span style="background: var(--primary); color: #0a192f; padding: 4px 12px; border-radius: 50px;">${quizState.currentIndex + 1}/${quizState.questions.length}</span>
                    </div>
                    <h3>${escapeHtml(q.question)}</h3>
                    ${options.map((opt, idx) => {
                        let cls = 'quiz-option';
                        if (hasAnswered && idx === q.correct_option) cls += ' correct';
                        if (hasAnswered && idx === quizState.userAnswers[quizState.currentIndex] && idx !== q.correct_option) cls += ' wrong';
                        return `<div class="${cls}" onclick="${!hasAnswered ? `selectAnswer(${idx})` : ''}">
                            ${String.fromCharCode(65+idx)}. ${escapeHtml(opt)}
                        </div>`;
                    }).join('')}
                    ${hasAnswered ? `
                        <div style="margin-top: 1rem; padding: 1rem; background: rgba(0,255,136,0.1); border-radius: 12px;">
                            <strong>${quizState.userAnswers[quizState.currentIndex] === q.correct_option ? '✓ Correct!' : '✗ Incorrect'}</strong>
                            <p>${escapeHtml(q.explanation || 'No explanation available.')}</p>
                            <button class="btn btn-primary" onclick="nextQuestion()">Next Question →</button>
                        </div>
                    ` : '<p style="margin-top: 1rem;">Click an option to answer</p>'}
                </div>
            </div>`;
    }
    
    window.selectAnswer = (idx) => {
        if (quizState.userAnswers[quizState.currentIndex] !== undefined) return;
        const q = quizState.questions[quizState.currentIndex];
        quizState.userAnswers[quizState.currentIndex] = idx;
        if (idx === q.correct_option) quizState.score++;
        renderQuiz();
    };
    
    window.nextQuestion = () => { quizState.currentIndex++; renderQuiz(); };
    window.resetQuiz = () => { quizState = { currentIndex: 0, score: 0, userAnswers: [], questions: [...quizQuestions] }; renderQuiz(); };
    
    function renderHome() {
        document.getElementById('page-content').innerHTML = `
            <div class="hero">
                <h1>Practice Daily.<br><span>Revise Smarter. Pass with Confidence.</span></h1>
                <p>Professional driver training with comprehensive courses and exam preparation.</p>
                <button class="btn btn-primary" onclick="navigateTo('courses')">🚀 Explore Courses</button>
            </div>
            <div class="container">
                <div class="stats-bar">
                    <div class="stat-item"><h3>6</h3><p>Courses</p></div>
                    <div class="stat-item"><h3>${quizQuestions.length}+</h3><p>Questions</p></div>
                    <div class="stat-item"><h3>NTSA</h3><p>Approved</p></div>
                </div>
                <h2 class="section-title">Our <span>Courses</span></h2>
                <div class="grid">
                    ${courses.slice(0, 3).map(c => `
                        <div class="card" onclick="viewCourse(${c.id})">
                            <i class="fas ${c.icon || 'fa-car'}" style="font-size: 2rem; color: var(--primary);"></i>
                            <h3>${escapeHtml(c.name)}${isEnrolled(c.id) ? '<span class="badge">Enrolled</span>' : ''}</h3>
                            <p>${escapeHtml(c.description || 'Professional training course')}</p>
                            <div class="course-price">KES ${(c.price || 0).toLocaleString()}</div>
                            <button class="btn btn-primary">${isEnrolled(c.id) ? 'Continue' : 'Enroll'}</button>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    }
    
    function renderCourses() {
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px;">
                <h1 class="section-title">All <span>Courses</span></h1>
                <div class="grid">
                    ${courses.map(c => `
                        <div class="card" onclick="viewCourse(${c.id})">
                            <i class="fas ${c.icon || 'fa-car'}" style="font-size: 2rem; color: var(--primary);"></i>
                            <h3>${escapeHtml(c.name)}${isEnrolled(c.id) ? '<span class="badge">Enrolled</span>' : ''}</h3>
                            <p>${escapeHtml(c.description || 'Professional training course')}</p>
                            <div><span class="category-tag">${c.duration || 'Self-paced'}</span><span class="category-tag">${c.lessons_count || 0} Modules</span></div>
                            <div class="course-price">KES ${(c.price || 0).toLocaleString()}</div>
                            ${userProgress[c.id] ? `<div class="progress-bar"><div class="progress-fill" style="width:${userProgress[c.id]}%"></div></div>` : ''}
                            <button class="btn btn-primary">${isEnrolled(c.id) ? 'Continue Learning' : 'Enroll Now'}</button>
                        </div>
                    `).join('')}
                </div>
            </div>`;
    }
    
    function renderAdminDashboard() {
        const totalRevenue = payments.reduce((sum, p) => sum + (p.amount || 0), 0);
        document.getElementById('page-content').innerHTML = `
            <div class="container" style="padding-top: 100px;">
                <h1 class="section-title"><i class="fas fa-user-shield"></i> Admin <span>Dashboard</span></h1>
                <div class="stats-bar">
                    <div class="stat-item"><h3>${users.length}</h3><p>Users</p></div>
                    <div class="stat-item"><h3>${payments.length}</h3><p>Payments</p></div>
                    <div class="stat-item"><h3>KES ${totalRevenue.toLocaleString()}</h3><p>Revenue</p></div>
                </div>
                <div class="card">
                    <h3>Recent Payments</h3>
                    <table style="width:100%; border-collapse:collapse;">
                        <thead><tr><th>Transaction</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
                        <tbody>
                            ${payments.slice(0, 10).map(p => `
                                <tr style="border-bottom:1px solid var(--border);">
                                    <td style="padding:10px;">${escapeHtml(p.transaction_id || 'N/A')}</td>
                                    <td>KES ${(p.amount || 0).toLocaleString()}</td>
                                    <td>${p.status || 'pending'}</td>
                                    <td>${p.created_at ? new Date(p.created_at).toLocaleDateString() : 'N/A'}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>`;
    }
    
    function navigateTo(page) {
        currentPage = page;
        if (page === 'home') renderHome();
        else if (page === 'courses') renderCourses();
        else if (page === 'quiz') { resetQuiz(); renderQuiz(); }
        else if (page === 'admin' && isAdmin) renderAdminDashboard();
        else renderHome();
        
        document.querySelectorAll('.nav-links button').forEach(btn => btn.classList.remove('active'));
        if (page === 'home') document.getElementById('navHome')?.classList.add('active');
        if (page === 'courses') document.getElementById('navCourses')?.classList.add('active');
        if (page === 'quiz') document.getElementById('navQuiz')?.classList.add('active');
        if (window.innerWidth <= 768) document.getElementById('navLinks')?.classList.remove('show');
        window.scrollTo({ top: 0 });
    }
    
    async function init() {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Check if user is already logged in
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            currentUser = session.user;
            await loadUserData();
        }
        
        await fetchCourses();
        await fetchQuizQuestions();
        await loadUserData();
        navigateTo('home');
    }
    
    window.viewCourse = viewCourse;
    window.enrollCourse = enrollCourse;
    window.navigateTo = navigateTo;
    window.showAuthModal = showAuthModal;
    window.handleAuth = handleAuth;
    window.logout = logout;
    window.selectAnswer = selectAnswer;
    window.nextQuestion = nextQuestion;
    window.resetQuiz = resetQuiz;
    
    init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - MEI Drive Africa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0e27; color: white; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .reset-card { background: #1a1f3a; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(0,255,136,0.2); }
        .reset-card h1 { color: #00ff88; margin-bottom: 10px; }
        .reset-card input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #00ff88; background: #0a0e27; color: white; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-primary { background: #00ff88; color: #0a0e27; }
        .back-link { display: block; margin-top: 20px; color: #00ff88; text-decoration: none; }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; }
        .success { background: rgba(0,255,136,0.2); color: #00ff88; }
        .error { background: rgba(255,68,68,0.2); color: #ff8888; }
    </style>
</head>
<body>
    <div class="reset-card">
        <h1>Reset Password</h1>
        <p style="margin-bottom: 20px; color: #a0a0c0;">Enter your email to receive reset instructions</p>
        <input type="email" id="email" placeholder="Email address">
        <button class="btn btn-primary" onclick="sendResetEmail()">Send Reset Link</button>
        <a href="index.html" class="back-link">← Back to Login</a>
        <div id="message"></div>
    </div>
    <script>
        async function sendResetEmail() { const email = document.getElementById('email').value; if (!email) { showMessage('Please enter your email', 'error'); return; } const result = await window.MEIDrive.resetPassword(email); if (result.success) showMessage('✅ Reset link sent! Check your email.', 'success'); else showMessage('❌ ' + result.error, 'error'); }
        function showMessage(msg, type) { const div = document.getElementById('message'); div.innerHTML = `<div class="message ${type}">${msg}</div>`; setTimeout(() => div.innerHTML = '', 5000); }
        if (!window.MEIDrive) { setTimeout(() => location.reload(), 500); }
    </script>
</body>
</html>
